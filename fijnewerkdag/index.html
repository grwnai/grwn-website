<style>

  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{max-width:100%;overflow-x:hidden}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);min-height:100dvh;line-height:1.6;-webkit-font-smoothing:antialiased}

  .tk-nav{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 18px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(23,48,73,.06)}

  .cols{display:grid;grid-template-columns:250px 1fr;gap:22px;align-items:start}
  .cols>*{min-width:0}
  .card{overflow-wrap:anywhere}
  .airow input,.addrow input,.field input{min-width:0}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .rail{position:sticky;top:74px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}
  @media(max-width:820px){.rail{position:static}}
  .rail h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
  .rail ol{list-style:none;display:flex;flex-direction:column;gap:2px}
  .rail li button{width:100%;text-align:left;display:flex;gap:9px;align-items:center;background:none;border:0;font:inherit;font-size:13.5px;color:var(--ink);padding:8px 9px;border-radius:9px;cursor:pointer}
  .rail li button:hover{background:var(--mint)}
  .rail li.on button{background:var(--mint);font-weight:700;color:var(--cerulean-d)}

  .ctx{color:var(--muted);font-size:15px;margin-bottom:12px}

  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}

  .btn:hover{background:var(--cerulean-d)} .btn:disabled{opacity:.5;box-shadow:none;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.mag{background:var(--magenta);box-shadow:0 8px 22px rgba(232,63,111,.22)} .btn.mag:hover{background:var(--magenta-d)}

  .mode{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:.15s}
  .mode:hover{border-color:var(--cerulean);transform:translateY(-2px)}
  .mode .em{font-size:26px} .mode h4{font-size:16px;margin:8px 0 4px} .mode p{font-size:13px;color:var(--muted)}
  .field{margin-top:16px} .field label{display:block;font-weight:600;font-size:14px;margin-bottom:6px}
  .field input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;font-size:15px}

  .lab button.h.on{background:var(--magenta);border-color:var(--magenta);color:#fff}

  .focusbtn{flex:1 1 100%;order:3;margin-top:8px;border:1px dashed var(--line);background:#fff;font:inherit;font-size:13.5px;font-weight:700;padding:10px;border-radius:9px;cursor:pointer;color:var(--cerulean-d)}

  .priorow.rec{background:#F3FBF6}
  .assess{margin:8px 0 4px;border:1px solid var(--line);border-radius:12px;padding:4px 14px 12px;background:#fff}
  .assess>summary{cursor:pointer;font-weight:700;color:var(--cerulean-d);padding:10px 0;font-size:14.5px}
  .asscalehead{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:2px 2px 6px}
  .asrow{padding:9px 0;border-top:1px solid var(--line)}
  .asq{font-size:14.5px;margin-bottom:9px;line-height:1.45}
  .asscale{display:flex;gap:6px;flex-wrap:wrap}
  .scalebtn{flex:1 1 auto;min-width:46px;min-height:44px;border:1px solid var(--line);background:#fff;border-radius:9px;font:inherit;font-weight:700;font-size:15px;color:var(--muted);cursor:pointer}
  .scalebtn:hover{border-color:var(--cerulean)}
  .scalebtn.on{background:var(--cerulean);border-color:var(--cerulean);color:#fff}
  .asresult{margin-top:12px;padding:12px 14px;border-radius:10px;background:var(--mint);font-size:14px;line-height:1.55}
  .task .x{order:1;margin-left:auto;border:0;background:none;color:var(--muted);cursor:pointer;font-size:18px;flex:none;padding:2px 4px}
  .addrow{display:flex;gap:8px;margin-top:6px}
  .addrow input{flex:1;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font:inherit;font-size:14.5px}
  .aiwrap{margin-top:18px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .aihelphead{background:var(--magenta-soft);color:var(--magenta-d);font-weight:700;font-size:13px;padding:11px 14px}
  .aibody{padding:12px 14px;display:none} .aiwrap.open .aibody{display:block}
  .aiquick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .aimsg{font-size:14px;line-height:1.55;margin-bottom:10px}
  .aimsg.me{color:var(--ink);font-weight:600}
  .aimsg.ai{background:var(--mint);border-radius:10px;padding:9px 11px}
  .airow{display:flex;gap:8px} .airow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:14px}
  .repblock{white-space:pre-wrap;background:#FBFDFE;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:14px;line-height:1.6;margin-top:10px}
  .aimd h1,.aimd h2,.aimd h3{font-size:15px;margin:12px 0 4px;color:var(--cerulean-d)}
  .aimd p{font-size:14px;margin:0 0 8px} .aimd ul{margin:0 0 8px 18px}
  .disc{font-size:12px;color:var(--muted);margin-top:10px;font-style:italic}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--cerulean);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .jdr{margin-top:18px;border:1px solid var(--line);border-radius:12px;padding:0 14px;background:#FBFDFE}
  .jdr summary{cursor:pointer;font-weight:700;font-size:14px;padding:12px 0;color:var(--cerulean-d)}
  .jdrbody{font-size:13.5px;padding-bottom:12px;line-height:1.6}
  .jdrbody ul{margin:6px 0 6px 18px} .jdrbody li{margin-bottom:6px}
  .jdrbody .src{color:var(--muted);font-size:12px;margin-top:6px}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);padding:16px}
  .comfort{position:fixed;top:52px;right:14px;z-index:60;width:286px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 40px rgba(23,48,73,.18);padding:16px 17px}
  .comfort[hidden]{display:none}
  .comfort h2{font-size:15px;margin:0 0 4px} .comfort .lead{font-size:12px;color:var(--muted);margin-bottom:8px}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:14px;font-weight:600;border-top:1px solid var(--line)}
  .crow small{display:block;color:var(--muted);font-size:11.5px;font-weight:400}
  .seg{display:flex;gap:4px;background:var(--bg);border-radius:11px;padding:3px}
  .seg button{border:0;background:none;font:inherit;font-weight:800;padding:5px 11px;border-radius:8px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(23,48,73,.14)}
  .sw{position:relative;width:44px;height:26px;flex:none}
  .sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .sw i{position:absolute;inset:0;background:#cdd7e0;border-radius:20px;transition:.15s}
  .sw i:before{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.15s}
  .sw input:checked + i{background:var(--cerulean)} .sw input:checked + i:before{transform:translateX(18px)}
  body.big .shell{zoom:1.12} body.bigger .shell{zoom:1.26}
  body.roomy .card{line-height:1.9;letter-spacing:.01em}
  body.calm *{animation:none !important;transition:none !important}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;font:inherit;font-size:13px;font-weight:600;color:var(--cerulean-d);padding:8px 13px;cursor:pointer;text-align:left}
  .chip:hover{border-color:var(--cerulean);background:var(--mint)}
  .panel{margin:12px 0;border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px 16px}
  .panel .ph{font-weight:700;color:var(--cerulean-d);font-size:14.5px;margin-bottom:6px}
  .qbox{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:12px 0;background:#FBFDFE}
  .qbox.good{border-left:4px solid var(--seagreen)}
  .qbox.warn{border-left:4px solid var(--gold)}
  .qbox.bad{border-left:4px solid var(--magenta)}
  .qbox h4{font-size:15px;margin-bottom:4px}
  .gap{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
  .gap input[type=checkbox]{width:22px;height:22px;flex:none;margin-top:3px;accent-color:var(--seagreen);cursor:pointer}
  .gap .gt{flex:1;min-width:0}
  .gap .gt b{font-size:14.5px;font-weight:600}
  .gap .gt input[type=text]{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font:inherit;font-size:13.5px}
  .checkban{margin-top:16px;border-radius:12px;padding:12px 14px;background:#FFF8E6;border:1px solid #F3E4B0;font-size:14px;line-height:1.5}
  .sub{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  @media(max-width:560px){.sub{grid-template-columns:1fr}}
  .sub input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:14px}
  .sumrow{padding:9px 0;border-top:1px solid var(--line);font-size:14px;line-height:1.5}
  .sumrow:first-child{border-top:0}
  .sumrow b{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:2px;font-weight:700}
  .priorow .pt{flex:1;min-width:0}
  .priorow .btn.sm{flex:none;white-space:nowrap;min-width:74px}

  .report h2{font-size:18px;color:var(--ink);margin:22px 0 6px;padding-top:14px;border-top:2px solid var(--mint)}
  .report h3{font-size:14px;color:var(--cerulean-d);margin:14px 0 4px}
  .report p{font-size:14px;margin:0 0 8px}
  .report ul{margin:4px 0 8px 18px}
  .report .rlead{color:var(--muted);font-size:13.5px}
  .rblock{background:#FBFDFE;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:10px 0}
  .rgedachte{font-size:13px;color:var(--cerulean-d);background:var(--mint);border-radius:8px;padding:8px 11px;margin:0 0 10px}
  .rscores{margin:8px 0}
  .rscore{display:flex;align-items:center;gap:10px;font-size:13px;margin:5px 0}
  .rscore span{flex:0 0 42%}
  .rscore b{flex:none;width:16px;text-align:right}
  .rbar{flex:1;height:9px;background:var(--line);border-radius:6px;overflow:hidden}
  .rbar i{display:block;height:100%;background:var(--cerulean);border-radius:6px}
  .stars{display:flex;gap:6px;margin:6px 0}
  .star{font-size:28px;line-height:1;background:none;border:0;cursor:pointer;color:#cdd7e0;padding:0 2px}

  @media print{.tk-nav,.rail,.btnrow,.comfort{display:none !important}.card{box-shadow:none;border:0;padding:0}.cols{grid-template-columns:1fr}}
</style>
</head>

<script>

const S={

function uid(){return Math.random().toString(36).slice(2,9)}

function flow(){
  const ft=focusTask(); const lab=ft?ft.label:null;

  if(lab==='uitdagend'){f.push('uitdaag');}
  else if(lab==='hinderlijk'){f.push('hulpzelf','hulporg','afweging'); if(state.afweging==='nee')f.push('andere');}
  f.push('concreet','afronding','rapport');
  return f;
}
function go(step){state.step=step;save();render()}
function advance(){const f=flow();const i=f.indexOf(state.step);if(i<f.length-1)go(f[i+1])}
function prevStep(){const f=flow();const i=f.indexOf(state.step);if(i>0)go(f[i-1]);else{state.mode=null;save();render()}}
const app=document.getElementById('app');

function render(){
  save();
  if(!state.mode){renderStart();return}
  if(!flow().includes(state.step))state.step='werk';

  bindStep();
}

function navBtns(){
  const f=flow();const i=f.indexOf(state.step);const k=state.step;
  const st=state.check[k]||{};const warn=st.shown&&!st.ok&&!st.ackd;
  const ban=warn?('<div class="checkban">🔎 <b>Even meedenken:</b> '+esc(st.tip)+'<br><span class="ctx" style="font-size:12.5px">Pas je antwoord aan, of ga toch verder.</span></div>'):'';
  let primary='';
  if(i<f.length-1){
    if(state._checking)primary='<button class="btn" disabled><span class="spin"></span>Even controleren…</button>';
    else if(warn)primary='<button class="btn mag" onclick="ackNext()">Toch doorgaan →</button>';
    else primary='<button class="btn" onclick="nextStep()">Volgende →</button>';
  }
  return ban+'<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button>'+primary+'</div>';
}

/* ---------- antwoordcheck ---------- */
async function nextStep(){
  const k=state.step;const d=S[k];
  if(CHECKSTEPS.indexOf(k)>=0&&d&&d.id){
    const ans=(state.answers[d.id]||'').trim();
    const st=state.check[k]||{};
    if(!st.ackd){
      if(!ans){state.check[k]={ok:false,tip:'Je hebt nog niets ingevuld. Beschrijf kort je antwoord op de vraag.',shown:true,done:true};save();render();return;}
      if(!st.done){
        state._checking=true;render();
        const res=await runCheck(d.vraag,ans);
        state._checking=false;
        state.check[k]={ok:res.ok,tip:res.tip,done:true,shown:!res.ok};save();
        if(!res.ok){render();return;}
      }
    }
  }
  advance();
}
function ackNext(){const k=state.step;state.check[k]=Object.assign(state.check[k]||{},{ackd:true});save();advance()}
async function runCheck(vraag,ans){
  try{
    const r=await fetch('/api/jdr-check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vraag:vraag,antwoord:ans})});
    const j=await r.json();
    if(r.ok&&typeof j.ok==='boolean')return {ok:j.ok,tip:j.tip||''};
  }catch(e){}
  return {ok:true,tip:''};
}

  if(k==='hulpzelf'||k==='hulporg')return renderHulp(k);
  if(k==='afweging')return renderAfweging();
  if(k==='andere')return renderAndere();
  if(k==='concreet')return renderConcreet();
  if(k==='afronding')return renderAfronding();
  if(k==='rapport')return renderReport();

}

function longAverages(){

  const av=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  return {u:av(us),b:av(bs),done:LONG.items.every(function(_,i){return state.longterm['i'+i];})};
}
function longResult(){
  const a=longAverages();if(!a.done)return '';

  else if(hiU&&hiB){cls='warn';kop='Bevlogen, maar het kost veel';txt='Je bent betrokken én het vraagt veel van je. Dat houd je een tijd vol, maar zonder voldoende herstel kan het omslaan in uitputting. Bewaak bewust je energie.';}

  else{cls='warn';kop='Vlak';txt='Weinig energieverlies, maar ook weinig bevlogenheid — het werk laat je een beetje koud. Op termijn kan dat gaan vervelen. Meer uitdaging of betekenis helpt.';}

function setAssess(k,i,v){if(!state.assess[k])state.assess[k]={};state.assess[k]['i'+i]=v;save();render()}
function assessPanel(k){
  if(state.mode==='interviewer')return '';

function assessResult(k){
  const cfg=ASSESS[k];const ans=state.assess[k]||{};

  let lo=0,hi=0;for(let i=1;i<vals.length;i++){if(vals[i]<vals[lo])lo=i;if(vals[i]>vals[hi])hi=i;}

  }
  const map=(k==='hulpzelf')?ACT_ZELF:ACT_ORG;const id=(k==='hulpzelf')?'hulp_zelf':'hulp_org';

}

  const _ft=focusTask();t+='== GEKOZEN TAAK ==\n'+(_ft?('- '+_ft.tekst+(_ft.label?' ['+_ft.label+']':'')):'-')+'\n\n';
  const a=longAverages();
  if(a.done){const hiU=a.u>=3.5,hiB=a.b>=3;const kop=(hiU&&!hiB)?'richting opbranden':(hiU&&hiB)?'bevlogen maar het kost veel':(!hiU&&hiB)?'gezonde koers':'vlak';
    t+='== LANGE TERMIJN (scan) ==\nEnergieverlies: '+a.u.toFixed(1)+'/5 · Bevlogenheid: '+a.b.toFixed(1)+'/5 → '+kop+'\n';}
  if(state.answers.effect)t+='Reflectie: '+state.answers.effect+'\n';
  t+='\n';
  ['uitdaag','hulpzelf','hulporg'].forEach(function(k){
    const cfg=ASSESS[k];const sc=state.assess[k];if(!cfg||!sc)return;if(!cfg.items.every(function(_,i){return sc['i'+i];}))return;
    const parts=cfg.items.map(function(it,i){return it.dim+'='+sc['i'+i];});
    t+='== SCAN '+cfg.titel.replace(/^Mini-scan: /,'')+' (1-5) ==\n'+parts.join(', ')+'\n';
  });
  if(state.answers.ud_nodig)t+='== VERSTERKEN ==\n'+state.answers.ud_nodig+'\n\n';
  if(state.answers.hulp_zelf)t+='== HULP: JEZELF ==\n'+state.answers.hulp_zelf+'\n\n';

    if(state.afweging)t+='Conclusie: hulp '+(state.afweging==='ja'?'voldoende':'nog niet voldoende')+'\n';
    if(state.answers.afw_onderbouwing)t+='Onderbouwing: '+state.answers.afw_onderbouwing+'\n';
    t+='\n';
  }
  if(state.answers.andere)t+='== ANDERE OPTIES ==\n'+state.answers.andere+'\n\n';
  if(state.answers.concreet){const c=state.concreet||{};t+='== CONCRETE ACTIE ==\n'+state.answers.concreet+'\n'+(c.wanneer?('Wanneer: '+c.wanneer+'\n'):'')+(c.wie?('Met wie: '+c.wie+'\n'):'')+(c.eerste?('Eerste stap: '+c.eerste+'\n'):'')+'\n';}
  if(state.answers.afronding)t+='== MEEGENOMEN ==\n'+state.answers.afronding+'\n';

  return t.trim();
}

  } else if(ft&&ft.label==='hinderlijk'){
    out+=sec('3. Hulp vanuit jezelf',THOUGHT.hulpzelf,'<div class="rblock">'+scanBlock('hulpzelf')+(state.answers.hulp_zelf?('<p>'+repVal('hulp_zelf')+'</p>'):'')+'</div>');
    out+=sec('4. Hulp vanuit je werk',THOUGHT.hulporg,'<div class="rblock">'+scanBlock('hulporg')+(state.answers.hulp_org?('<p>'+repVal('hulp_org')+'</p>'):'')+'</div>');
    if(state.gaps.eisen&&state.gaps.eisen.length){
      const gr=state.gaps.eisen.map(function(e,i){return '<li>'+(state.gaps.checked[i]?'✅ ':'⬜ ')+esc(e)+(state.gaps.note[i]?(' — <i>'+esc(state.gaps.note[i])+'</i>'):'')+'</li>';}).join('');
      out+=sec('5. Afweging: eisen tegenover hulp',THOUGHT.afweging,'<div class="rblock"><ul style="list-style:none;padding:0;margin:0">'+gr+'</ul>'+(state.afweging?('<p><b>Conclusie:</b> hulp '+(state.afweging==='ja'?'voldoende':'nog niet voldoende')+'.</p>'):'')+(state.answers.afw_onderbouwing?('<p><b>Onderbouwing:</b> '+repVal('afw_onderbouwing')+'</p>'):'')+'</div>');
    }
    if(state.answers.andere)out+=sec('6. Andere opties (job crafting)',THOUGHT.andere,'<div class="rblock"><p>'+repVal('andere')+'</p></div>');
  }
  const c=state.concreet||{};
  if(state.answers.concreet)out+=sec('7. Concrete actie',THOUGHT.concreet,'<div class="rblock"><p>'+repVal('concreet')+'</p>'+(c.wanneer?('<p><b>Wanneer:</b> '+esc(c.wanneer)+'</p>'):'')+(c.wie?('<p><b>Met wie:</b> '+esc(c.wie)+'</p>'):'')+(c.eerste?('<p><b>Eerste stap:</b> '+esc(c.eerste)+'</p>'):'')+'</div>');
  if(state.answers.afronding)out+=sec('8. Wat je meeneemt',THOUGHT.afronding,'<div class="rblock"><p>'+repVal('afronding')+'</p></div>');
  out+=sec('Over het JD-R model','','<p>Het Job Demands-Resources model (Bakker & Demerouti; Schaufeli) verklaart werkgeluk uit de balans tussen <b>taakeisen</b> (wat je werk van je vraagt) en <b>hulpbronnen</b> (wat je werk én jijzelf te bieden hebben). Te veel eisen met te weinig hulpbronnen leidt tot uitputting; genoeg hulpbronnen leidt tot bevlogenheid en groei.</p><h3>Toepassing</h3><p>Door bewust hulpbronnen te vergroten (autonomie, steun, feedback, ontwikkeling én persoonlijke kracht) en belemmerende eisen te verkleinen — <b>job crafting</b> — verschuif je van het uitputtings- naar het motivatieproces.</p><h3>Valkuilen</h3><ul><li>Alleen naar de eisen kijken en je hulpbronnen vergeten.</li><li>Te grote stappen ineens willen zetten; klein en concreet werkt beter.</li><li>Uitdaging verwarren met overbelasting.</li><li>Denken dat verandering alleen van je werkgever moet komen — jij hebt zelf ook invloed.</li></ul>');
  if(state.feedback&&state.feedback.score)out+='<p class="rlead" style="margin-top:16px">Waardering van de tool: '+state.feedback.score+'/5.</p>';
  out+='</div>';return out;
}

(function(){
  var A={};try{A=JSON.parse(localStorage.getItem('fw_a11y')||'{}')}catch(e){}
  if(A.calm===undefined&&window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches)A.calm=true;
  var $=function(id){return document.getElementById(id)};
  function ap(){document.body.classList.toggle('big',A.fs==='big');document.body.classList.toggle('bigger',A.fs==='bigger');
    document.body.classList.toggle('calm',!!A.calm);document.body.classList.toggle('roomy',!!A.roomy);
    document.querySelectorAll('#comfort [data-fs]').forEach(function(b){b.classList.toggle('on',(A.fs||'')===b.dataset.fs)});
    if($('c-calm'))$('c-calm').checked=!!A.calm;if($('c-roomy'))$('c-roomy').checked=!!A.roomy}
  function sv(){try{localStorage.setItem('fw_a11y',JSON.stringify(A))}catch(e){}ap()}
  $('comfortBtn').onclick=function(){var c=$('comfort');var o=c.hidden;c.hidden=!o;this.setAttribute('aria-expanded',o?'true':'false')};
  $('comfort').addEventListener('click',function(e){var b=e.target.closest('[data-fs]');if(b){A.fs=b.dataset.fs;sv()}});
  $('c-calm').onchange=function(e){A.calm=e.target.checked;sv()};$('c-roomy').onchange=function(e){A.roomy=e.target.checked;sv()};
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&!$('comfort').hidden){$('comfort').hidden=true;$('comfortBtn').setAttribute('aria-expanded','false')}});
  document.addEventListener('click',function(e){if(!$('comfort').hidden&&!e.target.closest('#comfort')&&!e.target.closest('#comfortBtn')){$('comfort').hidden=true;$('comfortBtn').setAttribute('aria-expanded','false')}});
  ap();
})();
document.getElementById('restartBtn').onclick=function(){if(confirm('Opnieuw beginnen? Je antwoorden worden gewist.')){state={mode:null,naam:'',taken:[],focus:null,prio:null,takenTried:false,answers:{},assess:{},longterm:{},gaps:{eisen:null,checked:{},note:{}},concreet:{},afweging:null,step:'werk',ai:{},check:{},feedback:{score:null,waarom:'',tekst:'',sent:false},acties:null,_checking:false,_extracting:false,_eisenLoading:false,_actiesTried:false};save();render()}};

load();render();
</script>
