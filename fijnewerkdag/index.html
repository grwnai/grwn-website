  .comfort h2{font-size:15px;margin:0 0 4px} .comfort .lead{font-size:12px;color:var(--muted);margin-bottom:8px}

  .crow small{display:block;color:var(--muted);font-size:11.5px;font-weight:400}

  .qbox.warn{border-left:4px solid var(--gold)}
  .qbox.bad{border-left:4px solid var(--magenta)}
  .qbox h4{font-size:15px;margin-bottom:4px}
  .gap{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
  .gap input[type=checkbox]{width:22px;height:22px;flex:none;margin-top:3px;accent-color:var(--seagreen);cursor:pointer}
  .gap .gt{flex:1;min-width:0}
  .gap .gt b{font-size:14.5px;font-weight:600}
  .gap .gt input[type=text]{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font:inherit;font-size:13.5px}
  .checkban{margin-top:16px;border-radius:12px;padding:12px 14px;background:#FFF8E6;border:1px solid #F3E4B0;font-size:14px;line-height:1.5}
  .sub{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  @media(max-width:560px){.sub{grid-template-columns:1fr}}
  .sub input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:14px}
  .sumrow{padding:9px 0;border-top:1px solid var(--line);font-size:14px;line-height:1.5}

  .priorow .btn.sm{flex:none;white-space:nowrap;min-width:74px}
</style>

function uid(){return Math.random().toString(36).slice(2,9)}
function focusTask(){return state.taken.find(function(t){return t.id===state.focus})||null}
function flow(){
  const ft=focusTask(); const lab=ft?ft.label:null;
  const f=['werk','taken','effect'];
  if(lab==='uitdagend'){f.push('uitdaag');}
  else if(lab==='hinderlijk'){f.push('hulpzelf','hulporg','afweging'); if(state.afweging==='nee')f.push('andere');}
  f.push('concreet','afronding','rapport');
  return f;
}
function go(step){state.step=step;save();render()}
function advance(){const f=flow();const i=f.indexOf(state.step);if(i<f.length-1)go(f[i+1])}
function prevStep(){const f=flow();const i=f.indexOf(state.step);if(i>0)go(f[i-1]);else{state.mode=null;save();render()}}
const app=document.getElementById('app');

function render(){
  save();
  if(!state.mode){renderStart();return}
  if(!flow().includes(state.step))state.step='werk';
  app.innerHTML='<div class="cols">'+renderRail()+'<div>'+renderStep()+'</div></div>';
  bindStep();
}

 '<li><b>Energiebronnen</b> (hulpbronnen uit het werk: steun, autonomie, feedback, ontwikkeling) leiden via <b>bevlogenheid</b> tot betere resultaten — het <i>motivatieproces</i>. In deze tool: <b>Hulp vanuit je werk</b>.</li>'+

 '<li><b>Buffer</b>: hulpbronnen verzachten de impact van werkstressoren. In deze tool: de <b>afweging</b> — is de hulp genoeg voor wat de taak vraagt?</li>'+
 '<li><b>Uitdagend vs. hinderlijk werk</b> is een erkende verfijning (challenge- vs. hindrance-eisen): uitdagend werk motiveert (mits er genoeg hulpbronnen tegenover staan), hinderlijk werk kost vooral energie.</li>'+
 '<li><b>Job crafting</b> (Tims & Bakker): zelf je werk bijstellen — dat is wat je bij "Andere opties" en "Concrete actie" doet.</li>'+
 '</ul><p class="src">Bron: Wilmar Schaufeli — Job Demands-Resources model; Tims & Bakker — job crafting.</p></div>';}
function renderStart(){
  let m=Object.keys(MODES).map(k=>'<button class="mode" onclick="pickMode(\''+k+'\')"><div class="em">'+MODES[k].em+'</div><h4>'+MODES[k].naam+'</h4><p>'+MODES[k].desc+'</p></button>').join('');

function renderRail(){
  const f=flow();const i=f.indexOf(state.step);
  let li=f.map((k,idx)=>{const cls=(k===state.step?'on ':'')+(idx<i?'done ':'');
    return '<li class="'+cls.trim()+'"><button onclick="go(\''+k+'\')"><span class="dot"></span>'+RAILLABEL[k]+'</button></li>';}).join('');

    '<div class="home"><a href="#" onclick="return backHome()">↩ Terug naar begin</a></div></aside>';

function onAnswer(step,id,v){state.answers[id]=v;if(state.check[step])state.check[step]=null;save()}
function insertA(id,txt){const cur=state.answers[id]||'';state.answers[id]=cur?(cur.replace(/\s*$/,'')+'\n'+txt):txt;if(state.check[state.step])state.check[state.step]=null;save();render()}

function toggleAi(){const w=document.getElementById('aiwrap');if(w)w.classList.toggle('open')}
function navBtns(){
  const f=flow();const i=f.indexOf(state.step);const k=state.step;
  const st=state.check[k]||{};const warn=st.shown&&!st.ok&&!st.ackd;
  const ban=warn?('<div class="checkban">🔎 <b>Even meedenken:</b> '+esc(st.tip)+'<br><span class="ctx" style="font-size:12.5px">Pas je antwoord aan, of ga toch verder.</span></div>'):'';
  let primary='';
  if(i<f.length-1){
    if(state._checking)primary='<button class="btn" disabled><span class="spin"></span>Even controleren…</button>';
    else if(warn)primary='<button class="btn mag" onclick="ackNext()">Toch doorgaan →</button>';
    else primary='<button class="btn" onclick="nextStep()">Volgende →</button>';
  }
  return ban+'<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button>'+primary+'</div>';
}

/* ---------- antwoordcheck ---------- */
async function nextStep(){
  const k=state.step;const d=S[k];
  if(CHECKSTEPS.indexOf(k)>=0&&d&&d.id){
    const ans=(state.answers[d.id]||'').trim();
    const st=state.check[k]||{};
    if(!st.ackd){
      if(!ans){state.check[k]={ok:false,tip:'Je hebt nog niets ingevuld. Beschrijf kort je antwoord op de vraag.',shown:true,done:true};save();render();return;}
      if(!st.done){
        state._checking=true;render();
        const res=await runCheck(d.vraag,ans);
        state._checking=false;
        state.check[k]={ok:res.ok,tip:res.tip,done:true,shown:!res.ok};save();
        if(!res.ok){render();return;}
      }
    }
  }
  advance();
}
function ackNext(){const k=state.step;state.check[k]=Object.assign(state.check[k]||{},{ackd:true});save();advance()}
async function runCheck(vraag,ans){
  try{
    const r=await fetch('/api/jdr-check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vraag:vraag,antwoord:ans})});
    const j=await r.json();
    if(r.ok&&typeof j.ok==='boolean')return {ok:j.ok,tip:j.tip||''};
  }catch(e){}
  return {ok:true,tip:''};
}

/* ---------- router ---------- */
function renderStep(){
  const k=state.step;
  if(k==='werk')return renderWerk();
  if(k==='taken')return renderTaken();
  if(k==='effect')return renderEffect();
  if(k==='uitdaag')return renderUitdaag();
  if(k==='hulpzelf'||k==='hulporg')return renderHulp(k);
  if(k==='afweging')return renderAfweging();
  if(k==='andere')return renderAndere();
  if(k==='concreet')return renderConcreet();
  if(k==='afronding')return renderAfronding();
  if(k==='rapport')return renderReport();
  const d=S[k];
  return '<div class="card"><span class="eyebrow">'+esc(d.titel)+'</span><h1>'+esc(d.vraag)+'</h1><p class="ctx">'+esc(d.ctx)+'</p>'+fieldHtml(d)+navBtns()+'</div>';
}

function labbtns(t){
  return '<button class="u '+(t.label==='uitdagend'?'on':'')+'" onclick="labelTask(\''+t.id+'\',\'uitdagend\')" title="Geeft energie">Uitdagend — geeft energie</button>'+
    '<button class="h '+(t.label==='hinderlijk'?'on':'')+'" onclick="labelTask(\''+t.id+'\',\'hinderlijk\')" title="Kost energie">Hinderlijk — kost energie</button>';

function renderTaken(){
  const ft=focusTask();
  let chosen='';
  if(ft){
    chosen='<div class="qbox good"><h4>🎯 Je gekozen taak</h4><p style="font-weight:600;font-size:15px">'+esc(ft.tekst)+'</p>'+
      '<p class="ctx" style="margin:6px 0 8px">Is dit voor jou vooral <b>uitdagend</b> (geeft energie) of <b>hinderlijk</b> (kost energie)?</p>'+
      '<div class="lab" style="position:static">'+labbtns(ft)+'</div>'+
      (ft.label?('<div class="btnrow" style="margin-top:14px"><button class="btn" onclick="nextStep()">Volgende →</button></div>'):'<p class="ctx" style="margin-top:10px">Kies een label om verder te gaan.</p>')+
      '</div>';
  }
  const rows=state.taken.map(function(t){
    const sel=t.id===state.focus;
    return '<div class="task'+(sel?' focus':'')+'"><div class="top"><input class="t" value="'+esc(t.tekst)+'" oninput="editTask(\''+t.id+'\',this.value)"><button class="x" onclick="delTask(\''+t.id+'\')" aria-label="Verwijder">✕</button></div>'+

  }).join('');
  let status='';
  if(state._extracting)status='<p class="ctx"><span class="spin"></span>Ik haal je taken uit je beschrijving…</p>';
  else if(state.takenTried&&!state.taken.length)status='<p class="ctx">Ik kon niet automatisch taken herkennen. Voeg ze hieronder handmatig toe, of vul stap 1 aan.</p>';
  return '<div class="card"><span class="eyebrow">Je taak</span><h1>Welke taak pak je nu aan?</h1>'+
    '<p class="ctx">Hieronder je taken. Kies er één om nu mee verder te gaan — bij twijfel helpt "Help me kiezen". Een volgende keer kun je een andere pakken.</p>'+
    chosen+
    '<div class="btnrow" style="margin:8px 0 12px"><button class="btn mag sm" id="extractBtn" onclick="extractTaken(true)">✨ Taken opnieuw ophalen</button></div>'+
    status+
    '<div id="taskList">'+(rows||'')+'</div>'+
    '<div class="addrow"><input id="newTask" placeholder="Zelf een taak toevoegen…" onkeydown="if(event.key===\'Enter\')addTask()"><button class="btn ghost sm" onclick="addTask()">Toevoegen</button></div>'+
    prioHtml()+
    '<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button></div></div>';
}
function editTask(id,v){const t=state.taken.find(function(x){return x.id===id});if(t){t.tekst=v;save()}}
function labelTask(id,l){const t=state.taken.find(function(x){return x.id===id});if(t){t.label=(t.label===l?null:l);save();render()}}
function delTask(id){state.taken=state.taken.filter(function(x){return x.id!==id});if(state.focus===id)state.focus=null;state.prio=null;save();render()}
function setFocus(id){state.focus=(state.focus===id?null:id);save();render();try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}}
function addTask(){const el=document.getElementById('newTask');const v=(el.value||'').trim();if(!v)return;state.taken.push({id:uid(),tekst:v,label:null});state.prio=null;el.value='';save();render()}
async function extractTaken(force){
  if(state._extracting)return;
  state._extracting=true;state.takenTried=true;render();
  const ws=state.answers.werk||'';
  try{
    const r=await fetch('/api/jdr-taken',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({werksituatie:ws})});
    const d=await r.json();
    if(d.taken&&d.taken.length){d.taken.forEach(t=>{if(!state.taken.some(x=>x.tekst.toLowerCase()===t.toLowerCase()))state.taken.push({id:uid(),tekst:t,label:null})});}
  }catch(e){}
  state._extracting=false;save();render();
}
function prioHtml(){
  if(state.taken.length<2)return '';
  const btn='<div class="btnrow" style="margin:6px 0 0"><button class="btn ghost sm" id="prioBtn" onclick="askPrio()">🧭 Help me kiezen — welke taak raakt mijn werkgeluk het meest?</button></div>';
  if(!state.prio)return btn;
  const p=state.prio;
  const items=(p.ranking||[]).map(function(r){
    const t=state.taken.find(function(x){return x.tekst===r.taak});const id=t?t.id:'';const rec=(r.taak===p.aanbevolen);

/* ---------- stap 3: lange termijn ---------- */
function setLong(i,v){state.longterm['i'+i]=v;save();render()}
function longAverages(){
  let us=[],bs=[];
  LONG.items.forEach(function(it,i){const val=state.longterm['i'+i];if(!val)return;if(it.g==='u')us.push(val);else bs.push(val);});
  const av=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  return {u:av(us),b:av(bs),done:LONG.items.every(function(_,i){return state.longterm['i'+i];})};
}
function longResult(){

  else if(hiU&&hiB){cls='warn';kop='Bevlogen, maar het kost veel';txt='Je bent betrokken én het vraagt veel van je. Dat houd je een tijd vol, maar zonder voldoende herstel kan het omslaan in uitputting. Bewaak bewust je energie.';}
  else if(!hiU&&hiB){cls='good';kop='Gezonde koers';txt='Genoeg energie en betrokkenheid — je zit in het motivatieproces. Als je zo doorgaat, groei je verder. Mooi vertrekpunt om je sterke punten uit te bouwen.';}
  else{cls='warn';kop='Vlak';txt='Weinig energieverlies, maar ook weinig bevlogenheid — het werk laat je een beetje koud. Op termijn kan dat gaan vervelen. Meer uitdaging of betekenis helpt.';}
  const sc='<span class="ctx" style="font-size:12.5px">Energieverlies: '+a.u.toFixed(1)+'/5 · Bevlogenheid: '+a.b.toFixed(1)+'/5</span>';

}

  if(state.answers.effect)t+='Reflectie: '+state.answers.effect+'\n';
  t+='\n';
  ['uitdaag','hulpzelf','hulporg'].forEach(function(k){
    const cfg=ASSESS[k];const sc=state.assess[k];if(!cfg||!sc)return;if(!cfg.items.every(function(_,i){return sc['i'+i];}))return;
    const parts=cfg.items.map(function(it,i){return it.dim+'='+sc['i'+i];});
    t+='== SCAN '+cfg.titel.replace(/^Mini-scan: /,'')+' (1-5) ==\n'+parts.join(', ')+'\n';
  });
  if(state.answers.ud_nodig)t+='== VERSTERKEN ==\n'+state.answers.ud_nodig+'\n\n';
  if(state.answers.hulp_zelf)t+='== HULP: JEZELF ==\n'+state.answers.hulp_zelf+'\n\n';
  if(state.answers.hulp_org)t+='== HULP: JE WERK ==\n'+state.answers.hulp_org+'\n\n';
  if(state.gaps.eisen&&state.gaps.eisen.length){
    t+='== AFWEGING (eisen ↔ hulp) ==\n';
    state.gaps.eisen.forEach(function(e,i){t+=(state.gaps.checked[i]?'[v] ':'[ ] ')+e+(state.gaps.note[i]?(' → '+state.gaps.note[i]):'')+'\n';});
    if(state.afweging)t+='Conclusie: hulp '+(state.afweging==='ja'?'voldoende':'nog niet voldoende')+'\n';
    if(state.answers.afw_onderbouwing)t+='Onderbouwing: '+state.answers.afw_onderbouwing+'\n';
    t+='\n';
  }
  if(state.answers.andere)t+='== ANDERE OPTIES ==\n'+state.answers.andere+'\n\n';
  if(state.answers.concreet){const c=state.concreet||{};t+='== CONCRETE ACTIE ==\n'+state.answers.concreet+'\n'+(c.wanneer?('Wanneer: '+c.wanneer+'\n'):'')+(c.wie?('Met wie: '+c.wie+'\n'):'')+(c.eerste?('Eerste stap: '+c.eerste+'\n'):'')+'\n';}
  if(state.answers.afronding)t+='== MEEGENOMEN ==\n'+state.answers.afronding+'\n';
  return t.trim();
}
function renderReport(){
  return '<div class="card"><span class="eyebrow">Rapportage</span><h1>Jouw rapportage</h1>'+
    '<p class="ctx">Een volledig overzicht van je antwoorden en scans. Vraag desgewenst een AI-analyse volgens het JD-R model, of exporteer.</p>'+
    '<div class="btnrow" style="margin:6px 0 4px"><button class="btn mag" onclick="analyse()">✨ AI-analyse (JD-R)</button>'+
    '<button class="btn ghost" onclick="window.print()">🖨 Print / PDF</button>'+
    '<button class="btn ghost" onclick="dlTxt()">⬇ Tekst</button>'+
    '<button class="btn ghost" onclick="mailIt()">✉ E-mail</button></div>'+
    '<div id="aiBox"></div>'+
    '<div class="repblock">'+esc(buildText())+'</div>'+
    '<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button></div></div>';
}
function dlTxt(){const b=new Blob([buildText()],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fijne-werkdag'+(state.naam?'-'+state.naam:'')+'.txt';a.click()}
function mailIt(){location.href='mailto:?subject='+encodeURIComponent('Rapportage – Fijne werkdag'+(state.naam?' '+state.naam:''))+'&body='+encodeURIComponent(buildText())}
function mdToHtml(t){let h='';t.split('\n').forEach(l=>{l=l.trim();if(!l)return;if(/^#/.test(l)){h+='<h3>'+esc(l.replace(/^#+\s*/,''))+'</h3>'}else if(/^[-•]/.test(l)){h+='<ul><li>'+esc(l.replace(/^[-•]\s*/,''))+'</li></ul>'}else{h+='<p>'+esc(l)+'</p>'}});return '<div class="aimd">'+h+'</div>'}
async function analyse(){
  const box=document.getElementById('aiBox');box.innerHTML='<div class="repblock"><span class="spin"></span> Bezig met de JD-R-analyse…</div>';
  try{
    const r=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report:buildText()})});
    const d=await r.json();
    if(r.ok&&d.text){box.innerHTML='<div class="repblock">'+mdToHtml(d.text)+'<div class="disc">AI-gegenereerd op basis van je antwoorden — een hulpmiddel, geen oordeel.</div></div>'}
    else{box.innerHTML='<div class="repblock">De analyse lukte niet: '+esc(d.error||'onbekend')+'</div>'}
  }catch(e){box.innerHTML='<div class="repblock">Geen verbinding met de analyse (werkt niet lokaal).</div>'}
}

(function(){
  var A={};try{A=JSON.parse(localStorage.getItem('fw_a11y')||'{}')}catch(e){}
  if(A.calm===undefined&&window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches)A.calm=true;
  var $=function(id){return document.getElementById(id)};
  function ap(){document.body.classList.toggle('big',A.fs==='big');document.body.classList.toggle('bigger',A.fs==='bigger');
    document.body.classList.toggle('calm',!!A.calm);document.body.classList.toggle('roomy',!!A.roomy);
    document.querySelectorAll('#comfort [data-fs]').forEach(function(b){b.classList.toggle('on',(A.fs||'')===b.dataset.fs)});
    if($('c-calm'))$('c-calm').checked=!!A.calm;if($('c-roomy'))$('c-roomy').checked=!!A.roomy}
  function sv(){try{localStorage.setItem('fw_a11y',JSON.stringify(A))}catch(e){}ap()}
  $('comfortBtn').onclick=function(){var c=$('comfort');var o=c.hidden;c.hidden=!o;this.setAttribute('aria-expanded',o?'true':'false')};
  $('comfort').addEventListener('click',function(e){var b=e.target.closest('[data-fs]');if(b){A.fs=b.dataset.fs;sv()}});
  $('c-calm').onchange=function(e){A.calm=e.target.checked;sv()};$('c-roomy').onchange=function(e){A.roomy=e.target.checked;sv()};
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&!$('comfort').hidden){$('comfort').hidden=true;$('comfortBtn').setAttribute('aria-expanded','false')}});
  document.addEventListener('click',function(e){if(!$('comfort').hidden&&!e.target.closest('#comfort')&&!e.target.closest('#comfortBtn')){$('comfort').hidden=true;$('comfortBtn').setAttribute('aria-expanded','false')}});
  ap();
})();
document.getElementById('restartBtn').onclick=function(){if(confirm('Opnieuw beginnen? Je antwoorden worden gewist.')){state={mode:null,naam:'',taken:[],focus:null,prio:null,takenTried:false,answers:{},assess:{},longterm:{},gaps:{eisen:null,checked:{},note:{}},concreet:{},afweging:null,step:'werk',ai:{},check:{},_checking:false,_extracting:false,_eisenLoading:false};save();render()}};

load();render();
</script>
