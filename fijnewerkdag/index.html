<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>De weg naar een fijne werkdag · GRWN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#173049; --ink2:#0F2336; --cerulean:#2274A5; --cerulean-d:#1A5D85; --mint:#E4F0F6;
    --magenta:#E83F6F; --magenta-d:#C72C58; --magenta-soft:#FCE6EE; --gold:#F5B400; --seagreen:#32936F;
    --bg:#F6F9FB; --panel:#fff; --muted:#5C6873; --line:#EAEEF1;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{max-width:100%;overflow-x:hidden}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);min-height:100dvh;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--cerulean-d)}
  .tk-nav{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 18px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(23,48,73,.06)}
  .tk-nav .tk-logo img{height:24px;display:block}
  .tk-nav .tk-logo .fb{font-weight:800;font-size:19px;color:var(--ink)}
  .tk-nav .tk-logo .fb b{color:var(--magenta)}
  .tk-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .tk-right a,.tk-right button{font:inherit;font-size:13px;font-weight:600;color:var(--cerulean-d);background:none;border:0;cursor:pointer;text-decoration:none}
  .tk-right a:hover,.tk-right button:hover{color:var(--magenta-d)}
  :focus-visible{outline:3px solid var(--cerulean);outline-offset:2px;border-radius:6px}
  .shell{max-width:1080px;margin:0 auto;padding:18px}
  .cols{display:grid;grid-template-columns:250px 1fr;gap:22px;align-items:start}
  .cols>*{min-width:0}
  .card{overflow-wrap:anywhere}
  .airow input,.addrow input,.field input{min-width:0}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .rail{position:sticky;top:74px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}
  @media(max-width:820px){.rail{position:static}}
  .rail h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
  .rail ol{list-style:none;display:flex;flex-direction:column;gap:2px}
  .rail li button{width:100%;text-align:left;display:flex;gap:9px;align-items:center;background:none;border:0;font:inherit;font-size:13.5px;color:var(--ink);padding:8px 9px;border-radius:9px;cursor:pointer}
  .rail li button:hover{background:var(--mint)}
  .rail li.on button{background:var(--mint);font-weight:700;color:var(--cerulean-d)}
  .rail li.done .dot{background:var(--seagreen)}
  .rail li.on .dot{background:var(--cerulean);box-shadow:0 0 0 3px var(--mint)}
  .rail .dot{width:11px;height:11px;border-radius:50%;background:#cdd7e0;flex:none}
  .rail .home{margin-top:10px;font-size:12.5px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 22px 20px;box-shadow:0 6px 22px rgba(23,48,73,.05)}
  .eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--cerulean-d);background:var(--mint);padding:5px 12px;border-radius:20px}
  h1{font-size:23px;letter-spacing:-.01em;margin:12px 0 6px}
  .ctx{color:var(--muted);font-size:15px;margin-bottom:12px}
  textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 13px;font:inherit;font-size:15px;color:var(--ink);resize:vertical;min-height:120px;background:#fff}
  textarea:focus{outline:none;border-color:var(--cerulean)}
  textarea::placeholder{color:#9aa6b6}
  .tips{margin-top:16px;background:#FBFDFE;border:1px solid var(--line);border-left:3px solid var(--cerulean);border-radius:12px;padding:12px 14px;font-size:13.5px;color:var(--ink)}
  .tips b{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:6px}
  .tips ul{margin:0 0 0 18px} .tips li{margin-bottom:4px}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
  .btn{border:0;border-radius:999px;font:inherit;font-weight:700;font-size:15px;padding:12px 22px;cursor:pointer;background:var(--cerulean);color:#fff;box-shadow:0 8px 22px rgba(34,116,165,.22)}
  .btn:hover{background:var(--cerulean-d)} .btn:disabled{opacity:.5;box-shadow:none;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.mag{background:var(--magenta);box-shadow:0 8px 22px rgba(232,63,111,.22)} .btn.mag:hover{background:var(--magenta-d)}
  .btn.sm{padding:8px 15px;font-size:13.5px}
  .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
  @media(max-width:720px){.modes{grid-template-columns:1fr}}
  .mode{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:.15s}
  .mode:hover{border-color:var(--cerulean);transform:translateY(-2px)}
  .mode .em{font-size:26px} .mode h4{font-size:16px;margin:8px 0 4px} .mode p{font-size:13px;color:var(--muted)}
  .field{margin-top:16px} .field label{display:block;font-weight:600;font-size:14px;margin-bottom:6px}
  .field input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;font-size:15px}
  .task{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:8px}
  .task input.t{flex:1;border:0;font:inherit;font-size:14.5px;color:var(--ink);background:none;min-width:0}
  .task input.t:focus{outline:none}
  .lab{display:flex;gap:4px}
  .lab button{border:1px solid var(--line);background:#fff;font:inherit;font-size:12px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;color:var(--muted)}
  .lab button.u.on{background:var(--seagreen);border-color:var(--seagreen);color:#fff}
  .lab button.h.on{background:var(--magenta);border-color:var(--magenta);color:#fff}
  .task .x{border:0;background:none;color:var(--muted);cursor:pointer;font-size:16px;flex:none}
  .addrow{display:flex;gap:8px;margin-top:6px}
  .addrow input{flex:1;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font:inherit;font-size:14.5px}
  .aiwrap{margin-top:18px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .aihelphead{background:var(--magenta-soft);color:var(--magenta-d);font-weight:700;font-size:13px;padding:11px 14px}
  .aibody{padding:12px 14px;display:none} .aiwrap.open .aibody{display:block}
  .aiquick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .aimsg{font-size:14px;line-height:1.55;margin-bottom:10px}
  .aimsg.me{color:var(--ink);font-weight:600}
  .aimsg.ai{background:var(--mint);border-radius:10px;padding:9px 11px}
  .airow{display:flex;gap:8px} .airow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:14px}
  .repblock{white-space:pre-wrap;background:#FBFDFE;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:14px;line-height:1.6;margin-top:10px}
  .aimd h1,.aimd h2,.aimd h3{font-size:15px;margin:12px 0 4px;color:var(--cerulean-d)}
  .aimd p{font-size:14px;margin:0 0 8px} .aimd ul{margin:0 0 8px 18px}
  .disc{font-size:12px;color:var(--muted);margin-top:10px;font-style:italic}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--cerulean);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .jdr{margin-top:18px;border:1px solid var(--line);border-radius:12px;padding:0 14px;background:#FBFDFE}
  .jdr summary{cursor:pointer;font-weight:700;font-size:14px;padding:12px 0;color:var(--cerulean-d)}
  .jdrbody{font-size:13.5px;padding-bottom:12px;line-height:1.6}
  .jdrbody ul{margin:6px 0 6px 18px} .jdrbody li{margin-bottom:6px}
  .jdrbody .src{color:var(--muted);font-size:12px;margin-top:6px}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);padding:16px}
  .comfort{position:fixed;top:52px;right:14px;z-index:60;width:286px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 40px rgba(23,48,73,.18);padding:16px 17px}
  .comfort[hidden]{display:none}
  .comfort h2{font-size:15px;margin:0 0 4px} .comfort .lead{font-size:12px;color:var(--muted);margin-bottom:8px}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:14px;font-weight:600;border-top:1px solid var(--line)}
  .crow small{display:block;color:var(--muted);font-size:11.5px;font-weight:400}
  .seg{display:flex;gap:4px;background:var(--bg);border-radius:11px;padding:3px}
  .seg button{border:0;background:none;font:inherit;font-weight:800;padding:5px 11px;border-radius:8px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(23,48,73,.14)}
  .sw{position:relative;width:44px;height:26px;flex:none}
  .sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .sw i{position:absolute;inset:0;background:#cdd7e0;border-radius:20px;transition:.15s}
  .sw i:before{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.15s}
  .sw input:checked + i{background:var(--cerulean)} .sw input:checked + i:before{transform:translateX(18px)}
  body.big .shell{zoom:1.12} body.bigger .shell{zoom:1.26}
  body.roomy .card{line-height:1.9;letter-spacing:.01em}
  body.calm *{animation:none !important;transition:none !important}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}
</style>
</head>
<body>
  <nav class="tk-nav">
    <a class="tk-logo" href="/" aria-label="Naar GRWN"><img src="/grwn-logo.svg" alt="GRWN" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=&quot;fb&quot;>GR<b>W</b>N</span>')"></a>
    <div class="tk-right">
      <button id="comfortBtn" aria-haspopup="dialog" aria-expanded="false" title="Leescomfort & toegankelijkheid">🅰 Leescomfort</button>
      <button id="restartBtn">↺ Begin</button>
      <a href="/">← naar GRWN</a>
    </div>
  </nav>
  <div id="comfort" class="comfort" role="dialog" aria-label="Leescomfort" hidden>
    <h2>Leescomfort</h2>
    <p class="lead">Stel in wat prettig leest — wordt onthouden op dit apparaat.</p>
    <div class="crow"><span>Tekstgrootte</span><div class="seg" role="group" aria-label="Tekstgrootte">
      <button data-fs="" aria-label="Normaal">A</button><button data-fs="big" aria-label="Groot">A+</button><button data-fs="bigger" aria-label="Extra groot">A++</button></div></div>
    <label class="crow"><span>Rustige modus<small>minder beweging</small></span><span class="sw"><input type="checkbox" id="c-calm"><i></i></span></label>
    <label class="crow"><span>Ruime regelafstand<small>rustiger lezen</small></span><span class="sw"><input type="checkbox" id="c-roomy"><i></i></span></label>
    <p class="lead" style="margin-top:9px">Neem gerust je tijd — er is geen haast.</p>
  </div>

  <div class="shell"><div id="app"></div></div>
  <div class="foot">Een instrument van <a href="/">GRWN</a> · JD-R model · with AI</div>

<script>
const KEY='fw2_v2';
const MODES={
  zelf:{em:'🧭',naam:'Zelfreflectie',desc:'Je doorloopt het zelf, in je eigen tempo — de AI denkt per stap met je mee.'},
  interviewer:{em:'🗣️',naam:'Ik begeleid (interviewer)',desc:'Jij voert het gesprek. Je ziet per stap de kernvraag en de vragen die je kunt stellen.'},
  respondent:{em:'💬',naam:'Ik word begeleid',desc:'Je beantwoordt per stap de kernvraag, ziet het proces en de AI denkt met je mee.'}
};
var state={mode:null,naam:'',taken:[],afweging:null,answers:{},step:'werk',ai:{}};
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function load(){try{const s=localStorage.getItem(KEY);if(s)state=Object.assign(state,JSON.parse(s))}catch(e){}}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* Per stap: één simpele kernvraag (vraag) met een concreet voorbeeld (ph). De scriptvragen staan als begeleiding (guide). */
const S={
  werk:{titel:'Werksituatie',id:'werk',vraag:'Vertel eens: hoe ziet een gewone werkdag van jou eruit?',
    ph:'Bijv. Ik start met mijn mail, daarna overleg, dan dossiers… Wat doe je zoal, en wat valt je op?',
    ctx:'We beginnen bij je dagelijkse werk. Beschrijf het gewoon in je eigen woorden — daarna halen we samen de terugkerende taken eruit.',
    guide:['Welke taken of situaties komen vaak terug?','Hoe ervaar je jouw werk op dit moment, en waardoor komt dat?'],
    tipsI:['Gebruik open vragen (hoe, wat, welke).','Vat samen wat je hoort en check of je het goed begrijpt.','Focus op inzicht en oplossingen, niet op oordeel.']},
  effect:{titel:'Lange termijn',id:'effect',vraag:'Als je zo doorgaat, hoe voel je je dan over een tijdje?',
    ph:'Bijv. Ik ben bang dat ik opbrand / Ik zou meer rust en trots willen voelen.',
    ctx:'Sta even stil bij de langere termijn — daar zit vaak je motivatie om iets te veranderen.',
    guide:['Wat gebeurt er met jouw balans als je dit zo blijft doen?','Als je meer energie en minder stress hebt, wat kun je dan bereiken?','Hoe zou het voelen als je vaker trots bent op wat je doet?','Wat zou het jou opleveren als je meer uitdagende taken hebt?']},
  uitdaag:{titel:'Uitdagend',id:'ud_nodig',vraag:'Wat zou je helpen om méér te doen van het werk dat je energie geeft?',
    ph:'Bijv. meer tijd, samenwerken met een bepaalde collega, een training, ruimte van mijn leidinggevende…',
    ctx:'Je versterkt wat energie geeft. Verken wat je nodig hebt om meer van dit soort werk te doen.',guide:[]},
  hulpzelf:{titel:'Hulp: jezelf',id:'hulp_zelf',vraag:'Wat kun jij zélf doen of inzetten om dit lastige deel lichter te maken?',
    ph:'Bijv. een talent van me gebruiken, mijn grens aangeven, mijn energie beter verdelen…',
    ctx:'Denk aan hulp die in jóu zit: je talenten, je veerkracht, je mindset.',
    guide:['Kun je jouw stem laten horen wanneer het nodig is?','Bezit je talenten en/of sterke punten die je nu in kunt zetten?','Hoe ga je om met onverwachte uitdagingen?','Is jouw energie in balans, ben je hier bewust mee bezig?','Welke mindset kan je nu helpen?']},
  hulporg:{titel:'Hulp: organisatie',id:'hulp_org',vraag:'Welke hulp of steun vanuit je werk zou je hierbij helpen?',
    ph:'Bijv. meer autonomie, duidelijkere afspraken, betere systemen, hulp van een collega of leidinggevende…',
    ctx:'Denk aan hulp om je heen: mensen, opleiding, systemen, duidelijkheid.',
    guide:['Heb je voldoende autonomie om keuzes te maken in je werk?','Is er sprake van rolduidelijkheid?','Geeft je leidinggevende feedback en coaching?','Zijn de systemen ondersteunend aan jouw taak?','Heb je voldoende kennis en kunde op dit gebied?']},
  afweging:{titel:'Afweging',vraag:'Denk je dat dit genoeg is om het werk weer prettig te maken?',choice:true,
    ctx:'Weeg af of de hulp — vanuit jezelf én je werk — genoeg is.'},
  andere:{titel:'Andere stappen',id:'andere',vraag:'Wat zou je nog méér kunnen doen om de druk te verlichten?',
    ph:'Bijv. een taak schrappen of vereenvoudigen, anders prioriteren, iets uit handen geven…',
    ctx:'De hulp is misschien nog niet genoeg. Kijk naar andere manieren — ook dit worden hulpbronnen.',
    guide:['Zijn er taken die je kunt vereenvoudigen of schrappen?','Is de prioritering juist?','Hoe kun je nu jouw tijdsdruk verminderen?']},
  concreet:{titel:'Concrete stappen',id:'concreet',vraag:'Wat ga je concreet doen — en wanneer?',
    ph:'Bijv. Deze week bespreek ik X met mijn leidinggevende. Uiterlijk vrijdag.',
    ctx:'Beide sporen komen hier samen. Maak het klein en concreet — kleine stappen tellen.',
    guide:['Wat kun je deze week doen om meer grip te krijgen op je werkdruk?','Met wie ga je in gesprek om meer steun of samenwerking te organiseren?','Welke ontwikkelmogelijkheid wil je concreet oppakken, en wanneer?','Wat is je deadline voor deze eerste stap?','Welke vervolgstap volgt daarna om de balans verder te verbeteren?']},
  goedbezig:{titel:'Goed bezig',id:'goedbezig',vraag:'Wat gaat er al goed? Waar mag je trots op zijn?',
    ph:'Bijv. Ik weet nu helder wat me energie geeft / Ik durf hulp te vragen.',
    ctx:'Sluit positief af: benoem wat goed gaat.',
    guide:['Goed dat je helder kunt benoemen wat jou energie geeft.','Fijn dat je zelf al ideeën hebt om meer uitdagende taken te creëren.','Goed dat je aangeeft welke ondersteuning je mist — dat helpt om samen te verbeteren.','Je hebt duidelijk inzicht in wat je nodig hebt; hoe ga je dit realiseren?']},
  afsluiting:{titel:'Afsluiting',id:'af_opbrengst',vraag:'Wat neem je uit dit gesprek mee?',
    ph:'Bijv. één concrete stap, een nieuw inzicht, of gewoon meer rust in mijn hoofd.',
    ctx:'Rond af en vat kort samen wat het je heeft opgeleverd.',guide:[]}
};
const RAILLABEL={werk:'Werksituatie',taken:'Taken',effect:'Lange termijn',hulpzelf:'Hulp: jezelf',hulporg:'Hulp: organisatie',afweging:'Afweging',andere:'Andere stappen',uitdaag:'Uitdagend',concreet:'Concrete stappen',goedbezig:'Goed bezig',afsluiting:'Afsluiting',rapport:'Rapportage'};

function labels(){const s=new Set(state.taken.map(t=>t.label).filter(Boolean));return{hinder:s.has('hinderlijk'),uitdaag:s.has('uitdagend')}}
function flow(){
  const f=['werk','taken','effect']; const L=labels();
  if(L.uitdaag){f.push('uitdaag');}
  if(L.hinder){f.push('hulpzelf','hulporg','afweging'); if(state.afweging==='nee')f.push('andere');}
  f.push('concreet','goedbezig','afsluiting','rapport');
  return f;
}
function go(step){state.step=step;save();render()}
function nextStep(){const f=flow();const i=f.indexOf(state.step);if(i<f.length-1)go(f[i+1])}
function prevStep(){const f=flow();const i=f.indexOf(state.step);if(i>0)go(f[i-1]);else{state.mode=null;save();render()}}
const app=document.getElementById('app');

function render(){
  save();
  if(!state.mode){renderStart();return}
  if(!flow().includes(state.step))state.step='werk';
  app.innerHTML='<div class="cols">'+renderRail()+'<div>'+renderStep()+'</div></div>';
  bindStep();
}
function jdrHtml(){return '<div class="jdrbody">'+
 '<p>Deze tool volgt het <b>Job Demands-Resources model</b> (Schaufeli):</p><ul>'+
 '<li><b>Werkstressoren</b> (werkeisen zoals werkdruk, werk/priv\u00e9, rolconflict) leiden via <b>stress-reacties</b> tot minder welzijn \u2014 het <i>uitputtingsproces</i>. In deze tool: je <b>hinderlijke taken</b>.</li>'+
 '<li><b>Energiebronnen</b> (hulpbronnen uit het werk: steun, autonomie, feedback, ontwikkeling) leiden via <b>bevlogenheid</b> tot betere resultaten \u2014 het <i>motivatieproces</i>. In deze tool: <b>Hulp vanuit de organisatie</b>.</li>'+
 '<li><b>Persoonlijke hulpbronnen</b> (veerkracht, talent, mindset) dempen stress \u00e9n versterken bevlogenheid. In deze tool: <b>Hulp vanuit jezelf</b>.</li>'+
 '<li><b>Buffer</b>: hulpbronnen verzachten de impact van werkstressoren. In deze tool: de afweging \u201ckun je met deze hulpbronnen het werk weer in balans maken?\u201d.</li>'+
 '<li><b>Uitdagend vs. hinderlijk werk</b> is een erkende verfijning (challenge- vs. hindrance-eisen): uitdagend werk motiveert (mits er genoeg hulpbronnen tegenover staan), hinderlijk werk kost vooral energie.</li>'+
 '</ul><p class="src">Bron: Wilmar Schaufeli \u2014 Job Demands-Resources model.</p></div>';}
function renderStart(){
  let m=Object.keys(MODES).map(k=>'<button class="mode" onclick="pickMode(\''+k+'\')"><div class="em">'+MODES[k].em+'</div><h4>'+MODES[k].naam+'</h4><p>'+MODES[k].desc+'</p></button>').join('');
  app.innerHTML='<div class="card"><span class="eyebrow">JD-R · positieve psychologie</span>'+
    '<h1>De weg naar een fijne werkdag</h1>'+
    '<p class="ctx">Een gesprek over je werk dat energie geeft en energie kost — en wat je eraan kunt doen. Kies hoe je het wilt doen:</p>'+
    '<div class="modes">'+m+'</div>'+
    '<div class="field"><label for="nm">Je naam (optioneel)</label><input id="nm" value="'+esc(state.naam)+'" placeholder="bijv. Sam" oninput="state.naam=this.value"></div>'+
    '<details class="jdr"><summary>\u2139\ufe0f Zo werkt het JD-R model achter deze tool</summary>'+jdrHtml()+'</details>'+
    '</div>';
}
function pickMode(m){state.mode=m;state.step='werk';save();render()}

function renderRail(){
  const f=flow();const i=f.indexOf(state.step);
  let li=f.map((k,idx)=>{const cls=(k===state.step?'on ':'')+(idx<i?'done ':'');
    return '<li class="'+cls.trim()+'"><button onclick="go(\''+k+'\')"><span class="dot"></span>'+RAILLABEL[k]+'</button></li>';}).join('');
  return '<aside class="rail"><h3>'+MODES[state.mode].em+' '+MODES[state.mode].naam+'</h3><ol>'+li+'</ol>'+
    '<div class="home"><a href="#" onclick="return backHome()">↩ Terug naar begin</a></div></aside>';
}
function backHome(){if(confirm('Terug naar het beginscherm? Je antwoorden blijven bewaard.')){state.mode=null;save();render()}return false}

function guideHtml(d){
  if(!d.guide||!d.guide.length)return '';
  const t=(state.mode==='interviewer')?'Vragen die je kunt stellen':'Denk hierbij aan';
  return '<div class="tips"><b>'+t+'</b><ul>'+d.guide.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>';
}
function tipsHtml(d){
  if(state.mode!=='interviewer'||!d.tipsI||!d.tipsI.length)return '';
  return '<div class="tips" style="border-left-color:var(--gold)"><b>Begeleidingstips</b><ul>'+d.tipsI.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>';
}
function fieldHtml(d){
  return '<textarea id="'+d.id+'" placeholder="'+esc(d.ph||'Jouw antwoord…')+'" oninput="state.answers[\''+d.id+'\']=this.value;save()">'+esc(state.answers[d.id]||'')+'</textarea>';
}
function aiHtml(d){
  if(state.mode==='interviewer')return '';
  return '<div class="aiwrap open" id="aiwrap"><div class="aihelphead">✨ AI-hulp bij deze stap — vastlopen of twijfel? Ik denk met je mee.</div>'+
    '<div class="aibody"><div class="aiquick"><button class="btn sm mag" onclick="aiFeedback()">🤝 Denk met me mee</button><button class="btn sm ghost" onclick="aiExample()">💡 Geef een voorbeeld</button></div>'+
    '<div id="aichat"></div><div class="airow"><input id="aiinp" placeholder="Of stel zelf een vraag…" onkeydown="if(event.key===\'Enter\')askAI()"><button class="btn sm ghost" onclick="askAI()">Vraag</button></div></div></div>';
}
function navBtns(){
  const f=flow();const i=f.indexOf(state.step);
  let html='<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button>';
  if(i<f.length-1)html+='<button class="btn" onclick="nextStep()">Volgende →</button>';
  return html+'</div>';
}
function renderStep(){
  const k=state.step;
  if(k==='taken')return renderTaken();
  if(k==='rapport')return renderReport();
  if(k==='afweging')return renderAfweging();
  const d=S[k];
  return '<div class="card"><span class="eyebrow">'+esc(d.titel)+'</span><h1>'+esc(d.vraag)+'</h1>'+
    '<p class="ctx">'+esc(d.ctx)+'</p>'+fieldHtml(d)+guideHtml(d)+tipsHtml(d)+aiHtml(d)+navBtns()+'</div>';
}
function renderAfweging(){
  const d=S.afweging;
  return '<div class="card"><span class="eyebrow">'+d.titel+'</span><h1>'+esc(d.vraag)+'</h1><p class="ctx">'+esc(d.ctx)+'</p>'+
    '<div class="btnrow"><button class="btn '+(state.afweging==='ja'?'':'ghost')+'" onclick="setAfw(\'ja\')">Ja, dat lukt</button>'+
    '<button class="btn '+(state.afweging==='nee'?'mag':'ghost')+'" onclick="setAfw(\'nee\')">Nee, nog niet</button></div>'+
    aiHtml(d)+
    '<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button>'+
    (state.afweging?'<button class="btn" onclick="nextStep()">Volgende →</button>':'')+'</div></div>';
}
function setAfw(v){state.afweging=v;save();render()}

function renderTaken(){
  const rows=state.taken.map((t,idx)=>
    '<div class="task"><input class="t" value="'+esc(t.tekst)+'" oninput="state.taken['+idx+'].tekst=this.value;save()">'+
    '<div class="lab"><button class="u '+(t.label==='uitdagend'?'on':'')+'" onclick="labelTask('+idx+',\'uitdagend\')" title="Geeft energie">Uitdagend</button>'+
    '<button class="h '+(t.label==='hinderlijk'?'on':'')+'" onclick="labelTask('+idx+',\'hinderlijk\')" title="Kost energie">Hinderlijk</button></div>'+
    '<button class="x" onclick="delTask('+idx+')" aria-label="Verwijder">✕</button></div>').join('');
  const L=labels();const anyLabeled=state.taken.some(t=>t.label);
  const spoor=(L.uitdaag&&L.hinder)?'Je krijgt straks <b>beide sporen</b>: energiegevers én energievreters.':(L.uitdaag?'Je krijgt het <b>uitdagende spoor</b>.':(L.hinder?'Je krijgt het <b>hinderlijke spoor</b>.':''));
  return '<div class="card"><span class="eyebrow">Taken</span><h1>Welke taken springen eruit?</h1>'+
    '<p class="ctx">Verzamel je terugkerende taken. Laat de AI een voorzet doen, vul aan wat mist, en label elke taak: geeft die energie (<b>uitdagend</b>) of kost die energie (<b>hinderlijk</b>)? Dit bepaalt welk spoor je hierna doorloopt.</p>'+
    '<div class="btnrow" style="margin:8px 0 14px"><button class="btn mag sm" id="extractBtn" onclick="extractTaken()">✨ Laat AI taken voorstellen</button></div>'+
    '<div id="taskList">'+(rows||'<p class="ctx">Nog geen taken. Voeg ze hierboven met AI toe of hieronder handmatig.</p>')+'</div>'+
    '<div class="addrow"><input id="newTask" placeholder="Zelf een taak toevoegen…" onkeydown="if(event.key===\'Enter\')addTask()"><button class="btn ghost sm" onclick="addTask()">Toevoegen</button></div>'+
    (spoor?'<p class="ctx" style="margin-top:12px">'+spoor+'</p>':'<p class="ctx" style="margin-top:12px">Label minstens één taak om verder te gaan.</p>')+
    '<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button>'+
    (anyLabeled?'<button class="btn" onclick="nextStep()">Volgende →</button>':'')+'</div></div>';
}
function labelTask(i,l){state.taken[i].label=(state.taken[i].label===l?null:l);save();render()}
function delTask(i){state.taken.splice(i,1);save();render()}
function addTask(){const el=document.getElementById('newTask');const v=(el.value||'').trim();if(!v)return;state.taken.push({tekst:v,label:null});el.value='';save();render()}
async function extractTaken(){
  const b=document.getElementById('extractBtn');b.disabled=true;b.innerHTML='<span class="spin"></span>Bezig…';
  const ws=state.answers.werk||'';
  try{
    const r=await fetch('/api/jdr-taken',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({werksituatie:ws})});
    const d=await r.json();
    if(d.taken&&d.taken.length){d.taken.forEach(t=>{if(!state.taken.some(x=>x.tekst.toLowerCase()===t.toLowerCase()))state.taken.push({tekst:t,label:null})});save();render();}
    else{b.disabled=false;b.textContent='Geen taken gevonden — voeg ze handmatig toe';}
  }catch(e){b.disabled=false;b.textContent='Ophalen lukte niet — voeg handmatig toe';}
}

function aiRender(){
  const box=document.getElementById('aichat');if(!box)return;
  const list=state.ai[state.step]||[];
  box.innerHTML=list.map(m=>'<div class="aimsg '+(m.role==='user'?'me':'ai')+'">'+esc(m.content).replace(/\n/g,'<br>')+'</div>').join('');
  box.scrollTop=box.scrollHeight;
}
async function aiSend(text){
  if(!state.ai[state.step])state.ai[state.step]=[];
  state.ai[state.step].push({role:'user',content:text});
  state.ai[state.step].push({role:'assistant',content:'…'});save();aiRender();
  const d=S[state.step]||{};const ctx=(d.vraag||'')+' — '+(d.ctx||'');
  try{
    const r=await fetch('/api/jdr-coach',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:state.ai[state.step].filter(m=>m.content!=='…'),step:ctx})});
    const j=await r.json();
    state.ai[state.step].pop();
    state.ai[state.step].push({role:'assistant',content:(r.ok&&j.text)?j.text:('Even niet gelukt: '+(j.error||'onbekend'))});
  }catch(e){state.ai[state.step].pop();state.ai[state.step].push({role:'assistant',content:'Geen verbinding met de AI (werkt niet lokaal).'})}
  save();aiRender();
}
function askAI(){const inp=document.getElementById('aiinp');const v=(inp.value||'').trim();if(!v)return;inp.value='';aiSend(v)}
function aiFeedback(){const a=(state.answers[(S[state.step]||{}).id]||'').trim();
  if(!a){aiSend('Ik weet nog niet goed wat ik hier moet antwoorden. Leg de vraag simpel uit en geef één concreet voorbeeld waar ik aan kan denken.');return}
  aiSend('Dit is mijn antwoord tot nu toe: "'+a+'". Denk met me mee: geef korte, warme feedback, één concrete suggestie of voorbeeld, en één vervolgvraag om dieper te gaan.');}
function aiExample(){aiSend('Geef een kort, concreet voorbeeld-antwoord op deze vraag, en leg in één zin uit waar ik aan kan denken. Het hoeft niet op mij te slaan — puur ter inspiratie.');}
function bindStep(){ if(document.getElementById('aichat'))aiRender(); }

function buildText(){
  let t='RAPPORTAGE — De weg naar een fijne werkdag\n';
  if(state.naam)t+='Naam: '+state.naam+'\n';
  t+='Datum: '+new Date().toLocaleDateString('nl-NL')+'\n\n';
  t+='TAKEN:\n'+(state.taken.map(x=>'- '+x.tekst+(x.label?' ['+x.label+']':'')).join('\n')||'-')+'\n\n';
  flow().forEach(k=>{const d=S[k];if(!d||!d.id)return;const a=state.answers[d.id];if(!a)return;t+=d.vraag+'\n'+a+'\n\n';});
  if(state.afweging)t+='AFWEGING: hulpbronnen voldoende? '+state.afweging+'\n';
  return t.trim();
}
function renderReport(){
  return '<div class="card"><span class="eyebrow">Rapportage</span><h1>Jouw rapportage</h1>'+
    '<p class="ctx">Hieronder je samenvatting. Vraag desgewenst een AI-analyse volgens het JD-R model, of exporteer.</p>'+
    '<div class="btnrow" style="margin:6px 0 4px"><button class="btn mag" onclick="analyse()">✨ AI-analyse (JD-R)</button>'+
    '<button class="btn ghost" onclick="window.print()">🖨 Print / PDF</button>'+
    '<button class="btn ghost" onclick="dlTxt()">⬇ Tekst</button>'+
    '<button class="btn ghost" onclick="mailIt()">✉ E-mail</button></div>'+
    '<div id="aiBox"></div>'+
    '<div class="repblock">'+esc(buildText())+'</div>'+
    '<div class="btnrow"><button class="btn ghost" onclick="prevStep()">← Vorige</button></div></div>';
}
function dlTxt(){const b=new Blob([buildText()],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fijne-werkdag'+(state.naam?'-'+state.naam:'')+'.txt';a.click()}
function mailIt(){location.href='mailto:?subject='+encodeURIComponent('Rapportage – Fijne werkdag'+(state.naam?' '+state.naam:''))+'&body='+encodeURIComponent(buildText())}
function mdToHtml(t){let h='';t.split('\n').forEach(l=>{l=l.trim();if(!l)return;if(/^#/.test(l)){h+='<h3>'+esc(l.replace(/^#+\s*/,''))+'</h3>'}else if(/^[-•]/.test(l)){h+='<ul><li>'+esc(l.replace(/^[-•]\s*/,''))+'</li></ul>'}else{h+='<p>'+esc(l)+'</p>'}});return '<div class="aimd">'+h+'</div>'}
async function analyse(){
  const box=document.getElementById('aiBox');box.innerHTML='<div class="repblock"><span class="spin"></span> Bezig met de JD-R-analyse…</div>';
  try{
    const r=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report:buildText()})});
    const d=await r.json();
    if(r.ok&&d.text){box.innerHTML='<div class="repblock">'+mdToHtml(d.text)+'<div class="disc">AI-gegenereerd op basis van je antwoorden — een hulpmiddel, geen oordeel.</div></div>'}
    else{box.innerHTML='<div class="repblock">De analyse lukte niet: '+esc(d.error||'onbekend')+'</div>'}
  }catch(e){box.innerHTML='<div class="repblock">Geen verbinding met de analyse (werkt niet lokaal).</div>'}
}

(function(){
  var A={};try{A=JSON.parse(localStorage.getItem('fw_a11y')||'{}')}catch(e){}
  if(A.calm===undefined&&window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches)A.calm=true;
  var $=function(id){return document.getElementById(id)};
  function ap(){document.body.classList.toggle('big',A.fs==='big');document.body.classList.toggle('bigger',A.fs==='bigger');
    document.body.classList.toggle('calm',!!A.calm);document.body.classList.toggle('roomy',!!A.roomy);
    document.querySelectorAll('#comfort [data-fs]').forEach(function(b){b.classList.toggle('on',(A.fs||'')===b.dataset.fs)});
    if($('c-calm'))$('c-calm').checked=!!A.calm;if($('c-roomy'))$('c-roomy').checked=!!A.roomy}
  function sv(){try{localStorage.setItem('fw_a11y',JSON.stringify(A))}catch(e){}ap()}
  $('comfortBtn').onclick=function(){var c=$('comfort');var o=c.hidden;c.hidden=!o;this.setAttribute('aria-expanded',o?'true':'false')};
  $('comfort').addEventListener('click',function(e){var b=e.target.closest('[data-fs]');if(b){A.fs=b.dataset.fs;sv()}});
  $('c-calm').onchange=function(e){A.calm=e.target.checked;sv()};$('c-roomy').onchange=function(e){A.roomy=e.target.checked;sv()};
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&!$('comfort').hidden){$('comfort').hidden=true;$('comfortBtn').setAttribute('aria-expanded','false')}});
  document.addEventListener('click',function(e){if(!$('comfort').hidden&&!e.target.closest('#comfort')&&!e.target.closest('#comfortBtn')){$('comfort').hidden=true;$('comfortBtn').setAttribute('aria-expanded','false')}});
  ap();
})();
document.getElementById('restartBtn').onclick=function(){if(confirm('Opnieuw beginnen? Je antwoorden worden gewist.')){state={mode:null,naam:'',taken:[],afweging:null,answers:{},step:'werk',ai:{}};save();render()}};

load();render();
</script>
</body>
</html>
