<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wereldweb · Energie-afhankelijkheden</title>
<style>
  :root{
    --bg:#0a0f1e; --bg2:#0e1630; --panel:#121b34; --panel2:#1a2547; --line:rgba(255,255,255,.10);
    --text:#eaf0ff; --muted:#93a1c4; --accent:#46d6c6; --accent2:#7c9bff;
    --gas:#5ec8ff; --oil:#ffb454; --choke:#ff5d6c; --producer:#ffd23f; --consumer:#9d7bff;
    --ok:#5fe39a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:
      radial-gradient(1200px 700px at 70% -10%, #16224a 0%, transparent 60%),
      linear-gradient(180deg,#0b1124,#070b16) fixed;
    color:var(--text);min-height:100vh;overflow-x:hidden;}
  a{color:var(--accent);}
  .top{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);
    background:rgba(8,12,26,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:.2px;}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#7af0e4,#2a9d92);box-shadow:0 0 14px rgba(70,214,198,.7);}
  .brand small{font-weight:600;color:var(--muted);font-size:12px;margin-left:2px;}
  .top .spacer{flex:1;}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;}
  .seg button{border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:13px;
    padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .seg button.on{background:var(--accent);color:#06231e;}
  .seg.lvl button.on{background:var(--accent2);color:#0a1030;}
  .layout{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 56px);}
  @media(max-width:880px){.layout{grid-template-columns:1fr;}}
  .stage{position:relative;min-height:52vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #globe{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
  #globe:active{cursor:grabbing;}
  .legend{position:absolute;left:14px;bottom:12px;display:flex;flex-wrap:wrap;gap:6px 12px;font-size:11.5px;color:var(--muted);
    background:rgba(8,12,26,.55);border:1px solid var(--line);border-radius:10px;padding:8px 11px;backdrop-filter:blur(4px);max-width:calc(100% - 28px);}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
  .hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);font-size:12px;color:var(--muted);
    background:rgba(8,12,26,.55);border:1px solid var(--line);border-radius:999px;padding:5px 13px;pointer-events:none;}
  .panel{background:var(--panel);border-left:1px solid var(--line);padding:18px;overflow-y:auto;max-height:calc(100vh - 56px);}
  @media(max-width:880px){.panel{border-left:0;border-top:1px solid var(--line);max-height:none;}}
  .pcard{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:12px;}
  .pcard h3{font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .pcard p{font-size:14px;line-height:1.6;color:#d6def5;}
  .ptitle{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:2px 0 10px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;}
  .ichip{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);font:inherit;font-weight:700;font-size:13.5px;padding:11px 13px;border-radius:12px;cursor:pointer;transition:.12s;}
  .ichip:hover{border-color:var(--accent);transform:translateY(-1px);}
  .ichip.on{border-color:var(--choke);background:rgba(255,93,108,.12);}
  .ichip .em{font-size:18px;flex:none;}
  .ichip small{display:block;color:var(--muted);font-weight:600;font-size:11.5px;margin-top:1px;}
  .impact{margin-top:10px;}
  .impact .tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;margin:0 5px 6px 0;}
  .tag.hit{background:rgba(255,93,108,.16);color:#ff8a95;border:1px solid rgba(255,93,108,.4);}
  .tag.up{background:rgba(255,180,84,.14);color:var(--oil);border:1px solid rgba(255,180,84,.35);}
  .scbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .btn{border:0;border-radius:11px;font:inherit;font-weight:800;font-size:14px;padding:11px 16px;cursor:pointer;background:var(--accent);color:#06231e;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn:disabled{opacity:.4;cursor:default;}
  .steps{display:flex;gap:5px;margin:4px 0 12px;}
  .steps i{flex:1;height:5px;border-radius:3px;background:var(--panel2);}
  .steps i.on{background:var(--accent2);}
  .choices{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .choice{text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);font:inherit;font-weight:700;
    font-size:13.5px;padding:11px 13px;border-radius:12px;cursor:pointer;}
  .choice:hover{border-color:var(--accent2);}
  .foot{font-size:11px;color:var(--muted);text-align:center;padding:10px;border-top:1px solid var(--line);}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .nlbox{margin-top:10px;background:rgba(255,180,84,.10);border:1px solid rgba(255,180,84,.35);border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.55;color:#ffe2bd;}
  .basis{font-size:12px;color:var(--muted);font-style:italic;background:rgba(124,155,255,.08);border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-top:8px;line-height:1.5;}
  .basis b{font-style:normal;color:var(--accent2);}
  .meldrow{margin-top:14px;text-align:center;}
  .meldrow a{color:var(--muted);font-size:12px;text-decoration:none;}
  .meldrow a:hover{color:var(--choke);}
  .wmodal{position:fixed;inset:0;background:rgba(5,8,18,.72);display:flex;align-items:center;justify-content:center;padding:18px;z-index:60;}
  .wmodal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:470px;width:100%;max-height:85vh;overflow-y:auto;}
  .wmodal .box h2{font-size:18px;margin-bottom:6px;}
  .wmodal .box a{color:var(--accent);}
  .wmodal .box button{margin-top:8px;background:var(--accent);color:#06231e;border:0;border-radius:10px;font-weight:800;padding:10px 16px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><span class="dot"></span>Wereldweb <small>· energie</small></div>
    <div class="spacer"></div>
    <div class="seg lvl" id="lvlSeg">
      <button data-lvl="kind">Kind</button>
      <button data-lvl="tiener" class="on">Tiener</button>
      <button data-lvl="volw">Volwassen</button>
    </div>
    <div class="seg" id="modeSeg">
      <button data-mode="verken" class="on">🌍 Verken</button>
      <button data-mode="ai">🎯 Scenario's</button>
    </div>
  </div>

  <div class="layout">
    <div class="stage">
      <svg id="globe"></svg>
      <div class="hint" id="hint">Sleep om de globe te draaien · tik op een land</div>
      <div class="legend">
        <span><i style="background:var(--producer)"></i>producent</span>
        <span><i style="background:var(--consumer)"></i>afnemer</span>
        <span><i style="background:var(--choke)"></i>knooppunt</span>
        <span><i style="background:var(--gas)"></i>gas</span>
        <span><i style="background:var(--oil)"></i>olie</span>
      </div>
      <div class="loading" id="loading">Globe laden…</div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
  <div class="foot">Vereenvoudigd educatief model van echte afhankelijkheden — bedoeld om te begrijpen, niet als exacte data. <a href="#" onclick="return openBronnen()" style="color:var(--accent2)">Bronnen &amp; uitleg</a> · © Wereldweb</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

let activeDisrupt=null;      // verken-modus
let selCountry=null;
let scenario=null, scStep=0, scChosen=null;
let aiMode='realistisch', aiHistory=[], aiScene=null, aiLoading=false, aiError='', aiRetries=0, aiWaiting=false;

/* =======================================================================
   GLOBE (D3 orthografisch, SVG — werkt ook zonder landgrenzen)
======================================================================= */
const svg=d3.select('#globe');
let W=0,H=0,scale=0;
const projection=d3.geoOrthographic().clipAngle(90).precision(.4);
const path=d3.geoPath(projection);
let land=null, rotation=[ -20,-25,0 ], dragging=false, autoRot=true;

const gSphere=svg.append('path').attr('class','sphere');
const gGrat=svg.append('path').attr('fill','none');
const gLand=svg.append('path');
const gArcs=svg.append('g');
const gPts=svg.append('g');
const gLbl=svg.append('g');
const graticule=d3.geoGraticule10();

function resize(){
  const st=document.querySelector('.stage');
  W=st.clientWidth; H=st.clientHeight||st.clientWidth;
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('width',W).attr('height',H);
  scale=Math.min(W,H)/2.15;
  projection.scale(scale).translate([W/2,H/2]).rotate(rotation);
  render();
}
function visible(lonlat){ return d3.geoDistance(lonlat,[-rotation[0],-rotation[1]])<Math.PI/2-0.02; }

function render(){
  projection.rotate(rotation);
  gSphere.attr('d',path({type:'Sphere'})).attr('fill','#0b1430').attr('stroke','rgba(120,160,255,.25)').attr('stroke-width',1);
  gGrat.attr('d',path(graticule)).attr('stroke','rgba(120,150,220,.10)').attr('stroke-width',.6);
  if(land) gLand.attr('d',path(land)).attr('fill','#16213f').attr('stroke','rgba(140,170,230,.22)').attr('stroke-width',.5);
  drawArcs(); drawPoints();
}

function curArcs(){
  if(MODE==='ai'){ return ((aiScene&&aiScene.stromen)||[]).map(s=>({v:s.van,n:s.naar,s:s.soort==='olie'?'olie':'gas'})); }
  if(MODE==='scenario'&&scenario){ return DISRUPTIONS.find(d=>d.id===scenario.disrupt).arcs; }
  if(activeDisrupt){ return activeDisrupt.arcs; }
  if(selCountry){ return FLOWS.filter(f=>f.v===selCountry||f.n===selCountry); }
  return FLOWS; // overzicht
}
function drawArcs(){
  const arcs=curArcs();
  const data=arcs.map(f=>{ const a=C[f.v],b=C[f.n]; if(!a||!b)return null;
    return {d:{type:'LineString',coordinates:[a,b]}, s:f.s}; }).filter(Boolean);
  const sel=gArcs.selectAll('path').data(data);
  sel.enter().append('path').merge(sel)
    .attr('d',d=>path(d.d))
    .attr('fill','none')
    .attr('stroke',d=>d.s==='gas'?'var(--gas)':'var(--oil)')
    .attr('stroke-width',1.6).attr('stroke-linecap','round')
    .attr('opacity',.85).attr('stroke-dasharray','1 6');
  sel.exit().remove();
}
function highlightSet(){
  if(MODE==='ai'&&aiScene){ return new Set([...(aiScene.geraakt||[]),...(aiScene.omhoog||[])]); }
  if(MODE==='scenario'&&scenario){ return new Set(DISRUPTIONS.find(d=>d.id===scenario.disrupt).hits); }
  if(activeDisrupt) return new Set(activeDisrupt.hits);
  return new Set();
}
function drawPoints(){
  const hl=highlightSet();
  const nodes=[];
  for(const k in C){ nodes.push({k,ll:C[k],type:PRODUCERS.includes(k)?'prod':'cons'}); }
  for(const k in CHOKE){ nodes.push({k,ll:CHOKE[k],type:'choke'}); }
  const sel=gPts.selectAll('circle').data(nodes,d=>d.k);
  const ent=sel.enter().append('circle').attr('cursor','pointer')
    .on('click',(e,d)=>{ if(d.type!=='choke'){ selCountry=d.k; activeDisrupt=null; renderPanel(); render(); } });
  ent.merge(sel)
    .each(function(d){ d.vis=visible(d.ll); const p=projection(d.ll); d.x=p?p[0]:0; d.y=p?p[1]:0; })
    .attr('cx',d=>d.x).attr('cy',d=>d.y)
    .attr('r',d=> d.type==='choke'?5.5 : (d.k===selCountry?7:4.5))
    .attr('display',d=>d.vis?null:'none')
    .attr('fill',d=> d.type==='choke'?'var(--choke)': d.type==='prod'?'var(--producer)':'var(--consumer)')
    .attr('stroke',d=> hl.has(d.k)?'#fff':'rgba(0,0,0,.5)')
    .attr('stroke-width',d=> hl.has(d.k)?2.5:1)
    .attr('opacity',d=> (hl.size&&!hl.has(d.k)&&d.type!=='choke')?.4:1)
    .style('filter',d=> hl.has(d.k)?'drop-shadow(0 0 6px rgba(255,93,108,.9))':(d.type==='choke'?'drop-shadow(0 0 5px rgba(255,93,108,.6))':'none'));
  sel.exit().remove();

  // labels alleen voor highlight/selectie/knooppunt
  const labs=nodes.filter(d=>d.vis && (hl.has(d.k)||d.k===selCountry||d.type==='choke'));
  const ls=gLbl.selectAll('text').data(labs,d=>d.k);
  ls.enter().append('text').attr('font-size',11).attr('font-weight',700)
    .attr('fill','#dfe7ff').attr('paint-order','stroke').attr('stroke','#070b16').attr('stroke-width',3)
    .merge(ls).attr('x',d=>d.x+8).attr('y',d=>d.y+4).text(d=>lab(d.k));
  ls.exit().remove();
}

/* rotatie + sleep */
svg.call(d3.drag()
  .on('start',()=>{dragging=true;autoRot=false;})
  .on('drag',(e)=>{ const k=.3; rotation=[rotation[0]+e.dx*k, Math.max(-90,Math.min(90,rotation[1]-e.dy*k)), rotation[2]]; render(); })
  .on('end',()=>{dragging=false;}));
d3.timer(()=>{ if(autoRot&&!dragging){ rotation=[rotation[0]+0.12,rotation[1],rotation[2]]; render(); } });

/* land laden (optioneel — globe werkt ook zonder) */
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json()).then(world=>{ land=topojson.feature(world,world.objects.countries); render(); })
  .catch(()=>{}).finally(()=>{ const l=document.getElementById('loading'); if(l)l.style.display='none'; });

/* =======================================================================
   PANEL
======================================================================= */
const panel=document.getElementById('panel');
function focusOn(k){ // draai globe naar een land
  const ll=C[k]||CHOKE[k]; if(!ll)return; autoRot=false;
  const target=[-ll[0],-ll[1],0]; const start=rotation.slice(); let t0=null;
  d3.timer(function(el){ if(t0===null)t0=el; const k2=Math.min(1,(el-t0)/700);
    rotation=[start[0]+(target[0]-start[0])*k2, start[1]+(target[1]-start[1])*k2, 0]; render();
    return k2>=1; });
}
function renderPanel(){
  if(MODE==='verken') renderVerken(); else renderAI();
}
function renderVerken(){
  let html='';
  if(selCountry){
    const inf=INFO[selCountry], rol=(inf&&inf.rol)|| (PRODUCERS.includes(selCountry)?'producent':'afnemer');
    const txt=(inf&&inf[LEVEL])||DEFAULT_INFO[rol][LEVEL];
    const exp=FLOWS.filter(f=>f.v===selCountry), imp=FLOWS.filter(f=>f.n===selCountry);
    html+='<div class="pcard"><h3>'+(rol==='producent'?'🟡':'🟣')+' '+lab(selCountry)+'</h3><p>'+txt+'</p>';
    if(exp.length) html+='<div class="impact"><span class="ptitle">Levert aan</span><br>'+exp.map(f=>'<span class="tag '+(f.s==='gas'?'up':'up')+'" style="background:rgba(94,200,255,.12);color:'+(f.s==='gas'?'var(--gas)':'var(--oil)')+';border:1px solid var(--line)">'+lab(f.n)+' · '+f.s+'</span>').join('')+'</div>';
    if(imp.length) html+='<div class="impact"><span class="ptitle">Krijgt van</span><br>'+imp.map(f=>'<span class="tag" style="background:rgba(124,155,255,.12);color:var(--consumer);border:1px solid var(--line)">'+lab(f.v)+' · '+f.s+'</span>').join('')+'</div>';
    html+='</div>';
    html+='<button class="btn ghost" style="width:100%;margin-bottom:14px" onclick="clearSel()">↺ Toon alles</button>';
  } else {
    html+='<div class="pcard"><h3>🌍 Verken de afhankelijkheden</h3><p>Tik op een land op de globe om te zien wie energie levert en wie afhankelijk is. Of zet hieronder een <b>verstoring</b> aan en zie wat er gebeurt — én wat dat betekent voor <b>Nederland</b> 🇳🇱 en je portemonnee.</p></div>';
  }
  html+='<div class="ptitle">Wat als… (zet een verstoring aan)</div><div class="chip-row">';
  DISRUPTIONS.forEach(d=>{ const on=activeDisrupt&&activeDisrupt.id===d.id;
    html+='<button class="ichip'+(on?' on':'')+'" onclick="toggleDisrupt(\''+d.id+'\')"><span class="em">'+d.em+'</span><span>'+d.naam+'<small>'+d.sub+'</small></span></button>';
  });
  html+='</div>';
  if(activeDisrupt){
    const d=activeDisrupt;
    html+='<div class="pcard" style="margin-top:12px;border-color:rgba(255,93,108,.4)"><h3>'+d.em+' '+d.naam+'</h3><p>'+d[LEVEL]+'</p>';
    html+='<div class="impact"><span class="ptitle">Direct geraakt</span><br>'+d.hits.map(h=>'<span class="tag hit">'+lab(h)+'</span>').join('')+'</div>';
    if(d.up&&d.up.length) html+='<div class="impact"><span class="ptitle">Prijs/druk omhoog</span><br>'+d.up.map(h=>'<span class="tag up">'+lab(h)+' ↑</span>').join('')+'</div>';
    if(d.nl) html+='<div class="nlbox">'+d.nl+'</div>';
    html+='</div>';
  }
  panel.innerHTML=html;
}
function renderScenario(){
  let html='';
  if(!scenario){
    html+='<div class="pcard"><h3>🎯 Geleide scenario’s</h3><p>Doorloop een echte situatie stap voor stap en ontdek de keten van gevolgen. Kies een scenario:</p></div>';
    SCENARIOS.forEach(s=>{ html+='<button class="ichip" onclick="startScenario(\''+s.id+'\')"><span class="em">'+s.em+'</span><span>'+s.titel+'<small>'+s.intro[LEVEL].slice(0,60)+'…</small></span></button>'; });
    panel.innerHTML=html; return;
  }
  const s=scenario;
  html+='<div class="steps">'+s.steps.map((_,i)=>'<i class="'+(i<=scStep?'on':'')+'"></i>').join('')+'</div>';
  if(scStep>=s.steps.length){
    html+='<div class="pcard"><h3>'+s.em+' Geslaagd!</h3><p>'+s.slot[LEVEL]+'</p></div>';
    html+='<div class="scbtns"><button class="btn" onclick="exitScenario()">Kies een ander scenario</button></div>';
    panel.innerHTML=html; return;
  }
  const st=s.steps[scStep];
  if(scStep===0 && scChosen===null && !st._seenIntro){ /* toon intro boven stap 1 */
    html+='<div class="pcard"><h3>'+s.em+' '+s.titel+'</h3><p>'+s.intro[LEVEL]+'</p></div>';
  }
  html+='<div class="pcard"><h3>Vraag '+(scStep+1)+'</h3><p>'+st.q+'</p><div class="choices">';
  st.a.forEach((a,i)=>{ const chosen=scChosen===i;
    html+='<button class="choice" '+(scChosen!==null?'disabled style="opacity:'+(a.ok?1:.5)+';border-color:'+(a.ok?'var(--ok)':(chosen?'var(--choke)':'var(--line)'))+'"':'')+' onclick="answer('+i+')">'+(scChosen!==null?(a.ok?'✓ ':(chosen?'✗ ':'')):'')+a.t+'</button>';
  });
  html+='</div>';
  if(scChosen!==null){ const a=st.a[scChosen];
    html+='<p style="margin-top:10px;color:'+(a.ok?'var(--ok)':'#ff8a95')+';font-size:13.5px;font-weight:700">'+a.r+'</p>';
    html+='<div class="scbtns"><button class="btn" onclick="nextStep()">'+(scStep+1<s.steps.length?'Volgende ▶':'Afronden 🎉')+'</button></div>';
  }
  panel.innerHTML=html;
}

/* ---------- AI scenario-motor (dynamisch, Nederland-gericht, geen quiz) ---------- */
function escW(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function renderAI(){
  let html='';
  html+='<div class="pcard"><h3>🎯 Scenario-motor</h3><p>Klik je door een echte situatie en zie wat het doet — voor de wereld én voor Nederland: voedsel, brandstof en prijzen. Kies een stijl:</p>'
    +'<div class="seg" style="width:100%;margin-top:8px">'
    +'<button class="'+(aiMode==='realistisch'?'on':'')+'" style="flex:1" onclick="setAiMode(\'realistisch\')">🎯 Realistisch</button>'
    +'<button class="'+(aiMode==='watals'?'on':'')+'" style="flex:1" onclick="setAiMode(\'watals\')">🔮 Wat-als</button>'
    +'</div></div>';
  if(aiLoading||aiWaiting){ html+='<div class="pcard" style="text-align:center"><div class="spin"></div><p style="margin-top:10px;color:var(--muted)">'+(aiWaiting?'De motor is heel even druk — ik probeer het zo opnieuw…':'De AI denkt na over de gevolgen…')+'</p></div>'; panel.innerHTML=html; return; }
  if(aiError){ html+='<div class="pcard" style="border-color:rgba(255,93,108,.4)"><h3>⚠️ Even niet gelukt</h3><p>'+escW(aiError)+'</p></div><div class="scbtns"><button class="btn" onclick="aiStart()">Opnieuw</button></div>'; panel.innerHTML=html; return; }
  if(!aiScene){ html+='<div class="scbtns"><button class="btn" style="width:100%" onclick="aiStart()">▶ Start een scenario</button></div>'; panel.innerHTML=html; return; }
  const s=aiScene;
  html+='<div class="pcard"><h3>'+(aiMode==='watals'?'🔮 ':'')+escW(s.titel)+'</h3><p>'+escW(s.situatie)+'</p>';
  if(s.geraakt&&s.geraakt.length) html+='<div class="impact"><span class="ptitle">Geraakt</span><br>'+s.geraakt.map(h=>'<span class="tag hit">'+lab(h)+'</span>').join('')+'</div>';
  if(s.omhoog&&s.omhoog.length) html+='<div class="impact"><span class="ptitle">Prijs/druk omhoog</span><br>'+s.omhoog.map(h=>'<span class="tag up">'+lab(h)+' ↑</span>').join('')+'</div>';
  html+='</div>';
  if(s.nederland) html+='<div class="pcard" style="border-color:rgba(255,180,84,.45)"><h3>🇳🇱 Wat betekent dit voor Nederland?</h3><p>'+escW(s.nederland)+'</p></div>';
  if(s.basis) html+='<div class="basis">ℹ️ <b>Waarop dit rust:</b> '+escW(s.basis)+'</div>';
  if(s.einde){ html+='<div class="pcard" style="border-color:rgba(95,227,154,.4)"><h3>🏁 Tot zover</h3><p>'+escW(s.slot)+'</p></div><div class="scbtns"><button class="btn" onclick="aiStart()">Nieuw scenario</button></div>'; }
  else if(s.keuzes&&s.keuzes.length){ html+='<div class="ptitle">Wat wil je verder ontdekken?</div><div class="choices">'+s.keuzes.map(k=>'<button class="choice" data-l="'+escA(k.label)+'" onclick="aiChoose(this.dataset.l)">'+escW(k.label)+'</button>').join('')+'</div>'; }
  else { html+='<div class="scbtns"><button class="btn" onclick="aiStart()">Nieuw scenario</button></div>'; }
  html+='<div class="meldrow"><a href="#" onclick="return flagScene()">🚩 Klopt dit niet? Meld het</a></div>';
  panel.innerHTML=html;
}
function aiSceneText(s){ return (s.titel?s.titel+': ':'')+s.situatie+(s.keuzes&&s.keuzes.length?(' [opties: '+s.keuzes.map(k=>k.label).join(' | ')+']'):''); }
function aiBusy(msg){ return /quota|exceed|429|503|rate|druk|overload|UNAVAILABLE|RESOURCE_EXHAUSTED/i.test(String(msg||'')); }
function callAI(){
  aiLoading=true; aiWaiting=false; aiError=''; renderAI();
  fetch('/api/scenario',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({level:LEVEL,mode:aiMode,history:aiHistory})})
    .then(r=>r.json().then(j=>({ok:r.ok,status:r.status,j})).catch(()=>({ok:false,status:r.status,j:null})))
    .then(({ok,status,j})=>{
      if(ok&&j&&j.ok&&j.scene){ aiRetries=0; aiLoading=false; aiWaiting=false; aiScene=j.scene; aiHistory.push({role:'model',content:aiSceneText(aiScene)}); renderAI(); render(); if(aiScene.geraakt&&aiScene.geraakt[0])focusOn(aiScene.geraakt[0]); return; }
      const msg=(j&&j.error)||('serverfout '+status);
      if((aiBusy(msg)||status===503||status===429) && aiRetries<3){
        aiRetries++; aiLoading=false; aiWaiting=true; renderAI();
        const m=String(msg).match(/retry in ([\d.]+)s/i);
        const wait=m?Math.min(9000,(Math.ceil(parseFloat(m[1]))+1)*1000):5000;
        setTimeout(()=>{ aiWaiting=false; callAI(); }, wait);
        return;
      }
      aiLoading=false; aiWaiting=false;
      aiError = aiBusy(msg) ? 'De AI-sleutel zit even aan de limiet (Google). Probeer over een halve minuut opnieuw — of zet pay-as-you-go aan voor meer ruimte.' : msg;
      renderAI();
    })
    .catch(()=>{
      if(aiRetries<2){ aiRetries++; aiLoading=false; aiWaiting=true; renderAI(); setTimeout(()=>{ aiWaiting=false; callAI(); },5000); }
      else { aiLoading=false; aiWaiting=false; aiError='Geen verbinding met de scenario-motor. Dit werkt pas live (op grwn.ai/wereldweb), niet als los offline bestand.'; renderAI(); }
    });
}
window.aiStart=function(){ aiScene=null; aiError=''; aiRetries=0; aiHistory=[{role:'user',content:'Start een nieuw scenario over energie en geopolitiek. Geef een pakkende openingssituatie, leg de gevolgen uit voor voedsel/brandstof/prijzen, maak duidelijk wat het voor Nederland betekent, en geef 2-3 richtingen om verder te ontdekken.'}]; callAI(); };
window.aiChoose=function(label){ aiRetries=0; aiHistory.push({role:'user',content:'Ik kies: '+label}); callAI(); };
window.setAiMode=function(m){ aiMode=m; if(!aiScene&&!aiLoading) renderAI(); };
window.flagScene=function(){ const s=aiScene||{}; const subj=encodeURIComponent('Wereldweb — melding over een scenario'); const body=encodeURIComponent('Ik denk dat deze uitleg niet (helemaal) klopt:\n\nTitel: '+(s.titel||'')+'\nSituatie: '+(s.situatie||'')+'\nVoor Nederland: '+(s.nederland||'')+'\nWaarop het rust: '+(s.basis||'')+'\nModus: '+aiMode+' · niveau: '+LEVEL+'\n\nWat klopt er volgens mij niet:\n'); location.href='mailto:info@grwn.ai?subject='+subj+'&body='+body; return false; };
window.openBronnen=function(){
  const m=document.createElement('div'); m.className='wmodal';
  m.innerHTML='<div class="box">'
    +'<h2>ℹ️ Bronnen & uitleg</h2>'
    +'<p style="color:var(--muted);font-size:13.5px;line-height:1.6">Wereldweb is een <b>vereenvoudigd, educatief model</b> van echte energie-afhankelijkheden — bedoeld om de grote lijnen te begrijpen, niet als exacte of actuele data. De samenhang is gebaseerd op algemeen bekende, openbare cijfers van o.a.:</p>'
    +'<ul style="margin:10px 0 12px 18px;font-size:13.5px;line-height:1.7;color:var(--text)">'
    +'<li><b>IEA</b> — International Energy Agency · <a href="https://www.iea.org" target="_blank" rel="noopener">iea.org</a></li>'
    +'<li><b>EIA</b> — U.S. Energy Information Administration (o.a. World Oil Transit Chokepoints) · <a href="https://www.eia.gov" target="_blank" rel="noopener">eia.gov</a></li>'
    +'<li><b>UN Comtrade</b> — handelsstromen tussen landen · <a href="https://comtrade.un.org" target="_blank" rel="noopener">comtrade.un.org</a></li>'
    +'<li><b>Eurostat / CBS</b> — Europese en Nederlandse cijfers · <a href="https://ec.europa.eu/eurostat" target="_blank" rel="noopener">eurostat</a> · <a href="https://www.cbs.nl" target="_blank" rel="noopener">cbs.nl</a></li>'
    +'</ul>'
    +'<p style="color:var(--muted);font-size:13px;line-height:1.6">De <b>Scenario-modus</b> wordt door AI gemaakt. In <b>realistisch</b> blijft de AI binnen dit model en benoemt hij waarop een redenering rust; <b>wat-als</b> is bewust verzonnen en zo gelabeld. Twijfel je aan een uitleg? Gebruik de <b>Meld het</b>-link.</p>'
    +'<button id="brClose">Sluiten</button></div>';
  document.body.appendChild(m);
  document.getElementById('brClose').onclick=()=>m.remove();
  m.addEventListener('click',e=>{ if(e.target===m) m.remove(); });
  return false;
};

/* =======================================================================
   ACTIES
======================================================================= */
function clearSel(){ selCountry=null; renderPanel(); render(); }
window.clearSel=clearSel;
window.toggleDisrupt=function(id){ const d=DISRUPTIONS.find(x=>x.id===id);
  activeDisrupt=(activeDisrupt&&activeDisrupt.id===id)?null:d; selCountry=null;
  if(activeDisrupt&&activeDisrupt.hits[0]) focusOn(activeDisrupt.hits[0]);
  renderPanel(); render(); };
window.startScenario=function(id){ scenario=SCENARIOS.find(s=>s.id===id); scStep=0; scChosen=null;
  const dz=DISRUPTIONS.find(d=>d.id===scenario.disrupt); if(dz&&dz.hits[0])focusOn(dz.hits[0]);
  renderPanel(); render(); };
window.answer=function(i){ scChosen=i; renderPanel(); };
window.nextStep=function(){ scStep++; scChosen=null; renderPanel(); render(); };
window.exitScenario=function(){ scenario=null; scStep=0; scChosen=null; renderPanel(); render(); };

document.getElementById('lvlSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  LEVEL=b.dataset.lvl; document.querySelectorAll('#lvlSeg button').forEach(x=>x.classList.toggle('on',x===b)); renderPanel(); });
document.getElementById('modeSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  MODE=b.dataset.mode; document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.toggle('on',x===b));
  activeDisrupt=null; selCountry=null; scenario=null; scStep=0; scChosen=null; aiScene=null; aiHistory=[]; aiLoading=false; aiError='';
  document.getElementById('hint').textContent = MODE==='verken'?'Sleep om te draaien · tik op een land':'Kies een scenario in het paneel →';
  renderPanel(); render(); });

window.addEventListener('resize',resize);
resize(); renderPanel();
</script>
