<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wereldweb · Energie-afhankelijkheden</title>
<style>
  :root{
    --bg:#0a0f1e; --bg2:#0e1630; --panel:#121b34; --panel2:#1a2547; --line:rgba(255,255,255,.10);
    --text:#eaf0ff; --muted:#93a1c4; --accent:#46d6c6; --accent2:#7c9bff;
    --gas:#5ec8ff; --oil:#ffb454; --choke:#ff5d6c; --producer:#ffd23f; --consumer:#9d7bff;
    --ok:#5fe39a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:
      radial-gradient(1200px 700px at 70% -10%, #16224a 0%, transparent 60%),
      linear-gradient(180deg,#0b1124,#070b16) fixed;
    color:var(--text);min-height:100vh;overflow-x:hidden;}
  a{color:var(--accent);}
  .top{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);
    background:rgba(8,12,26,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:.2px;}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#7af0e4,#2a9d92);box-shadow:0 0 14px rgba(70,214,198,.7);}
  .brand small{font-weight:600;color:var(--muted);font-size:12px;margin-left:2px;}
  .top .spacer{flex:1;}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;}
  .seg button{border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:13px;
    padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .seg button.on{background:var(--accent);color:#06231e;}
  .seg.lvl button.on{background:var(--accent2);color:#0a1030;}
  .layout{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 56px);}
  @media(max-width:880px){.layout{grid-template-columns:1fr;}
    .stage{min-height:42vh;}
    #globe{touch-action:pan-y;}
    .hint{font-size:11px;padding:4px 10px;}
  }
  .stage{position:relative;min-height:52vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #globe{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
  #globe:active{cursor:grabbing;}
  .legend{position:absolute;left:14px;bottom:12px;display:flex;flex-wrap:wrap;gap:6px 12px;font-size:12.5px;color:var(--muted);
    background:rgba(8,12,26,.55);border:1px solid var(--line);border-radius:10px;padding:8px 11px;backdrop-filter:blur(4px);max-width:calc(100% - 28px);}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
  .hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);font-size:13px;color:var(--muted);
    background:rgba(8,12,26,.55);border:1px solid var(--line);border-radius:999px;padding:5px 13px;pointer-events:none;}
  .panel{background:var(--panel);border-left:1px solid var(--line);padding:18px;overflow-y:auto;max-height:calc(100vh - 56px);}
  @media(max-width:880px){.panel{border-left:0;border-top:1px solid var(--line);max-height:none;}}
  .pcard{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:12px;}
  .pcard h3{font-size:17px;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
  .pcard p{font-size:15.5px;line-height:1.65;color:#dbe3f7;}
  .ptitle{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:2px 0 10px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;}
  .ichip{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);font:inherit;font-weight:700;font-size:14.5px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:.12s;}
  .ichip:hover{border-color:var(--accent);transform:translateY(-1px);}
  .ichip.on{border-color:var(--choke);background:rgba(255,93,108,.12);}
  .ichip .em{font-size:20px;flex:none;}
  .ichip small{display:block;color:var(--muted);font-weight:600;font-size:12.5px;margin-top:2px;line-height:1.4;}
  .scencard{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);font:inherit;border-radius:12px;padding:12px 13px;margin-bottom:9px;cursor:pointer;transition:.12s;}
  .scencard:hover{border-color:var(--accent);transform:translateY(-1px);}
  .scencard .sc-top{display:flex;align-items:center;gap:8px;font-size:15.5px;font-weight:800;}
  .scencard p{font-size:14px;color:#c2cdea;line-height:1.55;margin:7px 0 9px;}
  .scencard .sc-go{font-size:13px;font-weight:700;color:var(--accent);}
  .vsec{margin-top:14px;}
  .vsec:first-of-type{margin-top:2px;}
  .vsec .ptitle{margin:0 0 5px;}
  .vsec p{font-size:15.5px;line-height:1.65;color:#dbe3f7;}
  .scmeta{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 9px;}
  .scmeta span{font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid var(--line);}
  .scmeta .duur{color:var(--muted);}
  .scmeta .k-lo{color:#7be3a7;border-color:rgba(95,227,154,.4);background:rgba(95,227,154,.1);}
  .scmeta .k-mid{color:#ffce7a;border-color:rgba(255,180,84,.4);background:rgba(255,180,84,.12);}
  .scmeta .k-hi{color:#ff9aa3;border-color:rgba(255,93,108,.4);background:rgba(255,93,108,.12);}
  .rolbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px;vertical-align:middle;}
  .deprow{font-size:14.5px;margin:8px 0;color:var(--text);line-height:2.05;}
  .deprow b{color:var(--muted);font-weight:700;margin-right:4px;}
  .deprow .tag{margin:0 4px 4px 0;display:inline-block;}
  .topbron{font-size:12.5px;color:var(--accent2);text-decoration:none;font-weight:600;white-space:nowrap;}
  .impact{margin-top:10px;}
  .impact .tag{display:inline-block;font-size:12.5px;font-weight:800;padding:4px 10px;border-radius:999px;margin:0 5px 6px 0;}
  .tag.hit{background:rgba(255,93,108,.16);color:#ff8a95;border:1px solid rgba(255,93,108,.4);}
  .tag.up{background:rgba(255,180,84,.14);color:var(--oil);border:1px solid rgba(255,180,84,.35);}
  .scbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .btn{border:0;border-radius:11px;font:inherit;font-weight:800;font-size:14px;padding:11px 16px;cursor:pointer;background:var(--accent);color:#06231e;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn:disabled{opacity:.4;cursor:default;}
  .steps{display:flex;gap:5px;margin:4px 0 12px;}
  .steps i{flex:1;height:5px;border-radius:3px;background:var(--panel2);}
  .steps i.on{background:var(--accent2);}
  .choices{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .choice{text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);font:inherit;font-weight:700;
    font-size:14.5px;padding:12px 14px;border-radius:12px;cursor:pointer;line-height:1.45;}
  .choice:hover{border-color:var(--accent2);}
  .foot{font-size:11px;color:var(--muted);text-align:center;padding:10px;border-top:1px solid var(--line);}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .nlbox{margin-top:10px;background:rgba(255,180,84,.10);border:1px solid rgba(255,180,84,.35);border-radius:11px;padding:11px 13px;font-size:14.5px;line-height:1.6;color:#ffe2bd;}
  .basis{font-size:13px;color:var(--muted);font-style:italic;background:rgba(124,155,255,.08);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-top:8px;line-height:1.55;}
  .basis b{font-style:normal;color:var(--accent2);}
  .afh{margin:6px 0 2px;padding-left:20px;font-size:14.5px;line-height:1.7;color:#dbe3f7;}
  .afh li{margin-bottom:5px;}
  .afh.oorz li::marker{color:#ffce7a;}
  .meldrow{margin-top:14px;text-align:center;}
  .meldrow a{color:var(--muted);font-size:12px;text-decoration:none;}
  .meldrow a:hover{color:var(--choke);}
  .wmodal{position:fixed;inset:0;background:rgba(5,8,18,.72);display:flex;align-items:center;justify-content:center;padding:18px;z-index:60;}
  .wmodal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:470px;width:100%;max-height:85vh;overflow-y:auto;}
  .wmodal .box h2{font-size:18px;margin-bottom:6px;}
  .wmodal .box a{color:var(--accent);}
  .wmodal .box button{margin-top:8px;background:var(--accent);color:#06231e;border:0;border-radius:10px;font-weight:800;padding:10px 16px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><span class="dot"></span>Wereldweb <small>· energie</small></div>
    <div class="spacer"></div>
    <a href="#" onclick="return openBronnen()" class="topbron">ℹ️ Bronnen &amp; uitleg</a>
  </div>

  <div class="layout">
    <div class="stage">
      <svg id="globe"></svg>
      <div class="hint" id="hint">Sleep om te draaien · tik op een drukpunt of land</div>
      <div class="legend">
        <span><i style="background:var(--accent)"></i>drukpunt</span>
        <span><i style="background:var(--producer)"></i>producent</span>
        <span><i style="background:var(--consumer)"></i>afnemer</span>
        <span><i style="background:var(--choke)"></i>knooppunt</span>
        <span><i style="background:var(--gas)"></i>gas</span>
        <span><i style="background:var(--oil)"></i>olie</span>
      </div>
      <div class="loading" id="loading">Globe laden…</div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
  <div class="foot">Vereenvoudigd educatief model van echte afhankelijkheden — bedoeld om te begrijpen, niet als exacte data. <a href="#" onclick="return openBronnen()" style="color:var(--accent2)">Bronnen &amp; uitleg</a> · © Wereldweb</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>

======================================================================= */

const PRODUCERS = ['Rusland','SaoediArabie','VS','Qatar','Noorwegen','Irak','VAE','Iran','Algerije','Nigeria','Koeweit','Kazachstan'];

// land-info per niveau
const INFO = {
  Rusland:{rol:'producent', kind:'Een heel groot land met veel gas en olie. Veel landen kochten hier hun energie.',

/* =======================================================================
   STATE
======================================================================= */
let LEVEL='tiener';
let activeDisrupt=null;      // verken-modus
let selCountry=null;
let scenario=null, scStep=0, scChosen=null;
let aiMode='realistisch', aiHistory=[], aiScene=null, aiLoading=false, aiError='', aiRetries=0, aiWaiting=false;
let selVar=null, lastScenarioIdx=null;

/* =======================================================================
   GLOBE (D3 orthografisch, SVG — werkt ook zonder landgrenzen)
======================================================================= */
const svg=d3.select('#globe');
let W=0,H=0,scale=0;
const projection=d3.geoOrthographic().clipAngle(90).precision(.4);
const path=d3.geoPath(projection);
let land=null, rotation=[ -20,-25,0 ], dragging=false, autoRot=true, resumeT=null;

const gSphere=svg.append('path').attr('class','sphere');
const gGrat=svg.append('path').attr('fill','none');
const gLand=svg.append('path');
const gArcs=svg.append('g');
const gPts=svg.append('g');
const gLbl=svg.append('g');
const graticule=d3.geoGraticule10();

function resize(){
  const st=document.querySelector('.stage');
  W=st.clientWidth; H=st.clientHeight||st.clientWidth;
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('width',W).attr('height',H);
  scale=Math.min(W,H)/2.15;
  projection.scale(scale).translate([W/2,H/2]).rotate(rotation);
  render();
}
function visible(lonlat){ return d3.geoDistance(lonlat,[-rotation[0],-rotation[1]])<Math.PI/2-0.02; }

function render(){
  projection.rotate(rotation);
  gSphere.attr('d',path({type:'Sphere'})).attr('fill','#0b1430').attr('stroke','rgba(120,160,255,.25)').attr('stroke-width',1);
  gGrat.attr('d',path(graticule)).attr('stroke','rgba(120,150,220,.10)').attr('stroke-width',.6);
  if(land) gLand.attr('d',path(land)).attr('fill','#16213f').attr('stroke','rgba(140,170,230,.22)').attr('stroke-width',.5);
  drawArcs(); drawPoints();
}

function curArcs(){
  if(aiScene) return (aiScene.stromen||[]).map(s=>({v:s.van,n:s.naar,s:s.soort==='olie'?'olie':'gas'}));
  if(selVar) return selVar.arcs||[];
  if(selCountry) return FLOWS.filter(f=>f.v===selCountry||f.n===selCountry);
  return FLOWS; // overzicht
}
function drawArcs(){
  const arcs=curArcs();
  const data=arcs.map(f=>{ const a=C[f.v],b=C[f.n]; if(!a||!b)return null;
    return {d:{type:'LineString',coordinates:[a,b]}, s:f.s}; }).filter(Boolean);
  const sel=gArcs.selectAll('path').data(data);
  sel.enter().append('path').merge(sel)
    .attr('d',d=>path(d.d))
    .attr('fill','none')
    .attr('stroke',d=>d.s==='gas'?'var(--gas)':'var(--oil)')
    .attr('stroke-width',1.6).attr('stroke-linecap','round')
    .attr('opacity',.85).attr('stroke-dasharray','1 6');
  sel.exit().remove();
}
function highlightSet(){
  if(aiScene) return new Set([...(aiScene.geraakt||[]),...(aiScene.omhoog||[])]);
  if(selVar) return new Set(selVar.hits||[]);
  if(selCountry){ const s=new Set(); FLOWS.forEach(f=>{ if(f.v===selCountry)s.add(f.n); if(f.n===selCountry)s.add(f.v); }); return s; }
  return new Set();
}
function drawPoints(){
  const hl=highlightSet();
  const drill=false;
  let nodes=[];
  const covered=new Set(VARS.map(v=>v.ll));   // landen/knooppunten die al door een drukpunt worden gedekt
  for(const k in C){ if(covered.has(C[k]))continue; nodes.push({k,ll:C[k],type:PRODUCERS.includes(k)?'prod':'cons'}); }
  for(const k in CHOKE){ if(covered.has(CHOKE[k]))continue; nodes.push({k,ll:CHOKE[k],type:'choke'}); }
  VARS.forEach(v=>nodes.push({k:v.id,ll:v.ll,type:'var',naam:v.naam}));   // drukpunten bovenop
  const sel=gPts.selectAll('circle').data(nodes,d=>d.k);
  const merged=sel.enter().append('circle').merge(sel)
    .attr('cursor',d=>(d.type==='var'||d.type==='prod'||d.type==='cons')?'pointer':'default')
    .on('click',(e,d)=>{ e.stopPropagation(); if(d.type==='var'){ selectVar(d.k); } else if(d.type==='prod'||d.type==='cons'){ selectCountry(d.k); } });
  merged
    .each(function(d){ d.vis=visible(d.ll); const p=projection(d.ll); d.x=p?p[0]:0; d.y=p?p[1]:0; })
    .attr('cx',d=>d.x).attr('cy',d=>d.y)
    .attr('r',d=> d.type==='var' ? (selVar&&selVar.id===d.k?10.5:8) : d.type==='choke'?7 : (d.k===selCountry?9:6.5))
    .attr('display',d=>d.vis?null:'none')
    .attr('fill',d=> d.type==='var'?'var(--accent)': d.type==='choke'?'var(--choke)': d.type==='prod'?'var(--producer)':'var(--consumer)')
    .attr('stroke',d=> ((d.type==='var'&&selVar&&selVar.id===d.k)||hl.has(d.k))?'#fff':'rgba(0,0,0,.5)')
    .attr('stroke-width',d=> ((d.type==='var'&&selVar&&selVar.id===d.k)||hl.has(d.k))?2.5:1)
    .attr('opacity',d=> (!drill&&hl.size&&!hl.has(d.k)&&d.type!=='choke')?.55:1)
    .style('filter',d=> d.type==='var'?'drop-shadow(0 0 7px rgba(70,214,198,.8))': hl.has(d.k)?'drop-shadow(0 0 6px rgba(255,93,108,.9))':(d.type==='choke'?'drop-shadow(0 0 5px rgba(255,93,108,.6))':'none'));
  sel.exit().remove();

  const labs = nodes.filter(d=>d.vis && (d.type==='var'||hl.has(d.k)||d.k===selCountry||(selVar&&d.type==='choke')));
  const ls=gLbl.selectAll('text').data(labs,d=>d.k);
  ls.enter().append('text').attr('font-size',13).attr('font-weight',700).attr('pointer-events','none')
    .attr('fill','#dfe7ff').attr('paint-order','stroke').attr('stroke','#070b16').attr('stroke-width',3.5)
    .merge(ls).attr('font-size',13).attr('x',d=>d.x+10).attr('y',d=>d.y+4).text(d=> d.type==='var' ? (d.naam.length>20?d.naam.slice(0,19)+'…':d.naam) : lab(d.k));
  ls.exit().remove();
}

/* rotatie + sleep */
svg.call(d3.drag().clickDistance(8)
  .filter(function(event){ return !event.button && (!event.target || (event.target.tagName||'').toLowerCase()!=='circle'); })
  .on('start',()=>{dragging=true;autoRot=false;clearTimeout(resumeT);})
  .on('drag',(e)=>{ const k=.3; rotation=[rotation[0]+e.dx*k, Math.max(-90,Math.min(90,rotation[1]-e.dy*k)), rotation[2]]; render(); })
  .on('end',()=>{dragging=false;clearTimeout(resumeT);resumeT=setTimeout(()=>{autoRot=true;},2500);}));
function idle(){ return !selCountry && !selVar && !aiScene && !aiLoading && !aiWaiting; }
d3.timer(()=>{ if(autoRot&&!dragging&&idle()){ rotation=[rotation[0]+0.10,rotation[1],rotation[2]]; render(); } });

/* land laden (optioneel — globe werkt ook zonder) */
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json()).then(world=>{ land=topojson.feature(world,world.objects.countries); render(); })
  .catch(()=>{}).finally(()=>{ const l=document.getElementById('loading'); if(l)l.style.display='none'; });

/* =======================================================================
   PANEL
======================================================================= */
const panel=document.getElementById('panel');
function focusLL(ll){ // draai globe naar coördinaat [lon,lat]
  if(!ll)return; autoRot=false;
  clearTimeout(resumeT);
  const target=[-ll[0],-ll[1],0]; const start=rotation.slice(); let t0=null;
  d3.timer(function(el){ if(t0===null)t0=el; const k2=Math.min(1,(el-t0)/700);
    rotation=[start[0]+(target[0]-start[0])*k2, start[1]+(target[1]-start[1])*k2, 0]; render();
    if(k2>=1){ resumeT=setTimeout(()=>{autoRot=true;},1400); return true; } return false; });
}
function focusOn(k){ focusLL(C[k]||CHOKE[k]); }
function renderPanel(){
  if(selCountry) renderCountry(); else renderAI();
}
function renderCountry(){
  const k=selCountry; const inf=INFO[k]||{};
  const rol=inf.rol || (PRODUCERS.includes(k)?'producent':'afnemer');
  const wat = inf.volw || inf.tiener || (rol==='producent'?DEFAULT_INFO.producent.volw:DEFAULT_INFO.afnemer.volw);
  const waarom = inf.waarom || (rol==='producent'
     ? 'Als energieleverancier bepaalt dit land mede hoeveel olie of gas er op de wereldmarkt is — en dus de prijs die wij uiteindelijk betalen.'
     : 'Als energie-afnemer beïnvloedt dit land de wereldwijde vraag: hoe meer het importeert, hoe sterker het meebepaalt wat energie wereldwijd kost.');
  const effect = inf.effect || (rol==='producent'
     ? 'Valt de productie hier (deels) weg, dan moet de wereld olie of gas elders halen. Dat jaagt de prijzen op — ook aan onze pomp en op de energierekening — tot andere leveranciers bijspringen.'
     : 'Komt dit land in de knel met zijn energie, dan gaat het concurreren om schaarse olie of gas op de wereldmarkt. Dat drijft de prijzen op voor iedereen, ook voor Nederland.');
  const exp=FLOWS.filter(f=>f.v===k), imp=FLOWS.filter(f=>f.n===k);
  const relVars=VARS.filter(v=>(v.hits||[]).includes(k));
  let html='<button class="btn ghost" onclick="clearSel()">← terug naar overzicht</button>';
  html+='<div class="pcard" style="margin-top:10px"><h3>'+(rol==='producent'?'🟡':'🟣')+' '+lab(k)+' <span class="rolbadge">'+rol+'</span></h3>'
    +'<div class="vsec"><span class="ptitle">📍 Wat is het?</span><p>'+escW(wat)+'</p></div>'
    +'<div class="vsec"><span class="ptitle">⚡ Waarom is dit zo belangrijk?</span><p>'+escW(waarom)+'</p></div>'
    +'<div class="vsec"><span class="ptitle">🔗 Afhankelijkheden</span>'
      +(exp.length?'<div class="deprow"><b>Levert aan:</b> '+exp.map(f=>'<span class="tag" style="background:rgba(94,200,255,.12);color:'+(f.s==='gas'?'var(--gas)':'var(--oil)')+';border:1px solid var(--line)">'+lab(f.n)+' · '+f.s+'</span>').join(' ')+'</div>':'')
      +(imp.length?'<div class="deprow"><b>Krijgt van:</b> '+imp.map(f=>'<span class="tag" style="background:rgba(124,155,255,.12);color:var(--consumer);border:1px solid var(--line)">'+lab(f.v)+' · '+f.s+'</span>').join(' ')+'</div>':'')
      +((!exp.length&&!imp.length)?'<p>In dit vereenvoudigde model lopen er geen directe energiestromen van of naar dit land.</p>':'')
    +'</div>'
    +'<div class="vsec"><span class="ptitle">📉 Wat als de energie hier hapert?</span><p>'+escW(effect)+'</p></div>'
    +'</div>';
  if(relVars.length){
    html+='<div class="ptitle">🎯 Verbonden drukpunten — klik voor scenario\'s en gevolgen</div>'+
      relVars.map(v=>'<button class="scencard" onclick="selectVar(\''+v.id+'\')"><div class="sc-top"><span class="em">'+v.em+'</span><b>'+escW(v.naam)+'</b></div><p>'+escW(v.kort)+'</p><span class="sc-go">Bekijk de gevolgen →</span></button>').join('');
  }
  panel.innerHTML=html;
}
function renderScenario(){
  let html='';
  if(!scenario){
    html+='<div class="pcard"><h3>🎯 Geleide scenario’s</h3><p>Doorloop een echte situatie stap voor stap en ontdek de keten van gevolgen. Kies een scenario:</p></div>';
    SCENARIOS.forEach(s=>{ html+='<button class="ichip" onclick="startScenario(\''+s.id+'\')"><span class="em">'+s.em+'</span><span>'+s.titel+'<small>'+s.intro[LEVEL].slice(0,60)+'…</small></span></button>'; });
    panel.innerHTML=html; return;
  }
  const s=scenario;
  html+='<div class="steps">'+s.steps.map((_,i)=>'<i class="'+(i<=scStep?'on':'')+'"></i>').join('')+'</div>';
  if(scStep>=s.steps.length){
    html+='<div class="pcard"><h3>'+s.em+' Geslaagd!</h3><p>'+s.slot[LEVEL]+'</p></div>';
    html+='<div class="scbtns"><button class="btn" onclick="exitScenario()">Kies een ander scenario</button></div>';
    panel.innerHTML=html; return;
  }
  const st=s.steps[scStep];
  if(scStep===0 && scChosen===null && !st._seenIntro){ /* toon intro boven stap 1 */
    html+='<div class="pcard"><h3>'+s.em+' '+s.titel+'</h3><p>'+s.intro[LEVEL]+'</p></div>';
  }
  html+='<div class="pcard"><h3>Vraag '+(scStep+1)+'</h3><p>'+st.q+'</p><div class="choices">';
  st.a.forEach((a,i)=>{ const chosen=scChosen===i;
    html+='<button class="choice" '+(scChosen!==null?'disabled style="opacity:'+(a.ok?1:.5)+';border-color:'+(a.ok?'var(--ok)':(chosen?'var(--choke)':'var(--line)'))+'"':'')+' onclick="answer('+i+')">'+(scChosen!==null?(a.ok?'✓ ':(chosen?'✗ ':'')):'')+a.t+'</button>';
  });
  html+='</div>';
  if(scChosen!==null){ const a=st.a[scChosen];
    html+='<p style="margin-top:10px;color:'+(a.ok?'var(--ok)':'#ff8a95')+';font-size:13.5px;font-weight:700">'+a.r+'</p>';
    html+='<div class="scbtns"><button class="btn" onclick="nextStep()">'+(scStep+1<s.steps.length?'Volgende ▶':'Afronden 🎉')+'</button></div>';
  }
  panel.innerHTML=html;
}

/* ---------- AI scenario-motor (dynamisch, Nederland-gericht, geen quiz) ---------- */
function escW(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function kansCls(s){s=String(s||'').toLowerCase(); if(/hoog|verhoogd/.test(s))return 'k-hi'; if(/reëel|reeel|deels|gebeurt/.test(s))return 'k-mid'; return 'k-lo';}
function escA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function impactTags(title,cls,arr,suffix){ return '<div class="impact"><span class="ptitle">'+title+'</span><br>'+arr.map(h=>'<span class="tag '+cls+'">'+lab(h)+(suffix||'')+'</span>').join('')+'</div>'; }
function renderAI(){
  let html='';
  if(aiLoading||aiWaiting){
    html='<button class="btn ghost" onclick="backToScenarios()">← terug</button><div class="pcard" style="text-align:center;margin-top:10px"><div class="spin"></div><p style="margin-top:10px;color:var(--muted)">'+(aiWaiting?'De motor is heel even druk — ik probeer het zo opnieuw…':'De AI bekijkt de gevolgen…')+'</p></div>';
    panel.innerHTML=html; return;
  }
  if(aiError){
    html='<button class="btn ghost" onclick="backToScenarios()">← terug</button><div class="pcard" style="border-color:rgba(255,93,108,.4);margin-top:10px"><h3>⚠️ Even niet gelukt</h3><p>'+escW(aiError)+'</p></div><div class="scbtns"><button class="btn" onclick="retryScenario()">Opnieuw</button></div>';
    panel.innerHTML=html; return;
  }
  if(aiScene){
    const s=aiScene;
    html+='<button class="btn ghost" onclick="backToScenarios()">← '+escW(selVar?selVar.naam:'terug')+'</button>';
    html+='<div class="pcard" style="margin-top:10px"><h3>'+(aiMode==='watals'?'🔮 ':'')+escW(s.titel)+'</h3><p>'+escW(s.situatie)+'</p>';
    if(s.geraakt&&s.geraakt.length) html+=impactTags('Geraakt','hit',s.geraakt,'');
    if(s.omhoog&&s.omhoog.length) html+=impactTags('Prijs/druk omhoog','up',s.omhoog,' ↑');
    html+='</div>';
    if(s.nederland) html+='<div class="pcard" style="border-color:rgba(255,180,84,.45)"><h3>🇳🇱 Wat betekent dit voor Nederland?</h3><p>'+escW(s.nederland)+'</p></div>';
    if(s.perspectief) html+='<div class="pcard" style="border-color:rgba(95,227,154,.45)"><h3>🧭 Hoe erg is het echt?</h3><p>'+escW(s.perspectief)+'</p></div>';
    if(s.basis) html+='<div class="basis">ℹ️ <b>Waarop dit rust:</b> '+escW(s.basis)+'</div>';
    if(s.keuzes&&s.keuzes.length){ html+='<div class="ptitle">Verder ontdekken</div><div class="choices">'+s.keuzes.map(k=>'<button class="choice" data-l="'+escA(k.label)+'" onclick="aiChoose(this.dataset.l)">'+escW(k.label)+'</button>').join('')+'</div>'; }
    html+='<div class="meldrow"><a href="#" onclick="return flagScene()">🚩 Klopt dit niet? Meld het</a></div>';
    panel.innerHTML=html; return;
  }
  if(selVar){
    const v=selVar;
    html+='<button class="btn ghost" onclick="backToVars()">← alle variabelen</button>';
    html+='<div class="pcard" style="margin-top:10px"><h3>'+v.em+' '+escW(v.naam)+'</h3>'
      +'<div class="vsec"><span class="ptitle">📍 Wat is het?</span><p>'+escW(v.wat||v.kort)+'</p></div>'
      +(v.waarom?'<div class="vsec"><span class="ptitle">⚡ Waarom is dit zo belangrijk?</span><p>'+escW(v.waarom)+'</p></div>':'')
      +'<div class="vsec"><span class="ptitle">🔗 Waar hangt dit van af?</span><ul class="afh">'+v.afh.map(a=>'<li>'+escW(a)+'</li>').join('')+'</ul></div>'
      +((v.oorzaken&&v.oorzaken.length)?'<div class="vsec"><span class="ptitle">⚠️ Mogelijke oorzaken</span><ul class="afh oorz">'+v.oorzaken.map(a=>'<li>'+escW(a)+'</li>').join('')+'</ul></div>':'')
      +(v.effect?'<div class="vsec"><span class="ptitle">📉 Wat gebeurt er als het misgaat?</span><p>'+escW(v.effect)+'</p></div>':'')
      +(v.risico?'<div class="vsec"><span class="ptitle">🔭 Hoe schat je het risico in?</span><p>'+escW(v.risico)+'</p></div>':'')
      +'</div>';
    html+='<div class="ptitle">Mogelijke scenario\'s — klik om te zien wat er dan precies gebeurt</div>'+
      v.scenarios.map(function(sc,i){return '<button class="scencard" onclick="chooseScenario('+i+')"><div class="sc-top"><span class="em">🎬</span><b>'+escW(sc.naam)+'</b></div>'+(sc.uitleg?'<p>'+escW(sc.uitleg)+'</p>':'')+((sc.kans||sc.duur)?'<div class="scmeta">'+(sc.kans?'<span class="kans '+kansCls(sc.kans)+'">📊 Kans: '+escW(sc.kans)+'</span>':'')+(sc.duur?'<span class="duur">⏳ '+escW(sc.duur)+'</span>':'')+'</div>':'')+'<span class="sc-go">Bekijk de gevolgen →</span></button>';}).join('');
    panel.innerHTML=html; return;
  }
  // HOME — samengevoegd overzicht
  html+='<div class="pcard"><h3>🌍 Ontdek het energiesysteem</h3><p>Tik op een <b>drukpunt</b> (de kritieke variabelen) of op een <b>land</b> — op de globe of in de lijst hieronder. Je ziet telkens wat het is, waarom het belangrijk is, waar het van afhangt en wat de gevolgen zijn — ook voor Nederland 🇳🇱.</p>'
    +'<div class="seg" style="width:100%;margin-top:10px"><button class="'+(aiMode==='realistisch'?'on':'')+'" style="flex:1" onclick="setAiMode(\'realistisch\')">🎯 Realistisch</button><button class="'+(aiMode==='watals'?'on':'')+'" style="flex:1" onclick="setAiMode(\'watals\')">🔮 Wat-als</button></div>'
    +'<p style="font-size:11.5px;color:var(--muted);margin-top:7px">Deze keuze bepaalt hoe de AI de scenario-gevolgen opbouwt: <b>realistisch</b> blijft binnen wat echt kan, <b>wat-als</b> mag extremer.</p></div>';
  html+='<div class="ptitle">🎯 Kritieke drukpunten</div>';
  html+='<div class="chip-row">'+VARS.map(function(v){return '<button class="ichip" onclick="selectVar(\''+v.id+'\')"><span class="em">'+v.em+'</span><span>'+escW(v.naam)+'<small>'+escW(v.kort.slice(0,54))+'…</small></span></button>';}).join('')+'</div>';
  const _landen=Object.keys(C).sort(function(a,b){var pa=PRODUCERS.includes(a)?0:1,pb=PRODUCERS.includes(b)?0:1; return pa-pb || lab(a).localeCompare(lab(b));});
  html+='<div class="ptitle" style="margin-top:16px">🗺️ Of verken een land</div>';
  html+='<div class="chip-row">'+_landen.map(function(k){var rol=(INFO[k]&&INFO[k].rol)||(PRODUCERS.includes(k)?'producent':'afnemer'); return '<button class="ichip" onclick="selectCountry(\''+k+'\')"><span class="em">'+(rol==='producent'?'🟡':'🟣')+'</span><span>'+escW(lab(k))+'<small>'+rol+'</small></span></button>';}).join('')+'</div>';
  panel.innerHTML=html;
}
function aiSceneText(s){ return (s.titel?s.titel+': ':'')+s.situatie+(s.keuzes&&s.keuzes.length?(' [opties: '+s.keuzes.map(k=>k.label).join(' | ')+']'):''); }
function aiQuota(msg){ return /quota|RESOURCE_EXHAUSTED|exceeded your current quota|too many requests|rate.?limit|\b429\b/i.test(String(msg||'')); }
function callAI(){
  aiLoading=true; aiWaiting=false; aiError=''; renderAI();
  fetch('/api/scenario',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({level:LEVEL,mode:aiMode,history:aiHistory})})
    .then(r=>r.json().then(j=>({ok:r.ok,status:r.status,j})).catch(()=>({ok:false,status:r.status,j:null})))
    .then(({ok,status,j})=>{
      if(ok&&j&&j.ok&&j.scene){ aiRetries=0; aiLoading=false; aiWaiting=false; aiScene=j.scene; aiHistory.push({role:'model',content:aiSceneText(aiScene)}); renderAI(); render(); if(aiScene.geraakt&&aiScene.geraakt[0])focusOn(aiScene.geraakt[0]); return; }
      const msg=(j&&j.error)||('serverfout '+status);
      if(aiQuota(msg) && aiRetries<2){
        aiRetries++; aiLoading=false; aiWaiting=true; renderAI();
        const m=String(msg).match(/retry in ([\d.]+)s/i);
        const wait=m?Math.min(9000,(Math.ceil(parseFloat(m[1]))+1)*1000):6000;
        setTimeout(()=>{ aiWaiting=false; callAI(); }, wait);
        return;
      }
      aiLoading=false; aiWaiting=false;
      aiError = aiQuota(msg) ? 'De AI-sleutel zit aan de limiet (quota bij Google). Probeer later opnieuw of zet meer ruimte aan.' : msg;
      renderAI();
    })
    .catch(()=>{ aiLoading=false; aiWaiting=false; aiError='Geen verbinding met de scenario-motor (kon /api/scenario niet bereiken).'; renderAI(); });
}
window.selectVar=function(id){ selVar=VARS.find(function(v){return v.id===id;})||null; selCountry=null; aiScene=null; aiError=''; lastScenarioIdx=null; renderAI(); render(); if(selVar) focusLL(selVar.ll); };
window.selectCountry=function(k){ if(!C[k])return; selCountry=k; selVar=null; aiScene=null; aiError=''; lastScenarioIdx=null; renderPanel(); render(); focusOn(k); };
window.backToVars=function(){ selVar=null; aiScene=null; aiError=''; lastScenarioIdx=null; renderAI(); render(); };
window.backToScenarios=function(){ aiScene=null; aiError=''; renderAI(); render(); };
window.chooseScenario=function(i){ if(!selVar) return; var sc=selVar.scenarios[i]; if(!sc) return; lastScenarioIdx=i; aiRetries=0;
  aiHistory=[{role:'user',content:'Variabele: '+selVar.naam+'. Scenario: '+sc.naam+' — '+sc.seed+' Leg helder uit wat er gebeurt en wat de gevolgen zijn voor de wereld én voor Nederland (voedsel, brandstof, prijzen), met een nuchtere inschatting hoe reëel en hoe groot dit echt is. Geef ook 2 tot 3 richtingen om verder te ontdekken.'}];
  callAI(); };
window.retryScenario=function(){ aiRetries=0; callAI(); };
window.aiChoose=function(label){ aiRetries=0; aiHistory.push({role:'user',content:'Ik wil verder kijken naar: '+label}); callAI(); };
window.setAiMode=function(m){ aiMode=m; if(!aiScene&&!selVar&&!aiLoading) renderAI(); };
window.flagScene=function(){ const s=aiScene||{}; const subj=encodeURIComponent('Wereldweb — melding over een scenario'); const body=encodeURIComponent('Ik denk dat deze uitleg niet (helemaal) klopt:\n\nTitel: '+(s.titel||'')+'\nSituatie: '+(s.situatie||'')+'\nVoor Nederland: '+(s.nederland||'')+'\nWaarop het rust: '+(s.basis||'')+'\nModus: '+aiMode+' · niveau: '+LEVEL+'\n\nWat klopt er volgens mij niet:\n'); location.href='mailto:info@grwn.ai?subject='+subj+'&body='+body; return false; };
window.openBronnen=function(){
  const m=document.createElement('div'); m.className='wmodal';
  m.innerHTML='<div class="box">'
    +'<h2>ℹ️ Bronnen & uitleg</h2>'
    +'<p style="color:var(--muted);font-size:13.5px;line-height:1.6">Wereldweb is een <b>vereenvoudigd, educatief model</b> van echte energie-afhankelijkheden — bedoeld om de grote lijnen te begrijpen, niet als exacte of actuele data. De samenhang is gebaseerd op algemeen bekende, openbare cijfers van o.a.:</p>'
    +'<ul style="margin:10px 0 12px 18px;font-size:13.5px;line-height:1.7;color:var(--text)">'
    +'<li><b>IEA</b> — International Energy Agency · <a href="https://www.iea.org" target="_blank" rel="noopener">iea.org</a></li>'
    +'<li><b>EIA</b> — U.S. Energy Information Administration (o.a. World Oil Transit Chokepoints) · <a href="https://www.eia.gov" target="_blank" rel="noopener">eia.gov</a></li>'
    +'<li><b>UN Comtrade</b> — handelsstromen tussen landen · <a href="https://comtrade.un.org" target="_blank" rel="noopener">comtrade.un.org</a></li>'
    +'<li><b>Eurostat / CBS</b> — Europese en Nederlandse cijfers · <a href="https://ec.europa.eu/eurostat" target="_blank" rel="noopener">eurostat</a> · <a href="https://www.cbs.nl" target="_blank" rel="noopener">cbs.nl</a></li>'
    +'</ul>'
    +'<p style="color:var(--muted);font-size:13px;line-height:1.6">De <b>Scenario-modus</b> wordt door AI gemaakt. In <b>realistisch</b> blijft de AI binnen dit model en benoemt hij waarop een redenering rust; <b>wat-als</b> is bewust verzonnen en zo gelabeld. Twijfel je aan een uitleg? Gebruik de <b>Meld het</b>-link.</p>'
    +'<button id="brClose">Sluiten</button></div>';
  document.body.appendChild(m);
  document.getElementById('brClose').onclick=()=>m.remove();
  m.addEventListener('click',e=>{ if(e.target===m) m.remove(); });
  return false;
};

/* =======================================================================
   ACTIES
======================================================================= */
function clearSel(){ selCountry=null; renderPanel(); render(); }
window.clearSel=clearSel;
window.toggleDisrupt=function(id){ const d=DISRUPTIONS.find(x=>x.id===id);
  activeDisrupt=(activeDisrupt&&activeDisrupt.id===id)?null:d; selCountry=null;
  if(activeDisrupt&&activeDisrupt.hits[0]) focusOn(activeDisrupt.hits[0]);
  renderPanel(); render(); };
window.startScenario=function(id){ scenario=SCENARIOS.find(s=>s.id===id); scStep=0; scChosen=null;
  const dz=DISRUPTIONS.find(d=>d.id===scenario.disrupt); if(dz&&dz.hits[0])focusOn(dz.hits[0]);
  renderPanel(); render(); };
window.answer=function(i){ scChosen=i; renderPanel(); };
window.nextStep=function(){ scStep++; scChosen=null; renderPanel(); render(); };
window.exitScenario=function(){ scenario=null; scStep=0; scChosen=null; renderPanel(); render(); };

window.addEventListener('resize',resize);
resize(); renderPanel();
</script>
