<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wereldweb · Energie-afhankelijkheden</title>
<style>
  :root{
    --bg:#0a0f1e; --bg2:#0e1630; --panel:#121b34; --panel2:#1a2547; --line:rgba(255,255,255,.10);
    --text:#eaf0ff; --muted:#93a1c4; --accent:#46d6c6; --accent2:#7c9bff;
    --gas:#5ec8ff; --oil:#ffb454; --choke:#ff5d6c; --producer:#ffd23f; --consumer:#9d7bff;
    --ok:#5fe39a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:
      radial-gradient(1200px 700px at 70% -10%, #16224a 0%, transparent 60%),
      linear-gradient(180deg,#0b1124,#070b16) fixed;
    color:var(--text);min-height:100vh;overflow-x:hidden;}
  a{color:var(--accent);}
  .top{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);
    background:rgba(8,12,26,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:.2px;}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#7af0e4,#2a9d92);box-shadow:0 0 14px rgba(70,214,198,.7);}
  .brand small{font-weight:600;color:var(--muted);font-size:12px;margin-left:2px;}
  .top .spacer{flex:1;}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;}
  .seg button{border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:13px;
    padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .seg button.on{background:var(--accent);color:#06231e;}
  .seg.lvl button.on{background:var(--accent2);color:#0a1030;}
  .layout{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 56px);}
  @media(max-width:880px){.layout{grid-template-columns:1fr;}
    .stage{min-height:42vh;}
    #globe{touch-action:pan-y;}
    .hint{font-size:11px;padding:4px 10px;}
  }
  .stage{position:relative;min-height:52vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #globe{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
  #globe:active{cursor:grabbing;}
  .legend{position:absolute;left:14px;bottom:12px;display:flex;flex-wrap:wrap;gap:6px 12px;font-size:11.5px;color:var(--muted);
    background:rgba(8,12,26,.55);border:1px solid var(--line);border-radius:10px;padding:8px 11px;backdrop-filter:blur(4px);max-width:calc(100% - 28px);}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
  .hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);font-size:12px;color:var(--muted);
    background:rgba(8,12,26,.55);border:1px solid var(--line);border-radius:999px;padding:5px 13px;pointer-events:none;}
  .panel{background:var(--panel);border-left:1px solid var(--line);padding:18px;overflow-y:auto;max-height:calc(100vh - 56px);}
  @media(max-width:880px){.panel{border-left:0;border-top:1px solid var(--line);max-height:none;}}
  .pcard{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:12px;}
  .pcard h3{font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .pcard p{font-size:14px;line-height:1.6;color:#d6def5;}
  .ptitle{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:2px 0 10px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;}
  .ichip{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);font:inherit;font-weight:700;font-size:13.5px;padding:11px 13px;border-radius:12px;cursor:pointer;transition:.12s;}
  .ichip:hover{border-color:var(--accent);transform:translateY(-1px);}
  .ichip.on{border-color:var(--choke);background:rgba(255,93,108,.12);}
  .ichip .em{font-size:18px;flex:none;}
  .ichip small{display:block;color:var(--muted);font-weight:600;font-size:11.5px;margin-top:1px;}
  .scencard{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);font:inherit;border-radius:12px;padding:12px 13px;margin-bottom:9px;cursor:pointer;transition:.12s;}
  .scencard:hover{border-color:var(--accent);transform:translateY(-1px);}
  .scencard .sc-top{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;}
  .scencard p{font-size:12.5px;color:var(--muted);line-height:1.5;margin:6px 0 8px;}
  .scencard .sc-go{font-size:12px;font-weight:700;color:var(--accent);}
  .vsec{margin-top:13px;}
  .vsec:first-of-type{margin-top:2px;}
  .vsec .ptitle{margin:0 0 5px;}
  .vsec p{font-size:14px;line-height:1.6;color:#d6def5;}
  .impact{margin-top:10px;}
  .impact .tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;margin:0 5px 6px 0;}
  .tag.hit{background:rgba(255,93,108,.16);color:#ff8a95;border:1px solid rgba(255,93,108,.4);}
  .tag.up{background:rgba(255,180,84,.14);color:var(--oil);border:1px solid rgba(255,180,84,.35);}
  .scbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .btn{border:0;border-radius:11px;font:inherit;font-weight:800;font-size:14px;padding:11px 16px;cursor:pointer;background:var(--accent);color:#06231e;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn:disabled{opacity:.4;cursor:default;}
  .steps{display:flex;gap:5px;margin:4px 0 12px;}
  .steps i{flex:1;height:5px;border-radius:3px;background:var(--panel2);}
  .steps i.on{background:var(--accent2);}
  .choices{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .choice{text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--text);font:inherit;font-weight:700;
    font-size:13.5px;padding:11px 13px;border-radius:12px;cursor:pointer;}
  .choice:hover{border-color:var(--accent2);}
  .foot{font-size:11px;color:var(--muted);text-align:center;padding:10px;border-top:1px solid var(--line);}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .nlbox{margin-top:10px;background:rgba(255,180,84,.10);border:1px solid rgba(255,180,84,.35);border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.55;color:#ffe2bd;}
  .basis{font-size:12px;color:var(--muted);font-style:italic;background:rgba(124,155,255,.08);border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-top:8px;line-height:1.5;}
  .basis b{font-style:normal;color:var(--accent2);}
  .afh{margin:6px 0 2px;padding-left:18px;font-size:13.5px;line-height:1.65;color:#d6def5;}
  .afh li{margin-bottom:3px;}
  .meldrow{margin-top:14px;text-align:center;}
  .meldrow a{color:var(--muted);font-size:12px;text-decoration:none;}
  .meldrow a:hover{color:var(--choke);}
  .wmodal{position:fixed;inset:0;background:rgba(5,8,18,.72);display:flex;align-items:center;justify-content:center;padding:18px;z-index:60;}
  .wmodal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:470px;width:100%;max-height:85vh;overflow-y:auto;}
  .wmodal .box h2{font-size:18px;margin-bottom:6px;}
  .wmodal .box a{color:var(--accent);}
  .wmodal .box button{margin-top:8px;background:var(--accent);color:#06231e;border:0;border-radius:10px;font-weight:800;padding:10px 16px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><span class="dot"></span>Wereldweb <small>· energie</small></div>
    <div class="spacer"></div>
    <div class="seg" id="modeSeg">
      <button data-mode="verken" class="on">🌍 Verken</button>
      <button data-mode="ai">🎯 Scenario's</button>
    </div>
  </div>

  <div class="layout">
    <div class="stage">
      <svg id="globe"></svg>
      <div class="hint" id="hint">Sleep om de globe te draaien · tik op een land</div>
      <div class="legend">
        <span><i style="background:var(--producer)"></i>producent</span>
        <span><i style="background:var(--consumer)"></i>afnemer</span>
        <span><i style="background:var(--choke)"></i>knooppunt</span>
        <span><i style="background:var(--gas)"></i>gas</span>
        <span><i style="background:var(--oil)"></i>olie</span>
      </div>
      <div class="loading" id="loading">Globe laden…</div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
  <div class="foot">Vereenvoudigd educatief model van echte afhankelijkheden — bedoeld om te begrijpen, niet als exacte data. <a href="#" onclick="return openBronnen()" style="color:var(--accent2)">Bronnen &amp; uitleg</a> · © Wereldweb</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
/* =======================================================================
   DATA — zorgvuldig samengesteld, vereenvoudigd model van energiestromen
======================================================================= */
const C = { // landen & knooppunten: [lon, lat]
  Rusland:[37.6,55.8], SaoediArabie:[46.7,24.7], VS:[-98,39], Qatar:[51.2,25.3],
  Noorwegen:[8.5,60.5], Irak:[44.4,33.3], VAE:[54.4,24.5], Iran:[51.4,35.7],
  Algerije:[3.05,36.7], Nigeria:[8,9], Koeweit:[47.9,29.4], Kazachstan:[67,48],
  Duitsland:[13.4,52.5], Italie:[12.5,41.9], Frankrijk:[2.35,48.85], Nederland:[4.9,52.4],
  Spanje:[-3.7,40.4], VK:[-0.13,51.5], China:[116.4,39.9], India:[77.2,28.6],
  Japan:[139.7,35.7], ZuidKorea:[127,37.5], Turkije:[32.85,39.9], Polen:[21,52.2]
};
const CHOKE = { Hormuz:[56.4,26.6], Malakka:[101.5,2.5], Suez:[32.55,30], BabElMandeb:[43.4,12.6] };
const LABEL = { SaoediArabie:'Saoedi-Arabië', VAE:'V.A.E.', ZuidKorea:'Zuid-Korea', VK:'V.K.', VS:'V.S.',
  BabElMandeb:'Bab-el-Mandeb', Kazachstan:'Kazachstan' };
const lab = k => LABEL[k]||k;

const PRODUCERS = ['Rusland','SaoediArabie','VS','Qatar','Noorwegen','Irak','VAE','Iran','Algerije','Nigeria','Koeweit','Kazachstan'];
const FLOWS = [ // {van, naar, soort}
  {v:'Rusland',n:'Duitsland',s:'gas'},{v:'Rusland',n:'Italie',s:'gas'},{v:'Rusland',n:'Turkije',s:'gas'},
  {v:'Rusland',n:'China',s:'olie'},{v:'Rusland',n:'India',s:'olie'},
  {v:'Noorwegen',n:'Duitsland',s:'gas'},{v:'Noorwegen',n:'VK',s:'gas'},{v:'Noorwegen',n:'Nederland',s:'gas'},
  {v:'Algerije',n:'Italie',s:'gas'},{v:'Algerije',n:'Spanje',s:'gas'},
  {v:'Qatar',n:'Japan',s:'gas'},{v:'Qatar',n:'ZuidKorea',s:'gas'},{v:'Qatar',n:'India',s:'gas'},
  {v:'VS',n:'Duitsland',s:'gas'},{v:'VS',n:'Nederland',s:'gas'},
  {v:'SaoediArabie',n:'China',s:'olie'},{v:'SaoediArabie',n:'India',s:'olie'},{v:'SaoediArabie',n:'Japan',s:'olie'},
  {v:'VAE',n:'China',s:'olie'},{v:'Irak',n:'China',s:'olie'},{v:'Irak',n:'India',s:'olie'},
  {v:'Koeweit',n:'ZuidKorea',s:'olie'}
];
// land-info per niveau
const INFO = {
  Rusland:{rol:'producent', kind:'Een heel groot land met veel gas en olie. Veel landen kochten hier hun energie.',
    tiener:'Een van de grootste exporteurs van gas en olie ter wereld. Europa was er lang sterk van afhankelijk.',
    volw:'Grootmacht in fossiele energie; pijpleidinggas naar Europa is sinds 2022 grotendeels weggevallen, export verschoof naar China en India.'},
  SaoediArabie:{rol:'producent', kind:'Een woestijnland met heel veel olie onder de grond.',
    tiener:'Een van de grootste olie-exporteurs; veel olie gaat via de Golf naar Azië.',
    volw:'Kernland van OPEC; stuurt mee op de olieprijs via productieafspraken. Export vooral via de Straat van Hormuz richting Azië.'},
  Qatar:{rol:'producent', kind:'Klein, rijk land met heel veel gas (LNG, gas op schepen).',
    tiener:'Topexporteur van vloeibaar gas (LNG) naar o.a. Japan, Korea en India.',
    volw:'Een van de grootste LNG-exporteurs; tankers varen door de Straat van Hormuz, wat het kwetsbaar maakt voor blokkades.'},
  Duitsland:{rol:'afnemer', kind:'Een fabrieksland dat veel energie nodig heeft maar weinig zelf heeft.',
    tiener:'Grote industrie, veel energie nodig. Was sterk afhankelijk van Russisch gas, nu van Noorwegen en LNG.',
    volw:'Industriële motor van Europa; na 2022 razendsnel omgeschakeld van Russisch pijpleidinggas naar LNG (VS/Qatar) en Noors gas, met hogere prijzen.'},
  China:{rol:'afnemer', kind:'Het land met de meeste mensen en fabrieken; heeft enorm veel energie nodig.',
    tiener:'Grootste energie-importeur ter wereld; koopt olie uit de Golf en Rusland.',
    volw:'Grootste olie-importeur; sterk afhankelijk van doorvoer via Hormuz en Malakka. Koopt sinds 2022 meer korting-olie uit Rusland.'},
  India:{rol:'afnemer', kind:'Een heel groot land dat steeds meer energie gebruikt.',
    tiener:'Snelgroeiende vraag; importeert veel olie uit de Golf en goedkope Russische olie.',
    volw:'Derde olie-importeur; balanceert tussen Golf-leveranciers en sterk toegenomen Russische import na 2022.'}
};
const DEFAULT_INFO = {
  producent:{kind:'Dit land verkoopt energie aan andere landen.',tiener:'Een producent/exporteur van energie.',volw:'Netto-exporteur van energie in dit model.'},
  afnemer:{kind:'Dit land koopt energie van andere landen.',tiener:'Een afnemer die energie importeert.',volw:'Netto-importeur; afhankelijk van leveranciers en doorvoerroutes.'}
};

const DISRUPTIONS = [
  { id:'rus', em:'🛑', naam:'Rusland sluit de gaskraan', sub:'pijpleidinggas naar Europa stopt',
    hits:['Duitsland','Italie','Polen','Turkije'], up:['Duitsland','Italie'],
    arcs:FLOWS.filter(f=>f.v==='Rusland'&&f.s==='gas'),
    kind:'Brr! Veel huizen in Europa werden warm met gas uit Rusland. Als de kraan dichtgaat, wordt energie duurder en moet Europa elders gas kopen.',
    tiener:'Europa kreeg veel gas via pijpleidingen uit Rusland. Valt dat weg, dan stijgen de prijzen en moet Europa snel gas halen uit Noorwegen en LNG-schepen (VS, Qatar) — en zuiniger doen.',
    volw:'Wegvallend Russisch pijpleidinggas dwingt Europa tot duurdere LNG (VS/Qatar), meer Noors gas, vraagreductie en opslag. Gevolg: prijspieken, industrie onder druk, en een blijvende herschikking van de gasmarkt.',
    nl:'🇳🇱 Voor Nederland: je energierekening stijgt, en omdat gas nodig is voor kunstmest en transport worden ook je boodschappen duurder. Sinds Groningen dicht is hebben we weinig eigen gas — we leunen op import en LNG via de haven.'},
  { id:'hormuz', em:'⚓', naam:'Straat van Hormuz geblokkeerd', sub:'~1/5 van alle olie ter wereld',
    hits:['SaoediArabie','VAE','Irak','Koeweit','Qatar','China','India','Japan','ZuidKorea'], up:['China','India','Japan'],
    arcs:FLOWS.filter(f=>['SaoediArabie','VAE','Irak','Koeweit','Qatar'].includes(f.v)),
    kind:'Heel veel olie vaart door één smal straatje bij de Golf. Gaat dat dicht, dan komt er ineens veel minder olie de wereld op — overal wordt benzine duurder.',
    tiener:'Door de Straat van Hormuz gaat ongeveer een vijfde van alle olie. Bij een blokkade kunnen Golf-landen hun olie en gas niet verschepen; vooral Azië (China, India, Japan, Korea) zit klem en de olieprijs schiet wereldwijd omhoog.',
    volw:'Hormuz is het belangrijkste olie-knooppunt (~20% van de wereldolie + Qatarees LNG). Een blokkade raakt Golf-exporteurs en Aziatische importeurs direct; de wereldwijde prijs reageert onmiddellijk, want er is nauwelijks alternatieve route met die capaciteit.',
    nl:'🇳🇱 Voor Nederland: een wereldwijde olieschok betekent direct duurdere benzine en diesel aan de pomp, duurder transport en hogere prijzen in de supermarkt. Rotterdam is bovendien een groot olie-doorvoerpunt.'},
  { id:'suez', em:'🚢', naam:'Suez / Bab-el-Mandeb dicht', sub:'route Europa ↔ Azië',
    hits:['Italie','Duitsland','India','China'], up:['Italie','Duitsland'],
    arcs:[{v:'Qatar',n:'Italie',s:'gas'},{v:'Qatar',n:'Duitsland',s:'gas'}],
    kind:'Schepen tussen Europa en Azië nemen een kort weggetje via het Suezkanaal. Is dat dicht, dan moeten ze de héle lange weg om Afrika — dat duurt langer en kost meer.',
    tiener:'Suez en Bab-el-Mandeb verbinden Europa en Azië. Bij blokkade varen tankers om heel Afrika heen: weken langer, hogere kosten en vertraagde leveringen van olie en LNG.',
    volw:'Verstoring van Suez/Bab-el-Mandeb dwingt omvaren via Kaap de Goede Hoop (+1–2 weken), wat vrachtkosten en leveringszekerheid raakt. Geen totale tekorten, maar prijs- en timingdruk, vooral voor Europa.',
    nl:'🇳🇱 Voor Nederland (handels- en havenland): langere vaarroutes maken import duurder en trager — van brandstof tot spullen en voedsel uit Azië. Dat zie je terug in de prijzen.'},
  { id:'malakka', em:'🌊', naam:'Straat van Malakka dicht', sub:'olie-ader naar Oost-Azië',
    hits:['China','Japan','ZuidKorea'], up:['China','Japan','ZuidKorea'],
    arcs:FLOWS.filter(f=>['China','Japan','ZuidKorea'].includes(f.n)&&f.s==='olie'),
    kind:'De meeste olie voor China en Japan vaart door een ander smal straatje bij Singapore. Gaat dat dicht, dan komen die landen in de problemen.',
    tiener:'Via de Straat van Malakka gaat het grootste deel van de olie naar China, Japan en Korea. Een blokkade snijdt Oost-Azië af van Golf-olie — een grote kwetsbaarheid.',
    volw:'Malakka is de smalle flessenhals tussen Indische Oceaan en Oost-Azië. China noemt dit zelf het “Malakka-dilemma” en bouwt daarom pijpleidingen en alternatieve routes om de afhankelijkheid te verkleinen.',
    nl:'🇳🇱 Voor Nederland: indirect, maar merkbaar — duurdere olie en haperende Aziatische fabrieken jagen prijzen op en kunnen leiden tot tekorten aan producten die wij importeren.'}
];

/* KRITIEKE VARIABELEN — drukpunten van het energiesysteem (drill-down) */
const VARS = [
  { id:'rusgas', naam:'Russisch gas naar Europa', em:'🔥', ll:C.Rusland, hits:['Duitsland','Italie','Polen','Turkije'], arcs:FLOWS.filter(f=>f.v==='Rusland'&&f.s==='gas'),
    kort:'Europa kocht jarenlang veel aardgas via pijpleidingen uit Rusland — een kwetsbare afhankelijkheid die sinds 2022 razendsnel veranderde.',
    wat:'Rusland leverde jarenlang een groot deel van het aardgas dat Europa gebruikt om te verwarmen, te koken en fabrieken te laten draaien — via grote pijpleidingen door Oost-Europa. Sinds 2022 is dat sterk afgebouwd, maar de gevoeligheid voor de gasprijs bleef.',
    waarom:'Gas bepaalt in Europa voor een groot deel de energie- én de stroomprijs (veel centrales draaien op gas). Valt er Russisch gas weg, dan stijgt de prijs van het gas dat er nog wél is — en dat voelt iedereen op de energierekening en in de prijs van producten die veel energie kosten om te maken.',
    effect:'Hapert de toevoer, dan schiet de gasprijs omhoog: een hogere energierekening, duurdere producten (van brood tot staal) en in het uiterste geval gas op rantsoen voor de industrie. Een koude winter en lege gasopslagen maken het erger; een zachte winter en volle opslagen dempen het.',
    afh:['Hoe koud de winter is (vraag naar verwarming)','Hoe vol de gasopslagen zitten','Capaciteit om LNG per schip te importeren','Alternatieve leveranciers: Noorwegen, Qatar, VS'],
    scenarios:[
      {naam:'Rusland draait het gas volledig dicht', uitleg:'Rusland stopt alle pijpleidinggas, zoals deels gebeurde in 2022. Gas is voor Rusland een drukmiddel: het kan de kraan dichtdraaien bij sancties of een conflict.', seed:'Rusland stopt per direct alle pijpleidinggas naar Europa, midden in de winter.'},
      {naam:'Gedeeltelijke beperking als drukmiddel', uitleg:'Rusland levert mínder of dreigt ermee om landen onder druk te zetten (bijvoorbeeld rond steun aan Oekraïne). Een sluipend wapen dat de prijzen al laat stijgen.', seed:'Rusland knijpt de gaskraan deels dicht en gebruikt levering als politiek drukmiddel.'},
      {naam:'Sabotage van een grote pijpleiding', uitleg:'Een pijpleiding wordt beschadigd of opgeblazen, zoals bij Nord Stream in 2022. Eén route valt dan in één klap weg en de onzekerheid schiet omhoog.', seed:'Een belangrijke gaspijpleiding (zoals Nord Stream) wordt gesaboteerd en valt uit.'}
    ]},

/* =======================================================================
   GLOBE (D3 orthografisch, SVG — werkt ook zonder landgrenzen)
======================================================================= */
const svg=d3.select('#globe');
let W=0,H=0,scale=0;
const projection=d3.geoOrthographic().clipAngle(90).precision(.4);
const path=d3.geoPath(projection);
let land=null, rotation=[ -20,-25,0 ], dragging=false, autoRot=true;

const gSphere=svg.append('path').attr('class','sphere');
const gGrat=svg.append('path').attr('fill','none');
const gLand=svg.append('path');
const gArcs=svg.append('g');
const gPts=svg.append('g');
const gLbl=svg.append('g');
const graticule=d3.geoGraticule10();

function resize(){
  const st=document.querySelector('.stage');
  W=st.clientWidth; H=st.clientHeight||st.clientWidth;
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('width',W).attr('height',H);
  scale=Math.min(W,H)/2.15;
  projection.scale(scale).translate([W/2,H/2]).rotate(rotation);
  render();
}
function visible(lonlat){ return d3.geoDistance(lonlat,[-rotation[0],-rotation[1]])<Math.PI/2-0.02; }

function render(){
  projection.rotate(rotation);
  gSphere.attr('d',path({type:'Sphere'})).attr('fill','#0b1430').attr('stroke','rgba(120,160,255,.25)').attr('stroke-width',1);
  gGrat.attr('d',path(graticule)).attr('stroke','rgba(120,150,220,.10)').attr('stroke-width',.6);
  if(land) gLand.attr('d',path(land)).attr('fill','#16213f').attr('stroke','rgba(140,170,230,.22)').attr('stroke-width',.5);
  drawArcs(); drawPoints();
}

function curArcs(){
  if(MODE==='ai'){ if(aiScene) return (aiScene.stromen||[]).map(s=>({v:s.van,n:s.naar,s:s.soort==='olie'?'olie':'gas'})); if(selVar) return selVar.arcs||[]; return []; }
  if(MODE==='scenario'&&scenario){ return DISRUPTIONS.find(d=>d.id===scenario.disrupt).arcs; }
  if(activeDisrupt){ return activeDisrupt.arcs; }
  if(selCountry){ return FLOWS.filter(f=>f.v===selCountry||f.n===selCountry); }
  return FLOWS; // overzicht
}
function drawArcs(){
  const arcs=curArcs();
  const data=arcs.map(f=>{ const a=C[f.v],b=C[f.n]; if(!a||!b)return null;
    return {d:{type:'LineString',coordinates:[a,b]}, s:f.s}; }).filter(Boolean);
  const sel=gArcs.selectAll('path').data(data);
  sel.enter().append('path').merge(sel)
    .attr('d',d=>path(d.d))
    .attr('fill','none')
    .attr('stroke',d=>d.s==='gas'?'var(--gas)':'var(--oil)')
    .attr('stroke-width',1.6).attr('stroke-linecap','round')
    .attr('opacity',.85).attr('stroke-dasharray','1 6');
  sel.exit().remove();
}
function highlightSet(){
  if(MODE==='ai'&&aiScene){ return new Set([...(aiScene.geraakt||[]),...(aiScene.omhoog||[])]); }
  if(MODE==='ai'&&selVar){ return new Set(selVar.hits||[]); }
  if(MODE==='scenario'&&scenario){ return new Set(DISRUPTIONS.find(d=>d.id===scenario.disrupt).hits); }
  if(activeDisrupt) return new Set(activeDisrupt.hits);
  return new Set();
}
function drawPoints(){
  const hl=highlightSet();
  const drill=(MODE==='ai');
  let nodes=[];
  if(drill){ VARS.forEach(v=>nodes.push({k:v.id,ll:v.ll,type:'var',naam:v.naam})); }
  else {
    for(const k in C){ nodes.push({k,ll:C[k],type:PRODUCERS.includes(k)?'prod':'cons'}); }
    for(const k in CHOKE){ nodes.push({k,ll:CHOKE[k],type:'choke'}); }
  }
  const sel=gPts.selectAll('circle').data(nodes,d=>d.k);
  const ent=sel.enter().append('circle').attr('cursor','pointer')
    .on('click',(e,d)=>{ if(d.type==='var'){ selectVar(d.k); } else if(d.type!=='choke'){ selCountry=d.k; activeDisrupt=null; renderPanel(); render(); } });
  ent.merge(sel)
    .each(function(d){ d.vis=visible(d.ll); const p=projection(d.ll); d.x=p?p[0]:0; d.y=p?p[1]:0; })
    .attr('cx',d=>d.x).attr('cy',d=>d.y)
    .attr('r',d=> d.type==='var' ? (selVar&&selVar.id===d.k?8:6) : d.type==='choke'?5.5 : (d.k===selCountry?7:4.5))
    .attr('display',d=>d.vis?null:'none')
    .attr('fill',d=> d.type==='var'?'var(--accent)': d.type==='choke'?'var(--choke)': d.type==='prod'?'var(--producer)':'var(--consumer)')
    .attr('stroke',d=> ((d.type==='var'&&selVar&&selVar.id===d.k)||hl.has(d.k))?'#fff':'rgba(0,0,0,.5)')
    .attr('stroke-width',d=> ((d.type==='var'&&selVar&&selVar.id===d.k)||hl.has(d.k))?2.5:1)
    .attr('opacity',d=> (!drill&&hl.size&&!hl.has(d.k)&&d.type!=='choke')?.4:1)
    .style('filter',d=> d.type==='var'?'drop-shadow(0 0 7px rgba(70,214,198,.8))': hl.has(d.k)?'drop-shadow(0 0 6px rgba(255,93,108,.9))':(d.type==='choke'?'drop-shadow(0 0 5px rgba(255,93,108,.6))':'none'));
  sel.exit().remove();

  const labs = drill ? nodes.filter(d=>d.vis)
                     : nodes.filter(d=>d.vis && (hl.has(d.k)||d.k===selCountry||d.type==='choke'));
  const ls=gLbl.selectAll('text').data(labs,d=>d.k);
  ls.enter().append('text').attr('font-size',11).attr('font-weight',700)
    .attr('fill','#dfe7ff').attr('paint-order','stroke').attr('stroke','#070b16').attr('stroke-width',3)
    .merge(ls).attr('x',d=>d.x+8).attr('y',d=>d.y+4).text(d=> d.type==='var' ? (d.naam.length>20?d.naam.slice(0,19)+'…':d.naam) : lab(d.k));
  ls.exit().remove();
}

/* rotatie + sleep */
svg.call(d3.drag()
  .on('start',()=>{dragging=true;autoRot=false;})
  .on('drag',(e)=>{ const k=.3; rotation=[rotation[0]+e.dx*k, Math.max(-90,Math.min(90,rotation[1]-e.dy*k)), rotation[2]]; render(); })
  .on('end',()=>{dragging=false;}));
d3.timer(()=>{ if(autoRot&&!dragging){ rotation=[rotation[0]+0.12,rotation[1],rotation[2]]; render(); } });

const panel=document.getElementById('panel');
function focusLL(ll){ // draai globe naar coördinaat [lon,lat]
  if(!ll)return; autoRot=false;
  const target=[-ll[0],-ll[1],0]; const start=rotation.slice(); let t0=null;
  d3.timer(function(el){ if(t0===null)t0=el; const k2=Math.min(1,(el-t0)/700);
    rotation=[start[0]+(target[0]-start[0])*k2, start[1]+(target[1]-start[1])*k2, 0]; render();
    return k2>=1; });
}
function focusOn(k){ focusLL(C[k]||CHOKE[k]); }

}

    const exp=FLOWS.filter(f=>f.v===selCountry), imp=FLOWS.filter(f=>f.n===selCountry);
    html+='<div class="pcard"><h3>'+(rol==='producent'?'🟡':'🟣')+' '+lab(selCountry)+'</h3><p>'+txt+'</p>';
    if(exp.length) html+='<div class="impact"><span class="ptitle">Levert aan</span><br>'+exp.map(f=>'<span class="tag '+(f.s==='gas'?'up':'up')+'" style="background:rgba(94,200,255,.12);color:'+(f.s==='gas'?'var(--gas)':'var(--oil)')+';border:1px solid var(--line)">'+lab(f.n)+' · '+f.s+'</span>').join('')+'</div>';
    if(imp.length) html+='<div class="impact"><span class="ptitle">Krijgt van</span><br>'+imp.map(f=>'<span class="tag" style="background:rgba(124,155,255,.12);color:var(--consumer);border:1px solid var(--line)">'+lab(f.v)+' · '+f.s+'</span>').join('')+'</div>';
    html+='</div>';
    html+='<button class="btn ghost" style="width:100%;margin-bottom:14px" onclick="clearSel()">↺ Toon alles</button>';
  } else {
    html+='<div class="pcard"><h3>🌍 Verken de afhankelijkheden</h3><p>Tik op een land op de globe om te zien wie energie levert en wie afhankelijk is. Of zet hieronder een <b>verstoring</b> aan en zie wat er gebeurt — én wat dat betekent voor <b>Nederland</b> 🇳🇱 en je portemonnee.</p></div>';
  }
  html+='<div class="ptitle">Wat als… (zet een verstoring aan)</div><div class="chip-row">';
  DISRUPTIONS.forEach(d=>{ const on=activeDisrupt&&activeDisrupt.id===d.id;
    html+='<button class="ichip'+(on?' on':'')+'" onclick="toggleDisrupt(\''+d.id+'\')"><span class="em">'+d.em+'</span><span>'+d.naam+'<small>'+d.sub+'</small></span></button>';
  });
  html+='</div>';
  if(activeDisrupt){
    const d=activeDisrupt;
    html+='<div class="pcard" style="margin-top:12px;border-color:rgba(255,93,108,.4)"><h3>'+d.em+' '+d.naam+'</h3><p>'+d[LEVEL]+'</p>';
    html+='<div class="impact"><span class="ptitle">Direct geraakt</span><br>'+d.hits.map(h=>'<span class="tag hit">'+lab(h)+'</span>').join('')+'</div>';
    if(d.up&&d.up.length) html+='<div class="impact"><span class="ptitle">Prijs/druk omhoog</span><br>'+d.up.map(h=>'<span class="tag up">'+lab(h)+' ↑</span>').join('')+'</div>';
    if(d.nl) html+='<div class="nlbox">'+d.nl+'</div>';
    html+='</div>';
  }
  panel.innerHTML=html;
}
function renderScenario(){
  let html='';
  if(!scenario){
    html+='<div class="pcard"><h3>🎯 Geleide scenario’s</h3><p>Doorloop een echte situatie stap voor stap en ontdek de keten van gevolgen. Kies een scenario:</p></div>';
    SCENARIOS.forEach(s=>{ html+='<button class="ichip" onclick="startScenario(\''+s.id+'\')"><span class="em">'+s.em+'</span><span>'+s.titel+'<small>'+s.intro[LEVEL].slice(0,60)+'…</small></span></button>'; });
    panel.innerHTML=html; return;
  }
  const s=scenario;
  html+='<div class="steps">'+s.steps.map((_,i)=>'<i class="'+(i<=scStep?'on':'')+'"></i>').join('')+'</div>';
  if(scStep>=s.steps.length){
    html+='<div class="pcard"><h3>'+s.em+' Geslaagd!</h3><p>'+s.slot[LEVEL]+'</p></div>';
    html+='<div class="scbtns"><button class="btn" onclick="exitScenario()">Kies een ander scenario</button></div>';
    panel.innerHTML=html; return;
  }
  const st=s.steps[scStep];
  if(scStep===0 && scChosen===null && !st._seenIntro){ /* toon intro boven stap 1 */
    html+='<div class="pcard"><h3>'+s.em+' '+s.titel+'</h3><p>'+s.intro[LEVEL]+'</p></div>';
  }
  html+='<div class="pcard"><h3>Vraag '+(scStep+1)+'</h3><p>'+st.q+'</p><div class="choices">';
  st.a.forEach((a,i)=>{ const chosen=scChosen===i;
    html+='<button class="choice" '+(scChosen!==null?'disabled style="opacity:'+(a.ok?1:.5)+';border-color:'+(a.ok?'var(--ok)':(chosen?'var(--choke)':'var(--line)'))+'"':'')+' onclick="answer('+i+')">'+(scChosen!==null?(a.ok?'✓ ':(chosen?'✗ ':'')):'')+a.t+'</button>';
  });
  html+='</div>';
  if(scChosen!==null){ const a=st.a[scChosen];
    html+='<p style="margin-top:10px;color:'+(a.ok?'var(--ok)':'#ff8a95')+';font-size:13.5px;font-weight:700">'+a.r+'</p>';
    html+='<div class="scbtns"><button class="btn" onclick="nextStep()">'+(scStep+1<s.steps.length?'Volgende ▶':'Afronden 🎉')+'</button></div>';
  }
  panel.innerHTML=html;
}

/* ---------- AI scenario-motor (dynamisch, Nederland-gericht, geen quiz) ---------- */
function escW(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function impactTags(title,cls,arr,suffix){ return '<div class="impact"><span class="ptitle">'+title+'</span><br>'+arr.map(h=>'<span class="tag '+cls+'">'+lab(h)+(suffix||'')+'</span>').join('')+'</div>'; }
function renderAI(){
  let html='';
  if(aiLoading||aiWaiting){
    html='<button class="btn ghost" onclick="backToScenarios()">← terug</button><div class="pcard" style="text-align:center;margin-top:10px"><div class="spin"></div><p style="margin-top:10px;color:var(--muted)">'+(aiWaiting?'De motor is heel even druk — ik probeer het zo opnieuw…':'De AI bekijkt de gevolgen…')+'</p></div>';
    panel.innerHTML=html; return;
  }
  if(aiError){
    html='<button class="btn ghost" onclick="backToScenarios()">← terug</button><div class="pcard" style="border-color:rgba(255,93,108,.4);margin-top:10px"><h3>⚠️ Even niet gelukt</h3><p>'+escW(aiError)+'</p></div><div class="scbtns"><button class="btn" onclick="retryScenario()">Opnieuw</button></div>';
    panel.innerHTML=html; return;
  }
  if(aiScene){
    const s=aiScene;
    html+='<button class="btn ghost" onclick="backToScenarios()">← '+escW(selVar?selVar.naam:'terug')+'</button>';
    html+='<div class="pcard" style="margin-top:10px"><h3>'+(aiMode==='watals'?'🔮 ':'')+escW(s.titel)+'</h3><p>'+escW(s.situatie)+'</p>';
    if(s.geraakt&&s.geraakt.length) html+=impactTags('Geraakt','hit',s.geraakt,'');
    if(s.omhoog&&s.omhoog.length) html+=impactTags('Prijs/druk omhoog','up',s.omhoog,' ↑');
    html+='</div>';
    if(s.nederland) html+='<div class="pcard" style="border-color:rgba(255,180,84,.45)"><h3>🇳🇱 Wat betekent dit voor Nederland?</h3><p>'+escW(s.nederland)+'</p></div>';
    if(s.perspectief) html+='<div class="pcard" style="border-color:rgba(95,227,154,.45)"><h3>🧭 Hoe erg is het echt?</h3><p>'+escW(s.perspectief)+'</p></div>';
    if(s.basis) html+='<div class="basis">ℹ️ <b>Waarop dit rust:</b> '+escW(s.basis)+'</div>';
    if(s.keuzes&&s.keuzes.length){ html+='<div class="ptitle">Verder ontdekken</div><div class="choices">'+s.keuzes.map(k=>'<button class="choice" data-l="'+escA(k.label)+'" onclick="aiChoose(this.dataset.l)">'+escW(k.label)+'</button>').join('')+'</div>'; }
    html+='<div class="meldrow"><a href="#" onclick="return flagScene()">🚩 Klopt dit niet? Meld het</a></div>';
    panel.innerHTML=html; return;
  }
  if(selVar){
    const v=selVar;
    html+='<button class="btn ghost" onclick="backToVars()">← alle variabelen</button>';
    html+='<div class="pcard" style="margin-top:10px"><h3>'+v.em+' '+escW(v.naam)+'</h3>'
      +'<div class="vsec"><span class="ptitle">📍 Wat is het?</span><p>'+escW(v.wat||v.kort)+'</p></div>'
      +(v.waarom?'<div class="vsec"><span class="ptitle">⚡ Waarom is dit zo belangrijk?</span><p>'+escW(v.waarom)+'</p></div>':'')
      +'<div class="vsec"><span class="ptitle">🔗 Waar hangt dit van af?</span><ul class="afh">'+v.afh.map(a=>'<li>'+escW(a)+'</li>').join('')+'</ul></div>'
      +(v.effect?'<div class="vsec"><span class="ptitle">📉 Wat gebeurt er als het misgaat?</span><p>'+escW(v.effect)+'</p></div>':'')
      +'</div>';
    html+='<div class="ptitle">Mogelijke scenario\'s — klik om te zien wat er dan precies gebeurt</div>'+
      v.scenarios.map(function(sc,i){return '<button class="scencard" onclick="chooseScenario('+i+')"><div class="sc-top"><span class="em">🎬</span><b>'+escW(sc.naam)+'</b></div>'+(sc.uitleg?'<p>'+escW(sc.uitleg)+'</p>':'')+'<span class="sc-go">Bekijk de gevolgen →</span></button>';}).join('');
    panel.innerHTML=html; return;
  }
  // overzicht van variabelen
  html+='<div class="pcard"><h3>🎯 Kritieke variabelen</h3><p>De drukpunten van het wereldwijde energiesysteem. Kies er één (hier of op de globe) om de scenario\'s en afhankelijkheden te zien — en daarna wat de gevolgen écht zijn.</p>'
    +'<div class="seg" style="width:100%;margin-top:10px"><button class="'+(aiMode==='realistisch'?'on':'')+'" style="flex:1" onclick="setAiMode(\'realistisch\')">🎯 Realistisch</button><button class="'+(aiMode==='watals'?'on':'')+'" style="flex:1" onclick="setAiMode(\'watals\')">🔮 Wat-als</button></div></div>';
  html+='<div class="chip-row">'+VARS.map(function(v){return '<button class="ichip" onclick="selectVar(\''+v.id+'\')"><span class="em">'+v.em+'</span><span>'+escW(v.naam)+'<small>'+escW(v.kort.slice(0,54))+'…</small></span></button>';}).join('')+'</div>';
  panel.innerHTML=html;
}
function aiSceneText(s){ return (s.titel?s.titel+': ':'')+s.situatie+(s.keuzes&&s.keuzes.length?(' [opties: '+s.keuzes.map(k=>k.label).join(' | ')+']'):''); }
function aiQuota(msg){ return /quota|RESOURCE_EXHAUSTED|exceeded your current quota|too many requests|rate.?limit|\b429\b/i.test(String(msg||'')); }
function callAI(){
  aiLoading=true; aiWaiting=false; aiError=''; renderAI();
  fetch('/api/scenario',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({level:LEVEL,mode:aiMode,history:aiHistory})})
    .then(r=>r.json().then(j=>({ok:r.ok,status:r.status,j})).catch(()=>({ok:false,status:r.status,j:null})))
    .then(({ok,status,j})=>{
      if(ok&&j&&j.ok&&j.scene){ aiRetries=0; aiLoading=false; aiWaiting=false; aiScene=j.scene; aiHistory.push({role:'model',content:aiSceneText(aiScene)}); renderAI(); render(); if(aiScene.geraakt&&aiScene.geraakt[0])focusOn(aiScene.geraakt[0]); return; }
      const msg=(j&&j.error)||('serverfout '+status);
      if(aiQuota(msg) && aiRetries<2){
        aiRetries++; aiLoading=false; aiWaiting=true; renderAI();
        const m=String(msg).match(/retry in ([\d.]+)s/i);
        const wait=m?Math.min(9000,(Math.ceil(parseFloat(m[1]))+1)*1000):6000;
        setTimeout(()=>{ aiWaiting=false; callAI(); }, wait);
        return;
      }
      aiLoading=false; aiWaiting=false;
      aiError = aiQuota(msg) ? 'De AI-sleutel zit aan de limiet (quota bij Google). Probeer later opnieuw of zet meer ruimte aan.' : msg;
      renderAI();
    })
    .catch(()=>{ aiLoading=false; aiWaiting=false; aiError='Geen verbinding met de scenario-motor (kon /api/scenario niet bereiken).'; renderAI(); });
}
window.selectVar=function(id){ selVar=VARS.find(function(v){return v.id===id;})||null; aiScene=null; aiError=''; lastScenarioIdx=null; renderAI(); render(); if(selVar) focusLL(selVar.ll); };
window.backToVars=function(){ selVar=null; aiScene=null; aiError=''; lastScenarioIdx=null; renderAI(); render(); };
window.backToScenarios=function(){ aiScene=null; aiError=''; renderAI(); render(); };
window.chooseScenario=function(i){ if(!selVar) return; var sc=selVar.scenarios[i]; if(!sc) return; lastScenarioIdx=i; aiRetries=0;
  aiHistory=[{role:'user',content:'Variabele: '+selVar.naam+'. Scenario: '+sc.naam+' — '+sc.seed+' Leg helder uit wat er gebeurt en wat de gevolgen zijn voor de wereld én voor Nederland (voedsel, brandstof, prijzen), met een nuchtere inschatting hoe reëel en hoe groot dit echt is. Geef ook 2 tot 3 richtingen om verder te ontdekken.'}];
  callAI(); };
window.retryScenario=function(){ aiRetries=0; callAI(); };
window.aiChoose=function(label){ aiRetries=0; aiHistory.push({role:'user',content:'Ik wil verder kijken naar: '+label}); callAI(); };
window.setAiMode=function(m){ aiMode=m; if(!aiScene&&!selVar&&!aiLoading) renderAI(); };
window.flagScene=function(){ const s=aiScene||{}; const subj=encodeURIComponent('Wereldweb — melding over een scenario'); const body=encodeURIComponent('Ik denk dat deze uitleg niet (helemaal) klopt:\n\nTitel: '+(s.titel||'')+'\nSituatie: '+(s.situatie||'')+'\nVoor Nederland: '+(s.nederland||'')+'\nWaarop het rust: '+(s.basis||'')+'\nModus: '+aiMode+' · niveau: '+LEVEL+'\n\nWat klopt er volgens mij niet:\n'); location.href='mailto:info@grwn.ai?subject='+subj+'&body='+body; return false; };
window.openBronnen=function(){
  const m=document.createElement('div'); m.className='wmodal';
  m.innerHTML='<div class="box">'
    +'<h2>ℹ️ Bronnen & uitleg</h2>'
    +'<p style="color:var(--muted);font-size:13.5px;line-height:1.6">Wereldweb is een <b>vereenvoudigd, educatief model</b> van echte energie-afhankelijkheden — bedoeld om de grote lijnen te begrijpen, niet als exacte of actuele data. De samenhang is gebaseerd op algemeen bekende, openbare cijfers van o.a.:</p>'
    +'<ul style="margin:10px 0 12px 18px;font-size:13.5px;line-height:1.7;color:var(--text)">'
    +'<li><b>IEA</b> — International Energy Agency · <a href="https://www.iea.org" target="_blank" rel="noopener">iea.org</a></li>'
    +'<li><b>EIA</b> — U.S. Energy Information Administration (o.a. World Oil Transit Chokepoints) · <a href="https://www.eia.gov" target="_blank" rel="noopener">eia.gov</a></li>'
    +'<li><b>UN Comtrade</b> — handelsstromen tussen landen · <a href="https://comtrade.un.org" target="_blank" rel="noopener">comtrade.un.org</a></li>'
    +'<li><b>Eurostat / CBS</b> — Europese en Nederlandse cijfers · <a href="https://ec.europa.eu/eurostat" target="_blank" rel="noopener">eurostat</a> · <a href="https://www.cbs.nl" target="_blank" rel="noopener">cbs.nl</a></li>'
    +'</ul>'
    +'<p style="color:var(--muted);font-size:13px;line-height:1.6">De <b>Scenario-modus</b> wordt door AI gemaakt. In <b>realistisch</b> blijft de AI binnen dit model en benoemt hij waarop een redenering rust; <b>wat-als</b> is bewust verzonnen en zo gelabeld. Twijfel je aan een uitleg? Gebruik de <b>Meld het</b>-link.</p>'
    +'<button id="brClose">Sluiten</button></div>';
  document.body.appendChild(m);
  document.getElementById('brClose').onclick=()=>m.remove();
  m.addEventListener('click',e=>{ if(e.target===m) m.remove(); });
  return false;
};

/* =======================================================================
   ACTIES
======================================================================= */
function clearSel(){ selCountry=null; renderPanel(); render(); }
window.clearSel=clearSel;
window.toggleDisrupt=function(id){ const d=DISRUPTIONS.find(x=>x.id===id);
  activeDisrupt=(activeDisrupt&&activeDisrupt.id===id)?null:d; selCountry=null;
  if(activeDisrupt&&activeDisrupt.hits[0]) focusOn(activeDisrupt.hits[0]);
  renderPanel(); render(); };
window.startScenario=function(id){ scenario=SCENARIOS.find(s=>s.id===id); scStep=0; scChosen=null;
  const dz=DISRUPTIONS.find(d=>d.id===scenario.disrupt); if(dz&&dz.hits[0])focusOn(dz.hits[0]);
  renderPanel(); render(); };
window.answer=function(i){ scChosen=i; renderPanel(); };
window.nextStep=function(){ scStep++; scChosen=null; renderPanel(); render(); };
window.exitScenario=function(){ scenario=null; scStep=0; scChosen=null; renderPanel(); render(); };

document.getElementById('modeSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  MODE=b.dataset.mode; document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.toggle('on',x===b));
  activeDisrupt=null; selCountry=null; scenario=null; scStep=0; scChosen=null; aiScene=null; aiHistory=[]; aiLoading=false; aiError=''; aiWaiting=false; selVar=null;
  document.getElementById('hint').textContent = MODE==='verken'?'Sleep om te draaien · tik op een land':'Kies een kritieke variabele (lijst of bolletje) →';
  renderPanel(); render(); });

window.addEventListener('resize',resize);
resize(); renderPanel();
</script>
