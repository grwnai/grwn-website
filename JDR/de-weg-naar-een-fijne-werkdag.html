<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De weg naar een fijne werkdag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =======================================================
     HUISSTIJL — pas hier de merk-/gemeentekleur aan (--accent)
     en vervang het logo in de <header> (zie id="brandLogo").
     ======================================================= */
  :root{
    color-scheme:light;
    /* GRWN.ai huisstijl (voorlopig — vervang hex door officiële merkwaarden) */
    --accent:#2274A5;        /* GRWN cerulean */
    --accent-ink:#1A5D85;
    --accent-soft:#E4F0F6;   /* mint */
    --accent-line:#CFE0EC;
    --accent2:#E83F6F;       /* GRWN magenta (signatuur) */
    --accent2-ink:#C72C58;
    --accent2-soft:#FCE6EE;
    --gold:#F5B400;
    --seagreen:#32936F;

    --ink:#173049;
    --muted:#5C6873;
    --bg:#F6F9FB;
    --panel:#ffffff;
    --line:#EAEEF1;
    --line-strong:#D7DBDE;
    --ok:#32936F;
    --radius:8px;
    --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:16px}

  /* ---------- Header ---------- */
  .siteheader{background:var(--panel);border-bottom:1px solid var(--line)}
  .siteheader .inner{max-width:840px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:13px;min-width:0}
  #brandLogo{width:40px;height:40px;flex:0 0 auto;border-radius:8px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center}
  #brandLogo .brandmark{width:26px;height:24px;color:#fff}
  .intro .band .wordmark{height:26px;width:auto;display:block;margin-bottom:14px;color:#fff}
  .foot-wm{height:20px;width:auto;color:var(--ink);opacity:.75}
  #brandLogo svg{width:24px;height:24px}
  .brand .titles{min-width:0}
  .brand h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.01em;line-height:1.2}
  .brand .sub{font-size:12.5px;color:var(--muted)}
  .modepill{font-size:12.5px;color:var(--accent-ink);border:1px solid var(--accent-line);background:var(--accent-soft);padding:5px 11px;border-radius:4px;font-weight:600;white-space:nowrap}
  .accentrule{height:3px;background:var(--accent2)}

  .wrap{max-width:840px;margin:0 auto;padding:26px 20px 90px}

  /* ---------- Progress ---------- */
  .progress{margin:2px 0 22px}
  .progress .meta{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:7px;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
  .progress .bar{height:6px;background:var(--line);border-radius:2px;overflow:hidden}
  .progress .bar>div{height:100%;width:0;background:var(--accent);transition:width .3s ease}

  /* ---------- Stepper (meelopende flow) ---------- */
  .stepper{display:flex;gap:0;overflow-x:auto;padding:4px 2px 10px;margin-bottom:4px;scrollbar-width:thin}
  .stepper .st{display:flex;flex-direction:column;align-items:center;min-width:74px;flex:0 0 auto;position:relative}
  .stepper .st .num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#fff;border:2px solid var(--line-strong);color:var(--muted);z-index:2}
  .stepper .st .num svg{width:14px;height:14px}
  .stepper .st .lbl{font-size:10.5px;color:var(--muted);margin-top:5px;text-align:center;line-height:1.15;max-width:74px}
  .stepper .st::before{content:"";position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--line);z-index:1}
  .stepper .st:first-child::before{display:none}
  .stepper .st.done .num{background:var(--accent);border-color:var(--accent);color:#fff}
  .stepper .st.done::before{background:var(--accent)}
  .stepper .st.cur .num{border-color:var(--accent2);color:var(--accent2);box-shadow:0 0 0 3px var(--accent2-soft)}
  .stepper .st.cur .lbl{color:var(--accent2-ink);font-weight:700}
  .stepper .st.cur::before{background:linear-gradient(90deg,var(--accent) 60%,var(--line) 60%)}

  /* ---------- Flow-overzicht (startpagina) ---------- */
  .flowmap{border:1px solid var(--line);border-radius:8px;background:#fafbfc;padding:20px;margin:0 0 4px}
  .flowmap h4{margin:0 0 4px;font-size:14px;font-weight:700}
  .flowmap .fsub{font-size:12.5px;color:var(--muted);margin:0 0 16px}
  .fnode{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line-strong);border-radius:7px;padding:9px 12px}
  .fnode .fi{width:30px;height:30px;flex:0 0 auto;border-radius:6px;background:var(--accent-soft);border:1px solid var(--accent-line);color:var(--accent);display:flex;align-items:center;justify-content:center}
  .fnode .fi svg{width:18px;height:18px}
  .fnode .ft{font-size:13px;font-weight:600;line-height:1.2}
  .fseq{display:flex;flex-direction:column;align-items:stretch;gap:0}
  .fconn{width:2px;height:16px;background:var(--accent-line);margin:0 auto}
  .fbranch{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0}
  @media(max-width:560px){.fbranch{grid-template-columns:1fr}}
  .ftrack{border:1px dashed var(--accent-line);border-radius:8px;padding:12px;background:#fff}
  .ftrack .th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:0 0 10px;padding:3px 9px;border-radius:4px;display:inline-block}
  .ftrack.up .th{background:#E3F3EB;color:#26765A}
  .ftrack.hi .th{background:#FBEFCE;color:#8A6A06}
  .ftrack .fnode{margin-bottom:8px}.ftrack .fnode:last-child{margin-bottom:0}
  .fmerge{text-align:center;font-size:11.5px;color:var(--muted);margin:2px 0}

  /* ---------- Card ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:30px 32px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}
  .badge{width:46px;height:46px;flex:0 0 auto;border-radius:8px;background:var(--accent-soft);border:1px solid var(--accent-line);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .badge svg{width:26px;height:26px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
  .card h2{margin:0;font-size:24px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
  .context{border-left:3px solid var(--accent-line);background:#fafbfc;padding:12px 16px;border-radius:0 6px 6px 0;margin:0 0 22px;font-size:15px;color:#3c444b}

  /* ---------- Fields ---------- */
  .q{margin-bottom:18px}
  .q label{display:block;font-weight:600;margin-bottom:7px;font-size:15px}
  .q .hint{display:block;font-weight:400;color:var(--muted);font-size:13px;margin-top:2px}
  textarea,input[type=text]{width:100%;border:1px solid var(--line-strong);border-radius:6px;padding:11px 13px;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;resize:vertical;min-height:60px;transition:border .15s,box-shadow .15s}
  input[type=text]{min-height:auto}
  textarea:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* ---------- Choices ---------- */
  .choices{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-bottom:4px}
  @media(max-width:560px){.choices{grid-template-columns:1fr}}
  .choice{text-align:left;border:1px solid var(--line-strong);background:#fff;border-radius:6px;padding:15px 17px 15px 46px;cursor:pointer;position:relative;font-family:inherit;transition:.15s}
  .choice:hover{border-color:var(--accent);background:var(--accent-soft)}
  .choice::before{content:"";position:absolute;left:16px;top:18px;width:18px;height:18px;border-radius:50%;border:2px solid var(--line-strong);background:#fff}
  .choice.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .choice.sel::before{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 0 5px,#fff 6px)}
  .choice .ct{font-weight:700;font-size:16px;margin-bottom:3px}
  .choice .cd{font-size:13.5px;color:var(--muted)}

  /* ---------- Tips ---------- */
  details.tips{border:1px solid var(--line);border-radius:6px;margin:0 0 20px;overflow:hidden;background:#fafbfc}
  details.tips summary{cursor:pointer;list-style:none;padding:11px 15px;font-weight:600;font-size:13.5px;color:var(--accent-ink);display:flex;align-items:center;gap:8px;user-select:none}
  details.tips summary::-webkit-details-marker{display:none}
  details.tips summary .chev{transition:transform .2s;font-size:10px;color:var(--accent)}
  details.tips[open] summary .chev{transform:rotate(90deg)}
  details.tips .tb{padding:0 16px 14px 34px}
  details.tips ul{margin:4px 0;padding-left:18px}
  details.tips li{margin:5px 0;font-size:13.5px;color:#3c444b}
  details.tips .sub{font-weight:700;font-size:12.5px;margin:9px 0 2px;color:var(--ink)}

  /* ---------- Buttons / nav ---------- */
  .nav{display:flex;justify-content:space-between;gap:12px;margin-top:26px;padding-top:20px;border-top:1px solid var(--line)}
  button.btn{border:1px solid transparent;border-radius:6px;padding:11px 20px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .btn.primary{background:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-ink)}
  .btn.ghost{background:#fff;color:var(--ink);border-color:var(--line-strong)}.btn.ghost:hover{background:#f2f4f6}
  .btn.accent{background:var(--accent2);color:#fff}.btn.accent:hover{background:var(--accent2-ink)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* ---------- Start ---------- */
  .intro{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .intro .band{background:var(--ink);color:#fff;padding:26px 32px}
  .intro .band h2{margin:0 0 7px;font-size:25px;font-weight:700;color:#fff;letter-spacing:-.01em}
  .intro .band p{margin:0;max-width:600px;opacity:.94;font-size:15px}
  .intro .body{padding:26px 32px}
  .intro h3{font-size:15px;margin:0 0 12px;font-weight:700}
  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 22px}
  @media(max-width:560px){.modegrid{grid-template-columns:1fr}}
  .principles{border:1px solid var(--line);border-radius:6px;padding:14px 18px;background:#fafbfc;margin-top:8px}
  .principles b{font-size:14px}.principles ul{margin:8px 0 0;padding-left:18px}.principles li{margin:4px 0;font-size:14px;color:#3c444b}

  /* ---------- Report ---------- */
  .report{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .report .rhead{border-top:4px solid var(--accent2);background:#fff;padding:24px 32px;border-bottom:1px solid var(--line)}
  .report .rhead .doc{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .report .rhead h2{margin:0 0 8px;font-size:23px;font-weight:700}
  .report .rhead .meta{font-size:13.5px;color:var(--muted)}
  .report .rbody{padding:24px 32px;background:#fff}
  .rsumline{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 20px}
  .chip{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:4px;background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--accent-line)}
  .rsection{border-top:1px solid var(--line);padding:16px 0 4px}
  .rsection:first-of-type{border-top:none}
  .rsection h3{margin:0 0 3px;font-size:16px;font-weight:700}
  .rsection .rctx{font-size:12.5px;color:var(--muted);margin:0 0 10px}
  .rqa{margin:9px 0}.rqa .qq{font-weight:600;font-size:14px}
  .rqa .aa{font-size:14.5px;white-space:pre-wrap;margin-top:3px;padding:9px 12px;background:#f7f8f9;border-radius:5px;border:1px solid var(--line)}
  .rqa .empty{color:#9aa1a8;font-style:italic;background:transparent;border:none;padding:1px 0}
  .actionbox{border:1px solid var(--accent-line);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:15px 18px;margin:4px 0 20px;background:var(--accent-soft)}
  .actionbox h3{margin:0 0 8px;font-size:15px;font-weight:700;color:var(--accent-ink)}
  .actionbox ul{margin:0;padding-left:20px}.actionbox li{margin:5px 0;font-size:14.5px}
  .exportbar{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 20px}

  /* ---------- AI ---------- */
  .aibox{border:1px solid var(--line);border-radius:6px;padding:18px 20px;margin:0 0 22px;background:#fff}
  .aibox .aihead{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--accent-ink);margin:0 0 10px;font-size:15px}
  .aibox .aihead svg{width:18px;height:18px;color:var(--accent)}
  .aibox .aiload{color:var(--muted);font-size:14px;display:flex;align-items:center;gap:10px}
  .aibox .spin{width:16px;height:16px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .aibox .ainote{color:var(--muted);font-size:14px}
  .aimd h4{margin:15px 0 4px;font-size:14.5px;font-weight:700;color:var(--accent-ink)}
  .aimd p{margin:6px 0;font-size:14.5px}
  .aimd ul{margin:6px 0;padding-left:20px}.aimd li{margin:4px 0;font-size:14.5px}
  .aidisc{font-size:11.5px;color:#9aa1a8;margin-top:12px;border-top:1px solid var(--line);padding-top:10px}

  .footnote{font-size:12px;color:var(--muted);margin-top:26px;text-align:center}

  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:24px}
  }
</style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>

function icon(name,cls){return '<svg class="'+(cls||'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">'+(IC[name]||'')+'</svg>';}
const ICON={werksituatie:'dialog',taaktype:'balance',uitdagend_nodig:'target',effect_termijn:'trend',
  knelpunt:'alert',hulp_organisatie:'building',hulp_zelf:'user',hulpbronnen_check:'checklist',
  andere_stappen:'sliders',concrete_stappen:'tasks',leereffect:'bulb',feedback:'feedback',afsluiting:'flag'};
const SHORT={werksituatie:'Werk­situatie',taaktype:'Type taak',uitdagend_nodig:'Uitdagend',effect_termijn:'Effect',
  knelpunt:'Knelpunt',hulp_organisatie:'Organisatie',hulp_zelf:'Jezelf',hulpbronnen_check:'Afweging',
  andere_stappen:'Andere stappen',concrete_stappen:'Concrete stappen',leereffect:'Leereffect',feedback:'Feedback',afsluiting:'Afsluiting'};

function renderStepper(force){
  const p=path();
  const cur = force ? p.length : state.idx; // report = after last
  let h='';
  p.forEach((id,i)=>{
    const cls = i<cur?'done':(i===cur?'cur':'');
    h+=`<div class="st ${cls}"><div class="num">${i+1}</div><div class="lbl">${SHORT[id]}</div></div>`;
  });
  const rc = force?'cur':'';
  h+=`<div class="st ${rc}"><div class="num">${icon('flag')}</div><div class="lbl">Rapportage</div></div>`;
  // swap flag svg sizing inside num
  return h;
}

function flowOverview(){
  const node=(id,label)=>`<div class="fnode"><span class="fi">${icon(ICON[id]||'dialog')}</span><span class="ft">${label||SHORT[id]}</span></div>`;
  const conn='<div class="fconn"></div>';
  return `<div class="flowmap">
    <h4>Zo ziet de route eruit</h4>
    <p class="fsub">Je doorloopt onderstaande stappen. Na stap 2 splitst de route zich, afhankelijk van het type taak, en komt daarna weer samen.</p>
    <div class="fseq">
      ${node('werksituatie','1 · Werksituatie')}${conn}
      ${node('taaktype','2 · Type taak: uitdagend of hinderlijk')}${conn}
      <div class="fbranch">
        <div class="ftrack up"><span class="th">Route uitdagend</span>
          ${node('uitdagend_nodig')}<div class="fconn"></div>${node('effect_termijn')}</div>
        <div class="ftrack hi"><span class="th">Route hinderlijk</span>
          ${node('knelpunt')}<div class="fconn"></div>${node('hulp_organisatie')}<div class="fconn"></div>${node('hulp_zelf')}<div class="fconn"></div>${node('hulpbronnen_check')}<div class="fconn"></div>${node('andere_stappen','Andere stappen (bij ‘nee’)')}</div>
      </div>
      <div class="fmerge">▼ de routes komen hier weer samen ▼</div>
      ${node('concrete_stappen','3 · Concrete stappen')}${conn}
      ${node('leereffect','4 · Leereffect')}${conn}
      ${node('feedback','5 · Feedback')}${conn}
      ${node('afsluiting','Afsluiting')}${conn}
      <div class="fnode" style="border-color:var(--accent);background:var(--accent-soft)"><span class="fi" style="background:var(--accent);color:#fff;border-color:var(--accent)">${icon('flag')}</span><span class="ft">Rapportage &amp; AI-analyse</span></div>
    </div>
  </div>`;
}

/* ===================== SCREENS ===================== */
const S={

    ctx:'Beschrijf kort wat er speelt in het werk. Kies één taak die eruitspringt — positief of negatief. Met die taak gaan we verder.',

       {id:'ws_ervaring',label:'Hoe ervaar je jouw werk op dit moment, en waardoor komt dit?'},
       {id:'ws_taak',label:'Welke taak springt eruit?',hint:'Deze taak staat centraal in de rest van het gesprek.'}],
    tips:[{items:['Gebruik open vragen (hoe, wat, welke).','Vat samen wat je hoort en check of je het goed begrijpt.','Focus op inzicht en oplossingen, niet op oordeel.']}]},

  taaktype:{tag:'Stap 2 · Type taak',title:'Wat voor taak is het?',

  uitdagend_nodig:{tag:'Route uitdagend · Werk dat je uitdaagt',title:'Werk dat je uitdaagt',

    tips:[{items:['Goed dat je helder kunt benoemen wat energie geeft.','Fijn dat je zelf al ideeën hebt om meer uitdagende taken te creëren.']}]},

  leereffect:{tag:'Stap 4 · Leereffect',title:'Leereffect',
    ctx:'Ga direct na of deze aanpak effect heeft.',
    q:[{id:'le_motivatie',label:'Denk je dat je met deze stappen meer motivatie en minder stress zult ervaren?'},
       {id:'le_actie',label:'Wat is één concrete actie die je vandaag kunt nemen?'},
       {id:'le_vaker',label:'Helpt deze manier van denken, en wat heb je nodig om dit vaker toe te passen?'}]},
  feedback:{tag:'Stap 5 · Feedback',title:'Feedback',
    ctx:'Belangrijk: geef tijdens dit gesprek — dus ter plekke — feedback aan de medewerker.',
    q:[{id:'fb',label:'Welke feedback is gegeven of gekregen?',hint:'Optioneel — leg vast wat benoemd is.'}],
    tips:[{sub:'Feedbackmogelijkheden',items:['Goed dat je zo helder kunt benoemen wat jou energie geeft.','Fijn dat je zelf al ideeën hebt om meer uitdagende taken te creëren.','Goed dat je aangeeft welke ondersteuning je mist — dat helpt om samen te verbeteren.','Je hebt duidelijk inzicht in wat je nodig hebt; hoe ga je dit realiseren?']}]},
  afsluiting:{tag:'Afsluiting',title:'Wat heeft dit gesprek opgeleverd?',
    ctx:'Sluit positief af en vat de opbrengst samen.',
    q:[{id:'af_opbrengst',label:'Wat heeft dit gesprek jou opgeleverd met betrekking tot jouw werksituatie?'}]}
};

function path(){
  const p=['werksituatie','taaktype'];
  if(state.taaktype==='uitdagend')p.push('uitdagend_nodig','effect_termijn');
  else if(state.taaktype==='hinderlijk'){p.push('knelpunt','hulp_organisatie','hulp_zelf','hulpbronnen_check');
    if(state.hulpvoldoende==='nee')p.push('andere_stappen');}
  if(state.taaktype)p.push('concrete_stappen','leereffect','feedback','afsluiting');
  return p;
}

/* ===================== HELPERS ===================== */
const appEl=document.getElementById('app');
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function load(){try{const s=localStorage.getItem(KEY);if(s)state=Object.assign(state,JSON.parse(s))}catch(e){}}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s}

/* ===================== RENDER ===================== */
function render(){
  save();
  if(!state.mode){renderStart();prog(false);return;}
  const p=path();
  if(state.idx<0)state.idx=0;
  if(state.idx>=p.length){renderReport();prog(true,1);return;}
  renderScreen(p[state.idx],p);
}

function renderStart(){
  document.getElementById('modePill').style.display='none';
  appEl.innerHTML=`
  <div class="intro">
    <div class="band">
      <svg class="wordmark" viewBox="335 1820 1810 525" role="img" aria-label="GRWN"><use href="#wm"/></svg>
      <h2>De weg naar een fijne werkdag</h2>
      <p>Een stapsgewijs instrument op basis van het JD-R model. Het helpt verkennen wat energie geeft en wat energie kost, en sluit af met een rapportage.</p>
    </div>
    <div class="body">
      <h3>Hoe wordt het instrument gebruikt?</h3>
      <div class="modegrid">
        <button class="choice" onclick="setMode('samen')"><div class="ct">Samen — in gesprek</div><div class="cd">Een begeleider voert het gesprek met een medewerker. Begeleidingstips staan standaard open.</div></button>
        <button class="choice" onclick="setMode('zelf')"><div class="ct">Zelf — reflectie</div><div class="cd">De stappen worden zelfstandig doorlopen en de vragen voor jezelf beantwoord.</div></button>
      </div>
      <div class="q"><label>Naam <span class="hint">Optioneel — verschijnt in de rapportage.</span></label>
        <input type="text" id="startNaam" value="${esc(state.naam)}" placeholder="Naam van de medewerker of jezelf"></div>
      <div class="principles"><b>Uitgangspunten voor het gesprek</b>
        <ul><li>Gebruik open vragen (hoe, wat, welke).</li><li>Vat samen wat je hoort en check of je het goed begrijpt.</li><li>Focus op inzicht en oplossingen, niet op oordeel.</li></ul></div>
      <div style="height:20px"></div>
      ${flowOverview()}
      ${(Object.keys(state.answers).length||state.taaktype)?`<div class="nav"><span></span><button class="btn ghost" onclick="resetAll()">Eerdere sessie wissen</button></div>`:''}
    </div>
  </div>`;
}
function setMode(m){const n=document.getElementById('startNaam');if(n)state.naam=n.value;
  state.mode=m;if(!state.datum)state.datum=new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
  state.idx=0;render();}

function renderScreen(id,p){
  const s=S[id];
  document.getElementById('modePill').style.display='inline-block';
  document.getElementById('modePill').textContent=state.mode==='samen'?'Modus: Samen — in gesprek':'Modus: Zelf — reflectie';

  let body='';
  if(s.choice)body+=renderChoice(s.choice);
  if(s.q)body+=s.q.map(q=>`<div class="q"><label>${q.label}${q.hint?`<span class="hint">${q.hint}</span>`:''}</label>
    <textarea data-qid="${q.id}" oninput="onAns(this)" placeholder="Typ hier…">${esc(state.answers[q.id])}</textarea></div>`).join('');

  let tips='';
  if(s.tips){const open=state.mode==='samen'?' open':'';
    const tb=s.tips.map(t=>`${t.sub?`<div class="sub">${t.sub}</div>`:''}<ul>${t.items.map(i=>`<li>${i}</li>`).join('')}</ul>`).join('');
    tips=`<details class="tips"${open}><summary><span class="chev">▶</span> Begeleidingstips &amp; voorbeeldvragen</summary><div class="tb">${tb}</div></details>`;}

  const first=state.idx===0,pending=s.choice&&!state[s.choice],last=state.idx===p.length-1;
  appEl.innerHTML=`<article class="card">
    <div class="card-head">
      <span class="badge">${icon(ICON[id])}</span>
      <div><div class="eyebrow">${esc(s.tag)}</div><h2>${s.title}</h2></div>
    </div>
    <p class="context">${s.ctx}</p>${tips}${body}
    <div class="nav">
      <button class="btn ghost" onclick="prev()">${first?'Terug naar start':'Vorige'}</button>
      <button class="btn primary" onclick="next()" ${pending?'disabled':''}>${last?'Rapportage opmaken':'Volgende'}</button>
    </div></article>`;
  prog(true);window.scrollTo({top:0,behavior:'smooth'});
}

function renderChoice(kind){
  if(kind==='taaktype')return `<div class="choices">
    <button class="choice ${state.taaktype==='uitdagend'?'sel':''}" onclick="setChoice('taaktype','uitdagend')"><div class="ct">Uitdagend</div><div class="cd">Geeft trots en gezonde druk, motiveert en daagt uit om te groeien.</div></button>
    <button class="choice ${state.taaktype==='hinderlijk'?'sel':''}" onclick="setChoice('taaktype','hinderlijk')"><div class="ct">Hinderlijk</div><div class="cd">Kost energie, frustreert of belemmert en geeft stress zonder dat het iets oplevert.</div></button></div>`;
  if(kind==='hulpvoldoende')return `<div class="choices">
    <button class="choice ${state.hulpvoldoende==='ja'?'sel':''}" onclick="setChoice('hulpvoldoende','ja')"><div class="ct">Ja</div><div class="cd">Met deze hulpbronnen kan het werk weer uitdagend worden. Door naar concrete stappen.</div></button>
    <button class="choice ${state.hulpvoldoende==='nee'?'sel':''}" onclick="setChoice('hulpvoldoende','nee')"><div class="ct">Nee</div><div class="cd">Nog niet voldoende. Kijk eerst samen naar andere stappen.</div></button></div>`;
  return '';
}
function setChoice(k,v){state[k]=v;if(k==='taaktype')state.hulpvoldoende=null;save();render();}
function onAns(el){state.answers[el.dataset.qid]=el.value;save();}
function next(){state.idx++;render();}
function prev(){if(state.idx===0){state.mode=null;render();return;}state.idx--;render();}

function prog(show,force){
  const w=document.getElementById('progressWrap');
  if(!show){w.style.display='none';return;}
  w.style.display='block';
  const p=path(),total=p.length+1,cur=force?total:Math.min(state.idx+1,total),pct=force?100:Math.round(cur/total*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressStep').textContent=force?'Rapportage':`Stap ${cur} van ${total}`;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('stepper').innerHTML=renderStepper(force);
  const act=document.querySelector('#stepper .st.cur');if(act&&act.scrollIntoView)act.scrollIntoView({inline:'center',block:'nearest'});
}

/* ===================== REPORT ===================== */
function renderReport(){
  document.getElementById('modePill').style.display='inline-block';
  const p=path();
  const chips=`<span class="chip">Type taak: ${cap(state.taaktype)||'—'}</span>`+
    (state.taaktype==='hinderlijk'&&state.hulpvoldoende?`<span class="chip">Voldoende hulpbronnen: ${cap(state.hulpvoldoende)}</span>`:'');
  const sections=p.map(id=>{const s=S[id];if(!s.q||!s.q.length)return'';
    const qa=s.q.map(q=>{const a=state.answers[q.id];
      return `<div class="rqa"><div class="qq">${q.label}</div>${a&&a.trim()?`<div class="aa">${esc(a)}</div>`:`<div class="aa empty">— niet ingevuld —</div>`}</div>`}).join('');
    return `<div class="rsection"><h3>${s.title}</h3><p class="rctx">${s.ctx}</p>${qa}</div>`;}).join('');
  const acts=[];
  ['cs_grip','cs_klein','cs_ontwikkel','cs_deadline','cs_vervolg','le_actie','as_schrappen','as_tijd']
    .forEach(k=>{if(state.answers[k]&&state.answers[k].trim())acts.push(esc(state.answers[k]))});
  const actionbox=acts.length?`<div class="actionbox"><h3>Afgesproken acties</h3><ul>${acts.map(a=>`<li>${a}</li>`).join('')}</ul></div>`:'';

  appEl.innerHTML=`<div class="report">
    <div class="rhead"><div class="doc">Rapportage</div><h2>De weg naar een fijne werkdag</h2>
      <div class="meta">${state.naam?('<strong>'+esc(state.naam)+'</strong> · '):''}${esc(state.datum)} · ${state.mode==='samen'?'Samen — in gesprek':'Zelf — reflectie'} · JD-R model</div></div>
    <div class="rbody">
      <div class="rsumline">${chips}</div>
      <div class="exportbar">
        <button class="btn accent" onclick="analyzeAI()">${icon('spark')} AI-analyse &amp; tips</button>
        <button class="btn ghost" onclick="printReport()">Print / opslaan als PDF</button>
        <button class="btn ghost" onclick="downloadTxt()">Download als tekst</button>
        <button class="btn ghost" onclick="emailReport()">Versturen per e-mail</button>
      </div>
      <div id="aiBox" class="aibox" style="display:none"></div>
      ${actionbox}
      ${sections}
      <div class="nav"><button class="btn ghost" onclick="prev()">Vorige</button>
        <button class="btn ghost" onclick="resetAll()">Nieuw gesprek starten</button></div>
    </div></div>`;
  // make spark icon in button sized
  document.querySelectorAll('.btn.accent svg').forEach(s=>{s.style.width='15px';s.style.height='15px';s.style.verticalAlign='-2px';s.style.marginRight='4px';});
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildText(){
  const p=path();
  let o='RAPPORTAGE — DE WEG NAAR EEN FIJNE WERKDAG\nReflectie op basis van het JD-R model\n';
  o+=(state.naam?('Naam: '+state.naam+'\n'):'')+'Datum: '+state.datum+'\nModus: '+(state.mode==='samen'?'Samen — in gesprek':'Zelf — reflectie')+'\n';
  o+='Type taak: '+(cap(state.taaktype)||'—')+(state.hulpvoldoende?('\nVoldoende hulpbronnen: '+cap(state.hulpvoldoende)):'')+'\n';
  o+='\n==================================================\n';
  p.forEach(id=>{const s=S[id];if(!s.q||!s.q.length)return;
    o+='\n'+s.title.toUpperCase()+'\n';
    s.q.forEach(q=>{const a=state.answers[q.id];o+='  • '+q.label+'\n    '+(a&&a.trim()?a.replace(/\n/g,'\n    '):'(niet ingevuld)')+'\n';});});
  return o;
}
function downloadTxt(){const b=new Blob([buildText()],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='rapportage-fijne-werkdag'+(state.naam?'-'+state.naam.replace(/\s+/g,'_'):'')+'.txt';a.click();URL.revokeObjectURL(a.href);}
function emailReport(){const url='mailto:?subject='+encodeURIComponent('Rapportage – Fijne werkdag'+(state.naam?(' '+state.naam):''))+'&body='+encodeURIComponent(buildText());
  if(url.length>1900){alert('De rapportage is te lang voor directe e-mail. Gebruik "Download als tekst" of "Print / PDF".');return;}window.location.href=url;}
function printReport(){
  const p=path();
  let html='<h1 style="color:'+getAccent()+'">Rapportage — De weg naar een fijne werkdag</h1>';
  html+='<p style="color:#555;font-size:13px">'+(state.naam?('<b>'+esc(state.naam)+'</b> · '):'')+esc(state.datum)+' · '+(state.mode==='samen'?'Samen — in gesprek':'Zelf — reflectie')+' · JD-R model<br>Type taak: <b>'+(cap(state.taaktype)||'—')+'</b>'+(state.hulpvoldoende?(' · Voldoende hulpbronnen: <b>'+cap(state.hulpvoldoende)+'</b>'):'')+'</p><hr>';
  p.forEach(id=>{const s=S[id];if(!s.q||!s.q.length)return;
    html+='<h3 style="color:'+getAccent()+';margin:16px 0 4px">'+esc(s.title)+'</h3>';
    s.q.forEach(q=>{const a=state.answers[q.id];
      html+='<div style="margin:6px 0"><div style="font-weight:600;font-size:13.5px">'+esc(q.label)+'</div>'+
        (a&&a.trim()?'<div style="white-space:pre-wrap;background:#f4f6f8;padding:7px 10px;border-radius:5px;font-size:13.5px;border:1px solid #e2e6ea">'+esc(a)+'</div>':'<div style="color:#999;font-style:italic">— niet ingevuld —</div>')+'</div>';});});
  const ai=document.querySelector('#aiBox .aimd');
  if(ai)html+='<hr><h2 style="color:'+getAccent()+'">AI-analyse & tips</h2>'+ai.outerHTML;
  document.getElementById('printArea').innerHTML=html;window.print();
}
function getAccent(){return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#1f4e79';}

/* ===================== AI-ANALYSE ===================== */
function renderMd(t){
  if(!t)return '<p>Geen analyse ontvangen.</p>';
  t=esc(t).replace(/\r/g,'');
  const lines=t.split('\n');let html='',inUl=false;
  const close=()=>{if(inUl){html+='</ul>';inUl=false;}};
  const inline=s=>s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*(?!\*)(.+?)\*(?!\*)/g,'<em>$1</em>');
  lines.forEach(raw=>{const l=raw.trim();
    if(!l){close();return;}let m;
    if(m=l.match(/^#{1,6}\s+(.*)/)){close();html+='<h4>'+inline(m[1])+'</h4>';}
    else if(m=l.match(/^[-*•]\s+(.*)/)){if(!inUl){html+='<ul>';inUl=true;}html+='<li>'+inline(m[1])+'</li>';}
    else if(m=l.match(/^\d+[.)]\s+(.*)/)){if(!inUl){html+='<ul>';inUl=true;}html+='<li>'+inline(m[1])+'</li>';}
    else{close();html+='<p>'+inline(l)+'</p>';}});
  close();return '<div class="aimd">'+html+'</div>';
}
async function analyzeAI(){
  const box=document.getElementById('aiBox');box.style.display='block';
  box.innerHTML='<div class="aihead">'+icon('spark')+' AI-analyse</div><div class="aiload"><span class="spin"></span> Bezig met analyseren van de rapportage…</div>';
  const report=buildText();
  if(!(window.cowork&&typeof window.cowork.askClaude==='function')){
    box.innerHTML='<div class="aihead">'+icon('spark')+' AI-analyse</div><div class="ainote">De ingebouwde AI-analyse werkt wanneer dit instrument als artifact in de Claude-app wordt geopend. Als los bestand kun je de rapportage downloaden of via e-mail/klembord in een AI-chat plakken.</div>';return;}
  const prompt=
"Je bent een ervaren, professionele HR- en werkgeluk-coach die werkt volgens het Job Demands-Resources (JD-R) model. "+
"Hieronder staat een ingevulde gespreksrapportage van het instrument 'De weg naar een fijne werkdag'. "+
"Analyseer deze en geef je reactie in het Nederlands, constructief, zakelijk en bondig, met deze koppen (gebruik '#'): "+
"\\n# Samenvatting (2-3 zinnen)"+
"\\n# Sterke punten (wat gaat goed in de antwoorden/het gesprek)"+
"\\n# Aandachtspunten (vaag gebleven, ontbrekend of tegenstrijdig — verwijs naar concrete antwoorden)"+
"\\n# Concrete tips & vervolgvragen (3 tot 5 praktische, actiegerichte punten)"+
"\\nWees specifiek en verwijs naar wat is ingevuld. Als veel velden leeg zijn, benoem vriendelijk dat aanvullen tot beter inzicht leidt.";
  try{
    const r=await window.cowork.askClaude(prompt,[report]);
    let out=(typeof r==='string')?r:(r&&(r.text||r.content||r.message||r.output||r.result||JSON.stringify(r)));
    box.innerHTML='<div class="aihead">'+icon('spark')+' AI-analyse &amp; tips</div>'+renderMd(out)+
      '<div class="aidisc">AI-gegenereerd op basis van de ingevulde antwoorden — bedoeld als hulpmiddel, niet als oordeel. Beoordeel de tips op passendheid.</div>'+
      '<div class="exportbar" style="margin:14px 0 0"><button class="btn ghost" onclick="analyzeAI()">Opnieuw analyseren</button></div>';
    document.querySelectorAll('.aihead svg').forEach(s=>{s.style.width='18px';s.style.height='18px'});
  }catch(e){
    box.innerHTML='<div class="aihead">'+icon('spark')+' AI-analyse</div><div class="ainote">De analyse is niet gelukt: '+esc(String(e&&e.message||e))+'. Probeer het zo nog eens.</div>'+
      '<div class="exportbar" style="margin:12px 0 0"><button class="btn ghost" onclick="analyzeAI()">Opnieuw proberen</button></div>';
  }
}

function resetAll(){if(!confirm('Opnieuw beginnen? Alle antwoorden worden gewist.'))return;
  state={mode:null,naam:'',datum:'',taaktype:null,hulpvoldoende:null,answers:{},idx:0};save();render();}

/* init */
load();render();
</script>
