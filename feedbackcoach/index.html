<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback-coach · GRWN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#173049; --ink2:#0F2336; --cloud:#F6F9FB; --white:#fff; --cream:#FBFCFD;
    --slate:#5C6873; --mint:#E4F0F6; --line:#EAEEF1;
    --magenta:#E83F6F; --magenta-d:#C72C58; --cerulean:#2274A5; --cerulean-d:#1A5D85;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 500px at 88% -8%, #EAF3F9 0%, transparent 60%),
      radial-gradient(700px 460px at 0% 8%, #FCE9F0 0%, transparent 55%),
      var(--white);
    min-height:100dvh;display:flex;flex-direction:column;line-height:1.6;-webkit-font-smoothing:antialiased}

  /* nav zoals grwn.ai */
  .gnav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(23,48,73,.07)}
  .gn-in{max-width:900px;margin:0 auto;padding:0 22px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .gn-logo img{width:132px;display:block}
  .gn-logo .fallback{font-weight:800;font-size:22px;letter-spacing:.5px;color:var(--ink)}
  .gn-logo .fallback b{color:var(--magenta)}
  .gn-right{display:flex;align-items:center;gap:14px}
  .gn-right a,.gn-right button{font:inherit;font-size:13.5px;font-weight:600;color:var(--cerulean-d);background:none;border:0;cursor:pointer;text-decoration:none}
  .gn-right a:hover,.gn-right button:hover{color:var(--magenta-d)}

  /* intro */
  .intro{max-width:900px;margin:0 auto;padding:26px 22px 6px;width:100%}
  .eyebrow{display:inline-block;font-size:12.5px;font-weight:600;letter-spacing:.04em;color:var(--cerulean-d);
    background:rgba(255,255,255,.75);box-shadow:0 1px 0 rgba(23,48,73,.04);padding:6px 13px;border-radius:30px;border:1px solid var(--line)}
  .intro h1{font-size:26px;font-weight:800;margin:12px 0 4px;letter-spacing:-.01em}
  .intro .sub{font-family:Georgia,'Times New Roman',serif;font-style:italic;color:var(--slate);font-size:16.5px}

  .wrap{flex:1;width:100%;max-width:900px;margin:0 auto;display:flex;flex-direction:column;padding:0 22px}
  .chat{flex:1;overflow-y:auto;padding:20px 2px 12px}
  .msg{display:flex;gap:11px;margin-bottom:16px;align-items:flex-start}
  .msg .av{width:34px;height:34px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:17px}
  .msg.coach .av{background:linear-gradient(135deg,var(--cerulean),var(--magenta));color:#fff;box-shadow:0 6px 16px rgba(34,116,165,.24)}
  .msg.me{flex-direction:row-reverse}
  .msg.me .av{background:var(--ink);color:#fff}
  .bubble{max-width:76%;padding:13px 16px;border-radius:18px;font-size:15px;line-height:1.65}
  .msg.coach .bubble{background:#fff;border:1px solid var(--line);border-top-left-radius:6px;box-shadow:0 6px 20px rgba(23,48,73,.05)}
  .msg.me .bubble{background:var(--cerulean);color:#fff;border-top-right-radius:6px;box-shadow:0 8px 22px rgba(34,116,165,.22)}
  .bubble b{font-weight:700}
  .bubble .sbi{background:var(--mint);border:1px solid #D3E6F1;border-left:4px solid var(--magenta);
    border-radius:14px;padding:13px 15px;margin-top:10px;font-size:14.5px;line-height:1.75;white-space:pre-wrap;color:var(--ink)}
  .typing .bubble{color:var(--slate)}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--slate);margin-right:3px;animation:b 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,60%,100%{opacity:.3}30%{opacity:1}}

  .composer{padding:12px 2px 16px;position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--white) 26%)}
  .box{display:flex;gap:8px;align-items:flex-end;background:#fff;border:1px solid var(--line);border-radius:20px;
    padding:9px 9px 9px 16px;box-shadow:0 8px 26px rgba(23,48,73,.08)}
  textarea{flex:1;border:0;outline:0;resize:none;font:inherit;font-size:15px;color:var(--ink);max-height:140px;line-height:1.5;background:none;padding:7px 0}
  .send{border:0;border-radius:999px;background:var(--cerulean);color:#fff;font:inherit;font-weight:700;font-size:14px;
    padding:11px 20px;cursor:pointer;flex:none;box-shadow:0 8px 22px rgba(34,116,165,.28);transition:.15s}
  .send:hover{background:var(--cerulean-d)}
  .send:disabled{opacity:.4;cursor:default;box-shadow:none}
  .note{text-align:center;font-size:11.5px;color:var(--slate);padding:9px 0 0}
  .foot{text-align:center;font-size:11.5px;color:var(--slate);padding:10px}
  .foot a{color:var(--cerulean-d);text-decoration:none;font-weight:600}
  @media(max-width:520px){.bubble{max-width:84%}.intro h1{font-size:22px}}
</style>
</head>
<body>
  <nav class="gnav">
    <div class="gn-in">
      <a class="gn-logo" href="/"><img src="/grwn-logo.svg" alt="GRWN.ai" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=&quot;fallback&quot;>GR<b>W</b>N</span>')"></a>
      <div class="gn-right">
        <button id="reset">↺ Opnieuw</button>
        <a href="/">← naar GRWN</a>
      </div>
    </div>
  </nav>

  <div class="intro">
    <span class="eyebrow">💬 Feedback-coach · SBI-methode</span>
    <h1>Bereid feedback voor die landt.</h1>
    <p class="sub">Eerlijk, concreet en veilig — mens én AI, samen omhoog.</p>
  </div>

  <div class="wrap">
    <div class="chat" id="chat"></div>
    <div class="composer">
      <div class="box">
        <textarea id="inp" rows="1" placeholder="Typ hier je antwoord…" autocomplete="off"></textarea>
        <button class="send" id="send">Stuur ▶</button>
      </div>
      <div class="note">Veilig & vertrouwelijk · voor Niveau 1 (gedrag). Resultaten & cijfers horen bij je leidinggevende.</div>
    </div>
  </div>
  <div class="foot">Een tool van <a href="/">GRWN</a> · with AI</div>

<script>
const GREETING = "Hoi! Ik ben je Feedback-coach. Samen maken we jouw feedback scherp, eerlijk en veilig — volgens de SBI-methode (Situatie · Gedrag · Impact).\n\nVoor wie wil je feedback voorbereiden? En wil je iets **positiefs versterken** of iets dat **beter kan**? (Allebei mag.)";
let messages = [{role:'assistant', content:GREETING}];
const chat=document.getElementById('chat'), inp=document.getElementById('inp'), send=document.getElementById('send');

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(t){
  let html=esc(t).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  if(/Competentie:/.test(t)){
    const idx=t.search(/Competentie:/);
    const before=t.slice(0,idx), block=t.slice(idx);
    html=esc(before).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
      +'<div class="sbi">'+esc(block).replace(/(Competentie:|Situatie:|Gedrag:|Impact:|Feedforward[^:]*:)/g,'<b>$1</b>')+'</div>';
  }
  return html.replace(/\n/g,'<br>');
}
function render(){
  chat.innerHTML=messages.map(m=>{
    const me=m.role!=='assistant';
    return '<div class="msg '+(me?'me':'coach')+'"><div class="av">'+(me?'🧑':'💬')+'</div><div class="bubble">'+fmt(m.content)+'</div></div>';
  }).join('');
  chat.scrollTop=chat.scrollHeight;
}
function typing(on){
  let t=document.getElementById('typing');
  if(on){ if(!t){ t=document.createElement('div'); t.className='msg coach typing'; t.id='typing';
    t.innerHTML='<div class="av">💬</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    chat.appendChild(t); chat.scrollTop=chat.scrollHeight; } }
  else if(t){ t.remove(); }
}
async function ask(){
  const v=inp.value.trim(); if(!v) return;
  messages.push({role:'user',content:v}); inp.value=''; inp.style.height='auto'; render();
  send.disabled=true; typing(true);
  try{
    const r=await fetch('/api/feedbackcoach',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({messages})});
    const d=await r.json(); typing(false);
    if(r.ok && d.text){ messages.push({role:'assistant',content:d.text}); }
    else { messages.push({role:'assistant',content:'⚠️ '+(d.error||'Er ging iets mis. Probeer het zo nog eens.')}); }
  }catch(e){ typing(false); messages.push({role:'assistant',content:'⚠️ Geen verbinding met de coach. De coach heeft de live server nodig (werkt niet lokaal).'}); }
  render(); send.disabled=false; inp.focus();
}
send.onclick=ask;
inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); ask(); } });
inp.addEventListener('input',()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });
document.getElementById('reset').onclick=()=>{ messages=[{role:'assistant',content:GREETING}]; render(); inp.focus(); };
render(); inp.focus();
</script>
</body>
</html>
